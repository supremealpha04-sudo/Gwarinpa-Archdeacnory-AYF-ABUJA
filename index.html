<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AYF Conference 2026</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- QR Code -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #f5f5f0; }
    .dark body { background: #1a1a1a; }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 1.5rem;
      transition: all 0.3s ease;
    }
    .dark .glass-card { background: rgba(30, 30, 30, 0.95); }
    
    .btn-gold {
      background: linear-gradient(135deg, #D4AF37, #C5A028);
      transition: all 0.3s ease;
    }
    .btn-gold:hover { transform: translateY(-2px); }
    
    .btn-royal {
      background: linear-gradient(135deg, #0A2E73, #0d3a8a);
      transition: all 0.3s ease;
    }
    .btn-royal:hover { transform: translateY(-2px); }
    
    .loader {
      border: 3px solid #e0e0e0;
      border-top: 3px solid #D4AF37;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .nav-btn.active { 
      color: #D4AF37; 
      border-bottom: 2px solid #D4AF37;
    }
    
    .notification-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: red;
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .countdown-number {
      background: linear-gradient(135deg, #0A2E73, #1a4a9e);
      border-radius: 16px;
      padding: 10px;
      text-align: center;
    }
    
    .post-card {
      transition: all 0.3s ease;
    }
    .post-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body class="text-gray-800 dark:text-white">

  <div id="root" class="pb-20">
    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/95 dark:bg-gray-800/95 backdrop-blur-md border-b border-gold/20 shadow-sm">
      <div class="flex justify-between items-center px-4 py-3 max-w-7xl mx-auto">
        <div>
          <h1 class="font-bold text-lg">AYF Conference 2026</h1>
          <p class="text-xs text-gold">If God Be For Us</p>
        </div>
        <div class="flex gap-4">
          <button id="darkModeToggle" class="text-xl"><i class="fas fa-moon"></i></button>
          <button id="notificationsBtn" class="text-xl relative">
            <i class="fas fa-bell"></i>
            <span id="notificationCount" class="notification-badge hidden">0</span>
          </button>
          <button id="userMenuBtn" class="text-xl"><i class="fas fa-user-circle"></i></button>
        </div>
      </div>
    </header>

    <!-- User Dropdown -->
    <div id="userDropdown" class="hidden fixed right-4 top-16 w-56 bg-white dark:bg-gray-800 rounded-xl shadow-lg z-50 border border-gold/20">
      <a href="#" id="profileLink" class="block px-4 py-2 hover:bg-gold/10">Profile</a>
      <a href="#" id="adminLink" class="admin-only hidden block px-4 py-2 hover:bg-gold/10">Admin Panel</a>
      <hr class="my-1 border-gold/20">
      <button id="logoutBtn" class="w-full text-left px-4 py-2 hover:bg-red-50 text-red-600">Logout</button>
    </div>

    <!-- Main Content -->
    <main id="appContainer" class="max-w-7xl mx-auto px-4 py-6">
      <div class="flex justify-center items-center min-h-[60vh]">
        <div class="loader"></div>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-gray-800/95 border-t border-gold/30 z-40">
      <div class="flex justify-around py-2">
        <button data-nav="home" class="nav-btn flex flex-col items-center text-sm px-4 py-1"><i class="fas fa-home text-xl"></i><span>Home</span></button>
        <button data-nav="conference" class="nav-btn flex flex-col items-center text-sm px-4 py-1"><i class="fas fa-calendar text-xl"></i><span>Conference</span></button>
        <button data-nav="resources" class="nav-btn flex flex-col items-center text-sm px-4 py-1"><i class="fas fa-folder text-xl"></i><span>Resources</span></button>
        <button data-nav="community" class="nav-btn flex flex-col items-center text-sm px-4 py-1"><i class="fas fa-users text-xl"></i><span>Community</span></button>
      </div>
    </nav>
  </div>

  <script>
    // Supabase config
    const SUPABASE_URL = 'https://haxebhwcudkclyxsjaqx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheGViaHdjdWRrY2x5eHNqYXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDcyMjksImV4cCI6MjA5NjY4MzIyOX0.Iwu6NPRvnJtnfL4D_N2slvKOUidQ1UdLbUPG-4QCuM4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // App state
    let currentUser = null;
    let currentProfile = null;
    let currentView = 'home';
    let darkMode = localStorage.getItem('darkMode') === 'true';

    function showMessage(msg, type = 'info') {
      const alert = document.createElement('div');
      alert.className = `fixed bottom-20 right-4 z-50 px-4 py-2 rounded-lg shadow-lg text-white ${type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500'}`;
      alert.innerHTML = msg;
      document.body.appendChild(alert);
      setTimeout(() => alert.remove(), 3000);
    }

    function applyDarkMode() {
      if (darkMode) document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
      localStorage.setItem('darkMode', darkMode);
    }
    applyDarkMode();

    // Load notifications count
    async function loadNotifications() {
      if (!currentUser) return;
      const { data } = await supabase
        .from('notifications')
        .select('*')
        .eq('user_id', currentUser.id)
        .eq('read', false);
      
      const count = data?.length || 0;
      const badge = document.getElementById('notificationCount');
      if (badge) {
        if (count > 0) {
          badge.classList.remove('hidden');
          badge.textContent = count;
        } else {
          badge.classList.add('hidden');
        }
      }
    }

    // FIXED: Check auth and profile - THIS IS THE KEY FIX
    async function checkAuth() {
      try {
        const { data: { user }, error: userError } = await supabase.auth.getUser();
        
        if (userError || !user) {
          console.log('No user found, showing login');
          showLogin();
          return;
        }
        
        currentUser = user;
        console.log('User found:', user.id);
        
        // Try to get profile - using maybeSingle to avoid 406 error
        const { data: profile, error: profileError } = await supabase
          .from('profiles')
          .select('*')
          .eq('id', user.id)
          .maybeSingle();
        
        // If profile exists, use it
        if (profile && !profileError) {
          currentProfile = profile;
          console.log('Profile found:', currentProfile);
        } else {
          // Profile doesn't exist - create it automatically
          console.log('No profile found, creating one...');
          
          const newProfile = {
            id: user.id,
            full_name: user.user_metadata?.full_name || user.email?.split('@')[0] || 'User',
            email: user.email,
            role: 'member',
            avatar_url: `https://ui-avatars.com/api/?name=${encodeURIComponent(user.user_metadata?.full_name || user.email?.split('@')[0] || 'User')}&background=0A2E73&color=fff`,
            created_at: new Date().toISOString()
          };
          
          const { data: newProfileData, error: insertError } = await supabase
            .from('profiles')
            .insert([newProfile])
            .select()
            .single();
          
          if (insertError) {
            console.error('Error creating profile:', insertError);
            // Still try to continue with basic profile
            currentProfile = newProfile;
          } else {
            currentProfile = newProfileData;
          }
          
          console.log('Profile created:', currentProfile);
        }
        
        // Check if registration exists, if not create one
        const { data: existingReg } = await supabase
          .from('registrations')
          .select('*')
          .eq('user_id', user.id)
          .maybeSingle();
        
        if (!existingReg) {
          const conferenceId = 'AYF-' + Math.random().toString(36).substring(2, 10).toUpperCase();
          await supabase.from('registrations').insert([{
            user_id: user.id,
            conference_id: conferenceId,
            status: 'pending'
          }]);
        }
        
        // Show/hide admin link
        const isAdmin = currentProfile.role === 'super_admin' || 
                        currentProfile.role === 'conference_admin' || 
                        currentProfile.role === 'moderator' ||
                        currentProfile.role === 'archdeaconry_admin';
        const adminLink = document.getElementById('adminLink');
        if (adminLink) {
          if (isAdmin) adminLink.classList.remove('hidden');
          else adminLink.classList.add('hidden');
        }
        
        // Load notifications and render main view
        await loadNotifications();
        renderMainView();
        
      } catch (error) {
        console.error('Auth error:', error);
        showLogin();
      }
    }

    // Show login screen
    function showLogin() {
      const container = document.getElementById('appContainer');
      container.innerHTML = `
        <div class="flex items-center justify-center min-h-[80vh]">
          <div class="glass-card p-8 w-full max-w-md">
            <div class="text-center mb-8">
              <h2 class="text-3xl font-bold text-royal">AYF Conference</h2>
              <p class="text-gold mt-2">"If God Be For Us" - Romans 8:31</p>
              <p class="text-sm text-gray-500 mt-4">Saturday, June 27th, 2026 | 8:00 AM</p>
            </div>
            <div id="errorMsg" class="hidden bg-red-100 text-red-700 p-2 rounded mb-4"></div>
            <form id="loginForm">
              <input type="email" id="email" placeholder="Email Address" class="w-full p-3 rounded-xl border mb-3 dark:bg-gray-800" required>
              <input type="password" id="password" placeholder="Password" class="w-full p-3 rounded-xl border mb-4 dark:bg-gray-800" required>
              <button type="submit" class="w-full btn-royal text-white py-3 rounded-xl font-bold">Sign In</button>
            </form>
            <button id="googleBtn" class="w-full border border-gold/50 rounded-xl py-3 mt-3 flex justify-center gap-3 hover:bg-gold/10">
              <i class="fab fa-google text-gold"></i> Continue with Google
            </button>
            <div class="text-center mt-6">
              <a href="#" id="registerLink" class="text-gold hover:underline">Don't have an account? Register →</a>
              <a href="#" id="forgotLink" class="block text-sm text-gray-500 mt-2 hover:underline">Forgot Password?</a>
            </div>
          </div>
        </div>
      `;
      
      document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          document.getElementById('errorMsg').textContent = error.message;
          document.getElementById('errorMsg').classList.remove('hidden');
        } else {
          checkAuth();
        }
      };
      
      document.getElementById('googleBtn').onclick = async () => {
        await supabase.auth.signInWithOAuth({ 
          provider: 'google', 
          options: { redirectTo: window.location.origin } 
        });
      };
      
      document.getElementById('registerLink').onclick = (e) => {
        e.preventDefault();
        showRegistration();
      };
      
      document.getElementById('forgotLink').onclick = async (e) => {
        e.preventDefault();
        const email = prompt("Enter your registered email:");
        if (email) {
          const { error } = await supabase.auth.resetPasswordForEmail(email);
          if (error) showMessage(error.message, 'error');
          else showMessage("Password reset link sent to your email!", 'success');
        }
      };
    }

    // Show registration form
    function showRegistration() {
      const container = document.getElementById('appContainer');
      container.innerHTML = `
        <div class="flex items-center justify-center min-h-[80vh] p-4">
          <div class="glass-card p-6 w-full max-w-2xl max-h-[85vh] overflow-y-auto">
            <h2 class="text-2xl font-bold text-center mb-4">Conference Registration</h2>
            <p class="text-center text-gold mb-4">"If God Be For Us" - Romans 8:31</p>
            <form id="regForm" class="space-y-3">
              <input type="text" id="regName" placeholder="Full Name" class="w-full p-3 rounded-xl border dark:bg-gray-800" required>
              <input type="email" id="regEmail" placeholder="Email Address" class="w-full p-3 rounded-xl border dark:bg-gray-800" required>
              <input type="password" id="regPassword" placeholder="Password (min 6 characters)" class="w-full p-3 rounded-xl border dark:bg-gray-800" required>
              <input type="tel" id="regPhone" placeholder="Phone Number" class="w-full p-3 rounded-xl border dark:bg-gray-800" required>
              <select id="regGender" class="w-full p-3 rounded-xl border dark:bg-gray-800" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
              <select id="regAge" class="w-full p-3 rounded-xl border dark:bg-gray-800" required>
                <option value="">Age Range</option>
                <option value="13-17">13-17 years</option>
                <option value="18-25">18-25 years</option>
                <option value="26-35">26-35 years</option>
                <option value="36-45">36-45 years</option>
                <option value="46+">46+ years</option>
              </select>
              <input type="text" id="regParish" placeholder="Parish" class="w-full p-3 rounded-xl border dark:bg-gray-800" required>
              <input type="text" id="regPosition" placeholder="AYF Position (e.g., Member, Executive)" class="w-full p-3 rounded-xl border dark:bg-gray-800" required>
              <label class="flex items-center gap-2">
                <input type="checkbox" id="termsCheck"> I agree to the Terms & Conditions
              </label>
              <button type="submit" id="submitReg" disabled class="w-full bg-gray-400 text-white py-3 rounded-xl font-bold">Accept Terms to Register</button>
              <button type="button" id="backToLogin" class="w-full border border-gray-300 py-3 rounded-xl hover:bg-gray-100">Back to Login</button>
            </form>
          </div>
        </div>
      `;
      
      const termsCheck = document.getElementById('termsCheck');
      const submitBtn = document.getElementById('submitReg');
      termsCheck.onchange = () => {
        submitBtn.disabled = !termsCheck.checked;
        if (termsCheck.checked) {
          submitBtn.className = 'w-full btn-royal text-white py-3 rounded-xl font-bold';
        } else {
          submitBtn.className = 'w-full bg-gray-400 text-white py-3 rounded-xl font-bold';
        }
      };
      
      document.getElementById('regForm').onsubmit = async (e) => {
        e.preventDefault();
        if (!termsCheck.checked) {
          showMessage('Please accept terms', 'error');
          return;
        }
        
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const fullName = document.getElementById('regName').value;
        
        submitBtn.textContent = "Creating account...";
        submitBtn.disabled = true;
        
        const { data, error } = await supabase.auth.signUp({
          email, password,
          options: { 
            data: { 
              full_name: fullName,
              phone: document.getElementById('regPhone').value
            } 
          }
        });
        
        if (error) {
          showMessage(error.message, 'error');
          submitBtn.textContent = "Register";
          submitBtn.disabled = false;
          return;
        }
        
        if (data.user) {
          const conferenceId = 'AYF-' + Math.random().toString(36).substring(2, 10).toUpperCase();
          
          await supabase.from('profiles').insert([{
            id: data.user.id,
            full_name: fullName,
            email: email,
            phone: document.getElementById('regPhone').value,
            gender: document.getElementById('regGender').value,
            age_range: document.getElementById('regAge').value,
            parish: document.getElementById('regParish').value,
            ayf_position: document.getElementById('regPosition').value,
            role: 'member',
            avatar_url: `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName)}&background=0A2E73&color=fff`
          }]);
          
          await supabase.from('registrations').insert([{
            user_id: data.user.id,
            conference_id: conferenceId,
            status: 'pending'
          }]);
          
          showMessage('Registration successful! Please check your email to confirm.', 'success');
          setTimeout(() => showLogin(), 2000);
        }
      };
      
      document.getElementById('backToLogin').onclick = () => showLogin();
    }

    // Conference countdown
    function getConferenceCountdown() {
      const targetDate = new Date(2026, 5, 27, 8, 0, 0);
      const now = new Date();
      const diff = targetDate - now;
      if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0, ended: true };
      return {
        days: Math.floor(diff / (1000 * 60 * 60 * 24)),
        hours: Math.floor((diff % (86400000)) / 3600000),
        minutes: Math.floor((diff % 3600000) / 60000),
        seconds: Math.floor((diff % 60000) / 1000),
        ended: false
      };
    }

    function startCountdownTimer(elementId) {
      const updateTimer = () => {
        const element = document.getElementById(elementId);
        if (!element) return;
        const countdown = getConferenceCountdown();
        if (!countdown.ended) {
          element.innerHTML = `
            <div class="grid grid-cols-4 gap-3 text-center">
              <div class="countdown-number"><div class="text-2xl font-bold">${countdown.days}</div><div class="text-xs">Days</div></div>
              <div class="countdown-number"><div class="text-2xl font-bold">${countdown.hours}</div><div class="text-xs">Hours</div></div>
              <div class="countdown-number"><div class="text-2xl font-bold">${countdown.minutes}</div><div class="text-xs">Minutes</div></div>
              <div class="countdown-number"><div class="text-2xl font-bold">${countdown.seconds}</div><div class="text-xs">Seconds</div></div>
            </div>
          `;
        } else {
          element.innerHTML = `<div class="text-center text-gold text-xl font-bold">🎉 CONFERENCE IS HERE! 🎉</div>`;
        }
      };
      updateTimer();
      setInterval(updateTimer, 1000);
    }

    // Home feed
    async function renderHome() {
      const container = document.getElementById('appContainer');
      
      const { data: posts } = await supabase
        .from('posts')
        .select('*, profiles(full_name, avatar_url)')
        .order('created_at', { ascending: false });
      
      container.innerHTML = `
        <div class="glass-card p-4 mb-4">
          <h2 class="text-xl font-bold">Welcome, ${currentProfile?.full_name?.split(' ')[0] || 'User'}!</h2>
          <p class="text-gold text-sm">${currentProfile?.parish || 'Parish not set'} | ${currentProfile?.ayf_position || 'Member'}</p>
        </div>
        
        <button id="createPostBtn" class="glass-card p-4 mb-6 w-full text-left font-semibold hover:shadow-lg transition flex items-center gap-3">
          <i class="fas fa-pen-alt text-gold"></i> What's on your mind?
        </button>
        
        <div id="postsList" class="space-y-4">
          ${posts?.map(post => `
            <div class="glass-card p-4 post-card">
              <div class="flex gap-3 mb-3">
                <img src="${post.profiles?.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(post.profiles?.full_name || 'User')}" class="w-10 h-10 rounded-full object-cover">
                <div>
                  <b>${post.profiles?.full_name}</b>
                  <p class="text-xs text-gray-500">${new Date(post.created_at).toLocaleString()}</p>
                </div>
              </div>
              <p class="mb-3">${post.content}</p>
              <div class="flex gap-4 text-sm">
                <button class="like-btn text-gray-500 hover:text-gold" data-id="${post.id}"><i class="far fa-heart"></i> ${post.likes_count || 0}</button>
                <button class="comment-btn text-gray-500 hover:text-gold" data-id="${post.id}"><i class="far fa-comment"></i> ${post.comments_count || 0}</button>
              </div>
            </div>
          `).join('') || '<div class="glass-card p-8 text-center">No posts yet. Be the first to share!</div>'}
        </div>
      `;
      
      document.getElementById('createPostBtn')?.addEventListener('click', () => {
        const content = prompt("What's on your mind?");
        if (content?.trim()) {
          supabase.from('posts').insert([{ user_id: currentUser.id, content }]);
          showMessage('Post shared!', 'success');
          setTimeout(() => renderHome(), 500);
        }
      });
    }

    // Conference view
    async function renderConference() {
      const container = document.getElementById('appContainer');
      
      const { data: reg } = await supabase
        .from('registrations')
        .select('*')
        .eq('user_id', currentUser.id)
        .maybeSingle();
      
      container.innerHTML = `
        <div class="glass-card p-6 text-center mb-4">
          <h2 class="text-2xl font-bold">If God Be For Us</h2>
          <p class="text-gold mt-2">Romans 8:31</p>
          <p class="mt-4">Saturday, June 27th, 2026 | 8:00 AM</p>
          <p>Venue: St Philip Gwarimpa</p>
        </div>
        
        <div class="glass-card p-6 text-center mb-4">
          <h3 class="font-bold mb-3">Conference Countdown</h3>
          <div id="countdown" class="grid grid-cols-4 gap-2"></div>
        </div>
        
        <div class="glass-card p-6 text-center">
          <h3 class="font-bold mb-3">Your Conference Pass</h3>
          <div id="qrCode" class="flex justify-center mb-3"></div>
          <p class="font-bold">${reg?.conference_id || 'Pending Approval'}</p>
          <p class="mt-2">Status: ${reg?.status === 'approved' ? '<span class="text-green-500">✅ Approved</span>' : '<span class="text-yellow-500">⏳ Pending Approval</span>'}</p>
          ${reg?.check_in_time ? `<p class="text-green-500 mt-2"><i class="fas fa-check-circle"></i> Checked in at ${new Date(reg.check_in_time).toLocaleTimeString()}</p>` : ''}
        </div>
      `;
      
      startCountdownTimer('countdown');
      
      if (reg?.conference_id && document.getElementById('qrCode')) {
        new QRCode(document.getElementById('qrCode'), {
          text: reg.conference_id,
          width: 150,
          height: 150
        });
      }
    }

    // Resources view
    async function renderResources() {
      const container = document.getElementById('appContainer');
      
      const { data: docs } = await supabase.from('documents').select('*');
      
      container.innerHTML = `
        <div class="glass-card p-4 mb-4">
          <h2 class="text-xl font-bold"><i class="fas fa-folder-open text-gold mr-2"></i> Resources</h2>
        </div>
        <div class="space-y-3">
          ${docs?.map(doc => `
            <div class="glass-card p-4">
              <div class="flex items-center gap-3">
                <i class="fas ${doc.file_type === 'pdf' ? 'fa-file-pdf text-red-500 text-2xl' : 'fa-file-alt text-blue-500 text-2xl'}"></i>
                <div class="flex-1">
                  <h3 class="font-bold">${doc.title}</h3>
                  <p class="text-sm text-gray-500">${doc.description || ''}</p>
                </div>
                <button class="download-doc bg-gold/20 p-2 rounded" data-id="${doc.id}"><i class="fas fa-download"></i></button>
              </div>
            </div>
          `).join('') || '<div class="glass-card p-8 text-center">No documents available</div>'}
        </div>
      `;
    }

    // Community view
    async function renderCommunity() {
      const container = document.getElementById('appContainer');
      
      const { data: discussions } = await supabase
        .from('posts')
        .select('*, profiles(full_name, avatar_url)')
        .order('created_at', { ascending: false });
      
      container.innerHTML = `
        <div class="glass-card p-4 mb-4">
          <h2 class="text-xl font-bold"><i class="fas fa-users text-gold mr-2"></i> Community</h2>
          <p class="text-sm text-gray-500">Connect, share, and grow together in faith</p>
        </div>
        
        <div class="glass-card p-4 mb-4">
          <textarea id="discussionInput" rows="3" placeholder="Share a testimony or start a discussion..." class="w-full p-3 rounded-xl border dark:bg-gray-800"></textarea>
          <button id="postDiscussion" class="mt-3 btn-royal text-white px-6 py-2 rounded-xl w-full font-semibold">Post to Community</button>
        </div>
        
        <div class="space-y-4">
          ${discussions?.map(d => `
            <div class="glass-card p-4">
              <div class="flex gap-3 mb-3">
                <img src="${d.profiles?.avatar_url}" class="w-10 h-10 rounded-full" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(d.profiles?.full_name || 'User')}&background=0A2E73&color=fff'">
                <div><b>${d.profiles?.full_name}</b><p class="text-xs text-gray-500">${new Date(d.created_at).toLocaleString()}</p></div>
              </div>
              <p>${d.content}</p>
            </div>
          `).join('') || '<div class="glass-card p-8 text-center">No discussions yet</div>'}
        </div>
      `;
      
      document.getElementById('postDiscussion')?.addEventListener('click', async () => {
        const content = document.getElementById('discussionInput')?.value;
        if (content?.trim()) {
          await supabase.from('posts').insert([{ user_id: currentUser.id, content }]);
          document.getElementById('discussionInput').value = '';
          showMessage('Posted to community!', 'success');
          renderCommunity();
        }
      });
    }

    // Profile view
    function renderProfile() {
      const container = document.getElementById('appContainer');
      container.innerHTML = `
        <div class="glass-card p-6 text-center">
          <img src="${currentProfile?.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(currentProfile?.full_name || 'User')}&background=0A2E73&color=fff&size=100" class="w-24 h-24 rounded-full mx-auto border-4 border-gold mb-4">
          <h2 class="text-2xl font-bold">${currentProfile?.full_name || 'User'}</h2>
          <p class="text-gold">${currentProfile?.parish || 'Parish not set'}</p>
          <p class="text-gray-600 dark:text-gray-400 mt-2">${currentProfile?.ayf_position || 'Member'}</p>
          <div class="mt-4 pt-4 border-t border-gold/20">
            <p><i class="fas fa-envelope text-gold mr-2"></i> ${currentProfile?.email}</p>
            <p class="mt-2"><i class="fas fa-phone text-gold mr-2"></i> ${currentProfile?.phone || 'Not provided'}</p>
            <p class="mt-2"><i class="fas fa-venus-mars text-gold mr-2"></i> ${currentProfile?.gender || 'Not specified'}</p>
            <p class="mt-2"><i class="fas fa-calendar-alt text-gold mr-2"></i> ${currentProfile?.age_range || 'Not specified'}</p>
          </div>
        </div>
      `;
    }

    // Main render function
    async function renderMainView() {
      if (!currentProfile) {
        checkAuth();
        return;
      }
      
      if (currentView === 'home') await renderHome();
      else if (currentView === 'conference') await renderConference();
      else if (currentView === 'resources') await renderResources();
      else if (currentView === 'community') await renderCommunity();
      else if (currentView === 'profile') renderProfile();
      
      // Highlight active nav
      document.querySelectorAll('.nav-btn').forEach(btn => {
        if (btn.dataset.nav === currentView) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }

    // Event listeners
    document.getElementById('darkModeToggle')?.addEventListener('click', () => {
      darkMode = !darkMode;
      applyDarkMode();
    });
    
    document.getElementById('userMenuBtn')?.addEventListener('click', (e) => {
      e.stopPropagation();
      const dropdown = document.getElementById('userDropdown');
      dropdown.classList.toggle('hidden');
    });
    
    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('userDropdown');
      const userBtn = document.getElementById('userMenuBtn');
      if (dropdown && !dropdown.classList.contains('hidden') && 
          !userBtn?.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.add('hidden');
      }
    });
    
    document.getElementById('profileLink')?.addEventListener('click', (e) => {
      e.preventDefault();
      currentView = 'profile';
      renderMainView();
      document.getElementById('userDropdown').classList.add('hidden');
    });
    
    document.getElementById('adminLink')?.addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = '/admin.html';
    });
    
    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.reload();
    });
    
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentView = btn.dataset.nav;
        renderMainView();
      });
    });
    
    document.getElementById('notificationsBtn')?.addEventListener('click', async () => {
      const { data } = await supabase
        .from('notifications')
        .select('*')
        .eq('user_id', currentUser?.id)
        .order('created_at', { ascending: false });
      
      if (data?.length) {
        alert(data.map(n => `${n.title}: ${n.message}`).join('\n\n'));
        await supabase.from('notifications').update({ read: true }).eq('user_id', currentUser.id);
        loadNotifications();
      } else {
        alert('No notifications');
      }
    });
    
    // Start the app
    checkAuth();
  </script>
</body>
</html>
