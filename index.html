<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A2E73">
  <title>AYF Conference 2026 | Gwarimpa Archdeaconry</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- QR Code -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    body { background: #f5f5f0; }
    .dark body { background: #1a1a1a; }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 1.5rem;
      transition: all 0.3s ease;
    }
    .dark .glass-card { background: rgba(30, 30, 30, 0.95); }
    
    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    
    .btn-gold {
      background: linear-gradient(135deg, #D4AF37, #C5A028);
      transition: all 0.3s ease;
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
    
    .btn-royal {
      background: linear-gradient(135deg, #0A2E73, #0d3a8a);
      transition: all 0.3s ease;
    }
    .btn-royal:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(10, 46, 115, 0.3); }
    
    .loader {
      border: 3px solid #e0e0e0;
      border-top: 3px solid #D4AF37;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fadeInUp { animation: fadeInUp 0.5s ease-out forwards; }
    
    .nav-btn {
      transition: all 0.3s ease;
      position: relative;
    }
    .nav-btn:hover { transform: translateY(-3px); color: #D4AF37; }
    .nav-btn.active { color: #D4AF37; }
    .nav-btn.active::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 3px;
      background: #D4AF37;
      border-radius: 3px;
    }
    
    .notification-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #ef4444;
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .countdown-number {
      background: linear-gradient(135deg, #0A2E73, #1a4a9e);
      border-radius: 16px;
      padding: 14px 8px;
      text-align: center;
      transition: all 0.3s ease;
    }
    .countdown-number:hover { transform: translateY(-3px); }
    
    .post-card {
      transition: all 0.3s ease;
    }
    .post-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .notification-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 380px;
      height: 100vh;
      background: white;
      box-shadow: -5px 0 30px rgba(0,0,0,0.2);
      z-index: 1000;
      transition: right 0.3s ease;
      overflow-y: auto;
    }
    .dark .notification-panel { background: #1a1a1a; }
    .notification-panel.open { right: 0; }
    
    .notification-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
    }
    .notification-overlay.show { display: block; }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1100;
      animation: fadeInUp 0.3s ease-out;
    }
    
    input, select, textarea {
      transition: all 0.3s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #D4AF37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
    }
  </style>
</head>
<body class="text-gray-800 dark:text-white">

  <!-- Notification Panel -->
  <div id="notificationOverlay" class="notification-overlay"></div>
  <div id="notificationPanel" class="notification-panel">
    <div class="sticky top-0 bg-white dark:bg-gray-800 border-b border-gold/20 p-4 flex justify-between items-center">
      <h3 class="font-bold text-lg"><i class="fas fa-bell text-gold mr-2"></i>Notifications</h3>
      <button id="closeNotificationPanel" class="text-gray-500 hover:text-gold text-2xl">&times;</button>
    </div>
    <div id="notificationList" class="p-4 space-y-3"></div>
  </div>

  <div id="root" class="pb-20">
    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/95 dark:bg-gray-800/95 backdrop-blur-md border-b border-gold/20 shadow-sm">
      <div class="flex justify-between items-center px-4 py-3 max-w-7xl mx-auto">
        <div>
          <h1 class="font-bold text-lg">AYF Conference 2026</h1>
          <p class="text-xs text-gold">"If God Be For Us" - Romans 8:31</p>
        </div>
        <div class="flex gap-4">
          <button id="darkModeToggle" class="text-xl transition-transform hover:scale-110"><i class="fas fa-moon"></i></button>
          <button id="notificationsBtn" class="text-xl relative transition-transform hover:scale-110">
            <i class="fas fa-bell"></i>
            <span id="notificationCount" class="notification-badge hidden">0</span>
          </button>
          <button id="userMenuBtn" class="text-xl transition-transform hover:scale-110"><i class="fas fa-user-circle"></i></button>
        </div>
      </div>
    </header>

    <!-- User Dropdown -->
    <div id="userDropdown" class="hidden fixed right-4 top-16 w-56 bg-white dark:bg-gray-800 rounded-xl shadow-lg z-50 border border-gold/20">
      <a href="#" id="profileDropdownLink" class="block px-4 py-2 hover:bg-gold/10 transition-colors"><i class="fas fa-user mr-2"></i> Profile</a>
      <a href="#" id="adminDropdownLink" class="admin-only hidden block px-4 py-2 hover:bg-gold/10 transition-colors"><i class="fas fa-shield-alt mr-2"></i> Admin Panel</a>
      <a href="#" id="termsDropdownLink" class="block px-4 py-2 hover:bg-gold/10 transition-colors"><i class="fas fa-file-contract mr-2"></i> Terms & Conditions</a>
      <a href="#" id="privacyDropdownLink" class="block px-4 py-2 hover:bg-gold/10 transition-colors"><i class="fas fa-shield-alt mr-2"></i> Privacy Policy</a>
      <hr class="my-1 border-gold/20">
      <button id="logoutBtn" class="w-full text-left px-4 py-2 hover:bg-red-50 dark:hover:bg-red-900/30 text-red-600 transition-colors"><i class="fas fa-sign-out-alt mr-2"></i> Logout</button>
    </div>

    <!-- Main Content -->
    <main id="appContainer" class="max-w-7xl mx-auto px-4 py-6">
      <div class="flex justify-center items-center min-h-[60vh]">
        <div class="loader"></div>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-gray-800/95 backdrop-blur-md border-t border-gold/30 z-40">
      <div class="flex justify-around py-2">
        <button data-nav="home" class="nav-btn flex flex-col items-center text-xs px-4 py-1"><i class="fas fa-home text-xl"></i><span>Home</span></button>
        <button data-nav="conference" class="nav-btn flex flex-col items-center text-xs px-4 py-1"><i class="fas fa-calendar-alt text-xl"></i><span>Conference</span></button>
        <button data-nav="resources" class="nav-btn flex flex-col items-center text-xs px-4 py-1"><i class="fas fa-folder-open text-xl"></i><span>Resources</span></button>
        <button data-nav="community" class="nav-btn flex flex-col items-center text-xs px-4 py-1"><i class="fas fa-users text-xl"></i><span>Community</span></button>
      </div>
    </nav>
  </div>

  <script>
    // =====================================================
    // SUPABASE CONFIGURATION
    // =====================================================
    const SUPABASE_URL = 'https://haxebhwcudkclyxsjaqx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheGViaHdjdWRrY2x5eHNqYXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDcyMjksImV4cCI6MjA5NjY4MzIyOX0.Iwu6NPRvnJtnfL4D_N2slvKOUidQ1UdLbUPG-4QCuM4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =====================================================
    // GLOBAL STATE
    // =====================================================
    let currentUser = null;
    let currentProfile = null;
    let currentView = 'home';
    let darkMode = localStorage.getItem('darkMode') === 'true';
    let likedPosts = new Set();

    // =====================================================
    // HELPER FUNCTIONS
    // =====================================================
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      const colors = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        info: 'bg-blue-500',
        warning: 'bg-yellow-500'
      };
      toast.className = `toast ${colors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3`;
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function applyDarkMode() {
      if (darkMode) document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
      localStorage.setItem('darkMode', darkMode);
    }
    applyDarkMode();

    // =====================================================
    // NOTIFICATIONS
    // =====================================================
    async function loadNotifications() {
      if (!currentUser) return;
      try {
        const { data } = await supabase
          .from('notifications')
          .select('*')
          .eq('user_id', currentUser.id)
          .eq('read', false)
          .order('created_at', { ascending: false });
        
        const count = data?.length || 0;
        const badge = document.getElementById('notificationCount');
        if (badge) {
          if (count > 0) {
            badge.classList.remove('hidden');
            badge.textContent = count > 9 ? '9+' : count;
          } else {
            badge.classList.add('hidden');
          }
        }
        return data || [];
      } catch(e) { return []; }
    }

    async function showNotificationPanel() {
      const notifications = await loadNotifications();
      const panel = document.getElementById('notificationPanel');
      const overlay = document.getElementById('notificationOverlay');
      const list = document.getElementById('notificationList');
      
      if (notifications.length === 0) {
        list.innerHTML = '<div class="text-center text-gray-500 py-8"><i class="fas fa-bell-slash text-4xl mb-2 block"></i>No new notifications</div>';
      } else {
        list.innerHTML = notifications.map(n => `
          <div class="bg-gray-50 dark:bg-gray-700 p-3 rounded-lg">
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-full bg-gold/20 flex items-center justify-center">
                <i class="fas fa-bell text-gold"></i>
              </div>
              <div class="flex-1">
                <h4 class="font-semibold text-sm">${escapeHtml(n.title)}</h4>
                <p class="text-xs text-gray-500 mt-1">${escapeHtml(n.message)}</p>
                <span class="text-xs text-gold mt-1 block">${new Date(n.created_at).toLocaleString()}</span>
              </div>
            </div>
          </div>
        `).join('');
        
        setTimeout(async () => {
          await supabase.from('notifications').update({ read: true }).eq('user_id', currentUser.id);
          const badge = document.getElementById('notificationCount');
          if (badge) badge.classList.add('hidden');
        }, 2000);
      }
      
      panel.classList.add('open');
      overlay.classList.add('show');
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // =====================================================
    // AUTHENTICATION
    // =====================================================
    async function checkAuth() {
      try {
        const { data: { user }, error: userError } = await supabase.auth.getUser();
        
        if (userError || !user) {
          showLogin();
          return;
        }
        
        currentUser = user;
        
        // Get or create profile
        let { data: profile, error: profileError } = await supabase
          .from('profiles')
          .select('*')
          .eq('id', user.id)
          .maybeSingle();
        
        if (profileError || !profile) {
          // Create profile
          const newProfile = {
            id: user.id,
            full_name: user.user_metadata?.full_name || user.email?.split('@')[0] || 'User',
            email: user.email,
            phone: user.user_metadata?.phone || '',
            role: 'member',
            avatar_url: `https://ui-avatars.com/api/?name=${encodeURIComponent(user.user_metadata?.full_name || user.email?.split('@')[0] || 'User')}&background=0A2E73&color=fff`,
            created_at: new Date().toISOString()
          };
          
          const { data: newProfile } = await supabase
            .from('profiles')
            .insert([newProfile])
            .select()
            .single();
          
          currentProfile = newProfile || newProfile;
        } else {
          currentProfile = profile;
        }
        
        // Ensure registration exists
        const { data: existingReg } = await supabase
          .from('registrations')
          .select('*')
          .eq('user_id', user.id)
          .maybeSingle();
        
        if (!existingReg) {
          const conferenceId = 'AYF-' + Math.random().toString(36).substring(2, 10).toUpperCase();
          await supabase.from('registrations').insert([{
            user_id: user.id,
            conference_id: conferenceId,
            status: 'pending'
          }]);
        }
        
        // Show/hide admin link
        const isAdmin = ['super_admin', 'conference_admin', 'moderator', 'archdeaconry_admin'].includes(currentProfile.role);
        const adminLink = document.getElementById('adminDropdownLink');
        if (adminLink) {
          if (isAdmin) adminLink.classList.remove('hidden');
          else adminLink.classList.add('hidden');
        }
        
        await loadNotifications();
        renderMainView();
        
      } catch (error) {
        console.error('Auth error:', error);
        showLogin();
      }
    }

    function showLogin() {
      const container = document.getElementById('appContainer');
      container.innerHTML = `
        <div class="flex items-center justify-center min-h-[80vh] animate-fadeInUp">
          <div class="glass-card p-8 w-full max-w-md">
            <div class="text-center mb-8">
              <h2 class="text-3xl font-bold text-royal">AYF Conference</h2>
              <p class="text-gold mt-2">"If God Be For Us" - Romans 8:31</p>
              <p class="text-sm text-gray-500 mt-4">Saturday, June 27th, 2026 | 8:00 AM</p>
            </div>
            <div id="errorMsg" class="hidden bg-red-100 text-red-700 p-2 rounded mb-4"></div>
            <form id="loginForm">
              <input type="email" id="email" placeholder="Email Address" class="w-full p-3 rounded-xl border mb-3 dark:bg-gray-800 focus:ring-2 focus:ring-gold" required>
              <input type="password" id="password" placeholder="Password" class="w-full p-3 rounded-xl border mb-4 dark:bg-gray-800 focus:ring-2 focus:ring-gold" required>
              <button type="submit" class="w-full btn-royal text-white py-3 rounded-xl font-bold">Sign In</button>
            </form>
            <button id="googleBtn" class="w-full border border-gold/50 rounded-xl py-3 mt-3 flex justify-center gap-3 hover:bg-gold/10 transition">
              <i class="fab fa-google text-gold"></i> Continue with Google
            </button>
            <div class="text-center mt-6">
              <a href="#" id="registerLink" class="text-gold hover:underline">Don't have an account? Register →</a>
              <a href="#" id="forgotLink" class="block text-sm text-gray-500 mt-2 hover:underline">Forgot Password?</a>
            </div>
          </div>
        </div>
      `;
      
      document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          document.getElementById('errorMsg').textContent = error.message;
          document.getElementById('errorMsg').classList.remove('hidden');
        } else {
          checkAuth();
        }
      };
      
      document.getElementById('googleBtn').onclick = async () => {
        await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
      };
      
      document.getElementById('registerLink').onclick = (e) => {
        e.preventDefault();
        showRegistration();
      };
      
      document.getElementById('forgotLink').onclick = async (e) => {
        e.preventDefault();
        const email = prompt("Enter your registered email:");
        if (email) {
          const { error } = await supabase.auth.resetPasswordForEmail(email);
          if (error) showToast(error.message, 'error');
          else showToast("Password reset link sent to your email!", 'success');
        }
      };
    }

    function showRegistration() {
      const container = document.getElementById('appContainer');
      container.innerHTML = `
        <div class="flex items-center justify-center min-h-[80vh] p-4">
          <div class="glass-card p-6 w-full max-w-2xl max-h-[85vh] overflow-y-auto">
            <h2 class="text-2xl font-bold text-center mb-4">Conference Registration</h2>
            <p class="text-center text-gold mb-4">"If God Be For Us" - Romans 8:31</p>
            <form id="regForm" class="space-y-3">
              <input type="text" id="regName" placeholder="Full Name" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold" required>
              <input type="email" id="regEmail" placeholder="Email Address" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold" required>
              <input type="password" id="regPassword" placeholder="Password (min 6 characters)" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold" required>
              <input type="tel" id="regPhone" placeholder="Phone Number" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold" required>
              <select id="regGender" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
              <select id="regAge" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold" required>
                <option value="">Age Range</option>
                <option value="13-17">13-17 years</option>
                <option value="18-25">18-25 years</option>
                <option value="26-35">26-35 years</option>
                <option value="36-45">36-45 years</option>
                <option value="46+">46+ years</option>
              </select>
              <input type="text" id="regParish" placeholder="Parish" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold" required>
              <input type="text" id="regPosition" placeholder="AYF Position (e.g., Member, Executive)" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold" required>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" id="termsCheck"> 
                <span class="text-sm">I agree to the <a href="#" class="text-gold">Terms & Conditions</a></span>
              </label>
              <button type="submit" id="submitReg" disabled class="w-full bg-gray-400 text-white py-3 rounded-xl font-bold">Accept Terms to Register</button>
              <button type="button" id="backToLogin" class="w-full border border-gray-300 py-3 rounded-xl hover:bg-gray-100 transition">Back to Login</button>
            </form>
          </div>
        </div>
      `;
      
      const termsCheck = document.getElementById('termsCheck');
      const submitBtn = document.getElementById('submitReg');
      termsCheck.onchange = () => {
        submitBtn.disabled = !termsCheck.checked;
        if (termsCheck.checked) {
          submitBtn.className = 'w-full btn-royal text-white py-3 rounded-xl font-bold';
        } else {
          submitBtn.className = 'w-full bg-gray-400 text-white py-3 rounded-xl font-bold';
        }
      };
      
      document.getElementById('regForm').onsubmit = async (e) => {
        e.preventDefault();
        if (!termsCheck.checked) {
          showToast('Please accept terms', 'error');
          return;
        }
        
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const fullName = document.getElementById('regName').value;
        
        submitBtn.textContent = "Creating account...";
        submitBtn.disabled = true;
        
        const { data, error } = await supabase.auth.signUp({
          email, password,
          options: { data: { full_name: fullName, phone: document.getElementById('regPhone').value } }
        });
        
        if (error) {
          showToast(error.message, 'error');
          submitBtn.textContent = "Register";
          submitBtn.disabled = false;
          return;
        }
        
        if (data.user) {
          const conferenceId = 'AYF-' + Math.random().toString(36).substring(2, 10).toUpperCase();
          
          await supabase.from('profiles').insert([{
            id: data.user.id,
            full_name: fullName,
            email: email,
            phone: document.getElementById('regPhone').value,
            gender: document.getElementById('regGender').value,
            age_range: document.getElementById('regAge').value,
            parish: document.getElementById('regParish').value,
            ayf_position: document.getElementById('regPosition').value,
            role: 'member',
            avatar_url: `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName)}&background=0A2E73&color=fff`
          }]);
          
          await supabase.from('registrations').insert([{
            user_id: data.user.id,
            conference_id: conferenceId,
            status: 'pending'
          }]);
          
          showToast('Registration successful! Please check your email to confirm.', 'success');
          setTimeout(() => showLogin(), 2000);
        }
      };
      
      document.getElementById('backToLogin').onclick = () => showLogin();
    }

    // =====================================================
    // COUNTDOWN TIMER
    // =====================================================
    function getConferenceCountdown() {
      const targetDate = new Date(2026, 5, 27, 8, 0, 0);
      const now = new Date();
      const diff = targetDate - now;
      if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0, ended: true };
      return {
        days: Math.floor(diff / (1000 * 60 * 60 * 24)),
        hours: Math.floor((diff % (86400000)) / 3600000),
        minutes: Math.floor((diff % 3600000) / 60000),
        seconds: Math.floor((diff % 60000) / 1000),
        ended: false
      };
    }

    function startCountdownTimer(elementId) {
      const updateTimer = () => {
        const element = document.getElementById(elementId);
        if (!element) return;
        const countdown = getConferenceCountdown();
        if (!countdown.ended) {
          element.innerHTML = `
            <div class="grid grid-cols-4 gap-3 text-center">
              <div class="countdown-number"><div class="text-2xl font-bold">${countdown.days}</div><div class="text-xs">Days</div></div>
              <div class="countdown-number"><div class="text-2xl font-bold">${countdown.hours}</div><div class="text-xs">Hours</div></div>
              <div class="countdown-number"><div class="text-2xl font-bold">${countdown.minutes}</div><div class="text-xs">Minutes</div></div>
              <div class="countdown-number"><div class="text-2xl font-bold">${countdown.seconds}</div><div class="text-xs">Seconds</div></div>
            </div>
          `;
        } else {
          element.innerHTML = `<div class="text-center text-gold text-xl font-bold animate-pulse">🎉 CONFERENCE IS HERE! 🎉</div>`;
        }
      };
      updateTimer();
      setInterval(updateTimer, 1000);
    }

    // =====================================================
    // HOME FEED
    // =====================================================
    async function renderHome() {
      const container = document.getElementById('appContainer');
      
      const { data: posts } = await supabase
        .from('posts')
        .select('*, profiles(full_name, avatar_url, role)')
        .order('created_at', { ascending: false });
      
      // Get liked posts
      const { data: userLikes } = await supabase.from('likes').select('post_id').eq('user_id', currentUser.id);
      likedPosts = new Set(userLikes?.map(l => l.post_id) || []);
      
      container.innerHTML = `
        <div class="glass-card p-5 mb-6 bg-gradient-to-r from-royal/20 to-gold/20 animate-fadeInUp">
          <h2 class="text-2xl font-bold">Welcome, ${currentProfile?.full_name?.split(' ')[0] || 'User'}!</h2>
          <p class="text-gold font-medium">"If God Be For Us" - Conference 2026</p>
          <p class="text-sm text-gray-600 dark:text-gray-400">${currentProfile?.parish || 'Parish not set'} | ${currentProfile?.ayf_position || 'Member'}</p>
        </div>
        
        <button id="createPostBtn" class="glass-card p-4 mb-6 w-full text-left font-semibold hover:shadow-lg transition flex items-center gap-3 group">
          <i class="fas fa-pen-alt text-gold text-xl group-hover:scale-110 transition"></i>
          <span>What's on your mind, ${currentProfile?.full_name?.split(' ')[0] || 'User'}?</span>
        </button>
        
        <div id="postsList" class="space-y-4">
          ${posts?.map(post => `
            <div class="glass-card p-4 post-card animate-fadeInUp">
              <div class="flex gap-3 mb-3">
                <img src="${post.profiles?.avatar_url}" class="w-12 h-12 rounded-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(post.profiles?.full_name || 'User')}&background=0A2E73&color=fff'">
                <div class="flex-1">
                  <div class="flex items-center gap-2">
                    <b class="text-lg">${escapeHtml(post.profiles?.full_name)}</b>
                    ${post.profiles?.role === 'super_admin' ? '<span class="text-xs bg-gold/20 px-2 py-0.5 rounded-full">Admin</span>' : ''}
                  </div>
                  <p class="text-xs text-gray-500">${new Date(post.created_at).toLocaleString()}</p>
                </div>
              </div>
              <p class="text-gray-700 dark:text-gray-300 mb-3">${escapeHtml(post.content)}</p>
              ${post.image_url ? `<img src="${post.image_url}" class="mb-3 rounded-lg max-h-64">` : ''}
              <div class="flex gap-6 pt-3 border-t border-gray-200 dark:border-gray-700">
                <button data-like="${post.id}" class="like-btn flex items-center gap-2 hover:text-gold transition ${likedPosts.has(post.id) ? 'text-red-500' : ''}">
                  <i class="fas fa-heart ${likedPosts.has(post.id) ? 'text-red-500' : ''}"></i> <span>${post.likes_count || 0}</span>
                </button>
                <button data-comment="${post.id}" class="comment-toggle flex items-center gap-2 hover:text-gold transition">
                  <i class="far fa-comment"></i> <span>${post.comments_count || 0}</span>
                </button>
              </div>
              <div id="comments-${post.id}" class="hidden mt-4 pt-3 border-t border-gray-200 dark:border-gray-700">
                <div id="commentList-${post.id}" class="mb-3 max-h-64 overflow-y-auto space-y-2"></div>
                <div class="flex gap-2">
                  <input type="text" id="commentInput-${post.id}" placeholder="Write a comment..." class="flex-1 p-2 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold">
                  <button data-comment-post="${post.id}" class="submit-comment btn-royal text-white px-4 py-2 rounded-xl">Post</button>
                </div>
              </div>
            </div>
          `).join('') || '<div class="glass-card p-8 text-center">No posts yet. Be the first to share!</div>'}
        </div>
      `;
      
      // Create post modal
      let selectedImage = null;
      const modalHtml = `
        <div id="postModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden p-4">
          <div class="glass-card w-full max-w-lg p-6">
            <div class="flex justify-between items-center mb-4">
              <h2 class="text-xl font-bold">Create Post</h2>
              <button id="closeModal" class="text-gray-500 text-2xl hover:text-gold">&times;</button>
            </div>
            <textarea id="postContent" rows="4" placeholder="What's on your mind?" class="w-full p-3 rounded-xl border dark:bg-gray-800 mb-3"></textarea>
            <div id="imagePreview" class="hidden mb-3 relative">
              <img id="previewImg" class="rounded-xl max-h-48">
              <button id="removeImage" class="absolute top-2 right-2 bg-red-500 text-white rounded-full w-6 h-6">&times;</button>
            </div>
            <div class="flex gap-3">
              <button id="uploadImageBtn" class="flex-1 border rounded-xl py-2 hover:bg-gold/10 transition"><i class="fas fa-image"></i> Add Image</button>
              <input type="file" id="imageInput" accept="image/*" class="hidden">
              <button id="submitPost" class="flex-1 btn-gold text-white rounded-xl py-2 font-bold">Post</button>
            </div>
          </div>
        </div>
      `;
      
      if (!document.getElementById('postModal')) {
        document.body.insertAdjacentHTML('beforeend', modalHtml);
      }
      
      const postModal = document.getElementById('postModal');
      const postContent = document.getElementById('postContent');
      const imageInput = document.getElementById('imageInput');
      const imagePreview = document.getElementById('imagePreview');
      const previewImg = document.getElementById('previewImg');
      
      document.getElementById('createPostBtn').onclick = () => postModal.classList.remove('hidden');
      document.getElementById('closeModal').onclick = () => {
        postModal.classList.add('hidden');
        if (postContent) postContent.value = '';
        if (imagePreview) imagePreview.classList.add('hidden');
        selectedImage = null;
      };
      document.getElementById('uploadImageBtn').onclick = () => imageInput.click();
      imageInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            selectedImage = ev.target.result;
            previewImg.src = selectedImage;
            imagePreview.classList.remove('hidden');
          };
          reader.readAsDataURL(file);
        }
      };
      document.getElementById('removeImage').onclick = () => {
        selectedImage = null;
        imagePreview.classList.add('hidden');
        imageInput.value = '';
      };
      document.getElementById('submitPost').onclick = async () => {
        const content = postContent?.value;
        if (!content?.trim() && !selectedImage) return;
        
        const postData = { user_id: currentUser.id, content: content || '' };
        if (selectedImage) postData.image_url = selectedImage;
        
        await supabase.from('posts').insert([postData]);
        postModal.classList.add('hidden');
        postContent.value = '';
        imagePreview.classList.add('hidden');
        selectedImage = null;
        showToast('Post shared!', 'success');
        renderHome();
      };
      
      // Like handler
      document.querySelectorAll('.like-btn').forEach(btn => {
        btn.onclick = async () => {
          const postId = btn.dataset.like;
          const isLiked = likedPosts.has(postId);
          
          if (isLiked) {
            await supabase.from('likes').delete().eq('user_id', currentUser.id).eq('post_id', postId);
            likedPosts.delete(postId);
          } else {
            await supabase.from('likes').insert([{ user_id: currentUser.id, post_id: postId }]);
            likedPosts.add(postId);
          }
          
          const { data } = await supabase.from('posts').select('likes_count').eq('id', postId).single();
          btn.querySelector('span').textContent = data?.likes_count || 0;
          const icon = btn.querySelector('i');
          if (icon) {
            if (!isLiked) icon.classList.add('text-red-500');
            else icon.classList.remove('text-red-500');
          }
        };
      });
      
      // Comment toggle handler
      document.querySelectorAll('.comment-toggle').forEach(btn => {
        btn.onclick = async () => {
          const postId = btn.dataset.comment;
          const div = document.getElementById(`comments-${postId}`);
          if (div.classList.contains('hidden')) {
            div.classList.remove('hidden');
            const { data: comments } = await supabase
              .from('comments')
              .select('*, profiles(full_name, avatar_url)')
              .eq('post_id', postId)
              .order('created_at', { ascending: true });
            const commentList = document.getElementById(`commentList-${postId}`);
            if (commentList) {
              commentList.innerHTML = comments?.map(c => `
                <div class="flex gap-2"><img src="${c.profiles?.avatar_url}" class="w-6 h-6 rounded-full"><div><b class="text-sm">${c.profiles?.full_name}</b><p class="text-sm">${c.content}</p></div></div>
              `).join('') || '<p class="text-sm text-gray-500">No comments yet</p>';
            }
          } else {
            div.classList.add('hidden');
          }
        };
      });
      
      // Submit comment handler
      document.querySelectorAll('.submit-comment').forEach(btn => {
        btn.onclick = async () => {
          const postId = btn.dataset.commentPost;
          const input = document.getElementById(`commentInput-${postId}`);
          if (input?.value.trim()) {
            await supabase.from('comments').insert([{ post_id: postId, user_id: currentUser.id, content: input.value }]);
            input.value = '';
            const countSpan = document.querySelector(`.comment-toggle[data-comment="${postId}"] span`);
            if (countSpan) countSpan.textContent = parseInt(countSpan.textContent) + 1;
            document.getElementById(`comments-${postId}`).classList.add('hidden');
            showToast('Comment posted!', 'success');
          }
        };
      });
    }

                <div class="flex items-center gap-3 p-3 bg-white/50 dark:bg-gray-800/50 rounded-xl"><div class="w-12 h-12 rounded-full bg-gold/20 flex items-center justify-center"><i class="fas fa-user text-gold text-xl"></i></div><div><div class="font-bold">Bro. Avan</div><div class="text-sm text-gold">Vice President</div></div></div>

          <div class="glass-card p-5 text-center">

    // =====================================================
    // RESOURCES VIEW
    // =====================================================
    async function renderResources() {
      const container = document.getElementById('appContainer');
      
      const { data: docs } = await supabase.from('documents').select('*');
      
      container.innerHTML = `
        <div class="glass-card p-4 mb-4 animate-fadeInUp">
          <h2 class="text-xl font-bold"><i class="fas fa-folder-open text-gold mr-2"></i> Resource Center</h2>
          <input type="text" id="searchDocs" placeholder="Search documents..." class="w-full p-3 rounded-xl border dark:bg-gray-800 mt-3 focus:ring-2 focus:ring-gold">
        </div>
        <div class="grid gap-3 md:grid-cols-2" id="documentsList">
          ${docs?.map(doc => `
            <div class="glass-card p-4 document-item" data-title="${doc.title?.toLowerCase()}">
              <div class="flex items-start gap-3">
                <div class="text-3xl"><i class="fas ${doc.file_type === 'pdf' ? 'fa-file-pdf text-red-500' : 'fa-file-alt text-blue-500'}"></i></div>
                <div class="flex-1">
                  <h3 class="font-bold">${escapeHtml(doc.title)}</h3>
                  <p class="text-xs text-gray-500">${escapeHtml(doc.description) || ''}</p>
                  <div class="flex gap-3 mt-2 text-xs"><span><i class="far fa-eye"></i> ${doc.views || 0}</span><span><i class="fas fa-download"></i> ${doc.downloads || 0}</span></div>

                <button data-doc="${doc.id}" class="download-doc bg-gold/20 p-2 rounded-xl hover:scale-110 transition"><i class="fas fa-download"></i></button>

            </div>
          `).join('') || '<div class="glass-card p-8 text-center">No documents available</div>'}
        </div>
      `;
      
      document.getElementById('searchDocs')?.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.document-item').forEach(item => {
          const title = item.dataset.title;
          item.style.display = title?.includes(term) ? '' : 'none';
        });
      });
      
      document.querySelectorAll('.download-doc').forEach(btn => {
        btn.onclick = () => showToast('Download started', 'success');
      });
    }

    // =====================================================
    // COMMUNITY VIEW
    // =====================================================

        .from('posts')
        .select('*, profiles(full_name, avatar_url)')
        .order('created_at', { ascending: false });

        <div class="glass-card p-4 mb-4 animate-fadeInUp">

        <div class="glass-card p-4 mb-4 animate-fadeInUp">
          <textarea id="discussionInput" rows="3" placeholder="Share a testimony or start a discussion..." class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold"></textarea>

          </div>
        </div>
      `;

    // =====================================================
    // MAIN RENDER FUNCTION
    // =====================================================
    async function renderMainView() {
      if (!currentProfile) {
        checkAuth();
        return;
      }
      
      if (currentView === 'home') await renderHome();
      else if (currentView === 'conference') await renderConference();
      else if (currentView === 'resources') await renderResources();
      else if (currentView === 'community') await renderCommunity();
      else if (currentView === 'profile') await renderProfile();
      
      // Highlight active nav
      document.querySelectorAll('.nav-btn').forEach(btn => {
        if (btn.dataset.nav === currentView) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }

    // =====================================================
    // EVENT LISTENERS
    // =====================================================
    document.getElementById('darkModeToggle')?.addEventListener('click', () => {
      darkMode = !darkMode;
      applyDarkMode();
    });
    
    document.getElementById('userMenuBtn')?.addEventListener('click', (e) => {
      e.stopPropagation();
      const dropdown = document.getElementById('userDropdown');
      dropdown.classList.toggle('hidden');
    });
    
    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('userDropdown');
      const userBtn = document.getElementById('userMenuBtn');
      if (dropdown && !dropdown.classList.contains('hidden') && 
          !userBtn?.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.add('hidden');
      }
    });
    
    document.getElementById('profileDropdownLink')?.addEventListener('click', (e) => {
      e.preventDefault();
      currentView = 'profile';
      renderMainView();
      document.getElementById('userDropdown').classList.add('hidden');
    });
    
    document.getElementById('adminDropdownLink')?.addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = '/admin.html';
    });
    
    document.getElementById('termsDropdownLink')?.addEventListener('click', (e) => {
      e.preventDefault();
      alert("Terms & Conditions:\n\n1. All participants must be registered.\n2. Proper conduct is expected at all times.\n3. Conference materials are for personal use only.\n4. By registering, you agree to receive conference communications.");
    });
    
    document.getElementById('privacyDropdownLink')?.addEventListener('click', (e) => {
      e.preventDefault();
      alert("Privacy Policy:\n\nYour personal information is used solely for conference registration and communication. We do not share your data with third parties.");
    });
    
    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.reload();
    });
    
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentView = btn.dataset.nav;
        renderMainView();
      });
    });
    
    document.getElementById('notificationsBtn')?.addEventListener('click', () => {
      showNotificationPanel();
    });
    
    document.getElementById('closeNotificationPanel')?.addEventListener('click', () => {
      document.getElementById('notificationPanel').classList.remove('open');
      document.getElementById('notificationOverlay').classList.remove('show');
    });
    
    document.getElementById('notificationOverlay')?.addEventListener('click', () => {
      document.getElementById('notificationPanel').classList.remove('open');
      document.getElementById('notificationOverlay').classList.remove('show');
    });
    
    // Start the app
    checkAuth();
  </script>
