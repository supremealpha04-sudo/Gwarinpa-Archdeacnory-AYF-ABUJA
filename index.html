<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gwarimba Archdeaconry | AYF Conference Portal</title>
  <meta name="theme-color" content="#0A2E73">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- QR Code Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <!-- HTML5 QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 1.5rem;
      transition: all 0.3s ease;
    }
    .dark .glass-card {
      background: rgba(10, 46, 115, 0.75);
      border-color: rgba(212, 175, 55, 0.5);
    }
    .glass-card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
    .bottom-nav-active {
      color: #D4AF37;
      border-bottom: 2px solid #D4AF37;
    }
    .admin-sidebar {
      transition: transform 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
    .notification-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ef4444;
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { royal: '#0A2E73', gold: '#D4AF37' }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-white transition-all">

  <div id="root" class="relative">
    <!-- Header -->
    <header id="mainHeader" class="sticky top-0 z-30 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gold/20 shadow-sm">
      <div class="flex justify-between items-center px-4 py-3 max-w-7xl mx-auto">
        <div class="flex items-center gap-2">
          <i class="fas fa-church text-royal dark:text-gold text-2xl"></i>
          <h1 class="font-bold text-lg">Gwarimba Archdeaconry</h1>
        </div>
        <div class="flex gap-3">
          <button id="darkModeToggle" class="text-royal dark:text-gold text-xl"><i class="fas fa-moon"></i></button>
          <button id="notificationsBtn" class="text-royal dark:text-gold text-xl relative">
            <i class="fas fa-bell"></i>
            <span id="notificationCount" class="notification-badge hidden">0</span>
          </button>
          <button id="logoutBtn" class="text-red-500 text-sm bg-red-50 dark:bg-red-900/30 px-3 py-1 rounded-full hidden"><i class="fas fa-sign-out-alt"></i> Exit</button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main id="appContainer" class="max-w-7xl mx-auto px-4 py-6"></main>

    <!-- Mobile Bottom Navigation -->
    <nav id="bottomNav" class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-gray-800/90 backdrop-blur-md border-t border-gold/30 z-40 lg:hidden">
      <div class="flex justify-around py-2">
        <button data-nav="home" class="nav-btn flex flex-col items-center text-gray-500 dark:text-gray-400 text-xs"><i class="fas fa-home text-xl"></i><span>Home</span></button>
        <button data-nav="conference" class="nav-btn flex flex-col items-center text-gray-500 dark:text-gray-400 text-xs"><i class="fas fa-calendar-alt text-xl"></i><span>Conference</span></button>
        <button data-nav="resources" class="nav-btn flex flex-col items-center text-gray-500 dark:text-gray-400 text-xs"><i class="fas fa-folder-open text-xl"></i><span>Resources</span></button>
        <button data-nav="community" class="nav-btn flex flex-col items-center text-gray-500 dark:text-gray-400 text-xs"><i class="fas fa-users text-xl"></i><span>Community</span></button>
        <button data-nav="profile" class="nav-btn flex flex-col items-center text-gray-500 dark:text-gray-400 text-xs"><i class="fas fa-user-circle text-xl"></i><span>Profile</span></button>
        <button data-nav="admin" class="nav-btn admin-only-nav flex flex-col items-center text-gray-500 dark:text-gray-400 text-xs hidden"><i class="fas fa-shield-alt text-xl"></i><span>Admin</span></button>
      </div>
    </nav>
  </div>

  <script>
    // =====================================================
    // 1. SUPABASE INITIALIZATION (SINGLE INSTANCE)
    // =====================================================
    const SUPABASE_URL = 'https://haxebhwcudkclyxsjaqx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheGViaHdjdWRrY2x5eHNqYXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDcyMjksImV4cCI6MjA5NjY4MzIyOX0.Iwu6NPRvnJtnfL4D_N2slvKOUidQ1UdLbUPG-4QCuM4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =====================================================
    // 2. GLOBAL STATE (NO DUPLICATION)
    // =====================================================
    let state = {
      currentUser: null,
      currentProfile: null,
      currentView: 'home',
      darkMode: localStorage.getItem('darkMode') === 'true',
      adminTab: 'dashboard',
      realtimeSubscriptions: [],
      analyticsChart: null,
      qrScanner: null
    };

    // =====================================================
    // 3. HELPER FUNCTIONS
    // =====================================================
    function applyDarkMode() {
      if (state.darkMode) document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
      localStorage.setItem('darkMode', state.darkMode);
    }
    applyDarkMode();

    async function checkUserPermissions(requiredRole) {
      if (!state.currentProfile) return false;
      const roleHierarchy = { super_admin: 5, archdeaconry_admin: 4, conference_admin: 3, moderator: 2, member: 1 };
      const userLevel = roleHierarchy[state.currentProfile.role] || 0;
      const requiredLevel = roleHierarchy[requiredRole] || 0;
      return userLevel >= requiredLevel;
    }

    async function loadNotifications() {
      if (!state.currentUser) return;
      const { data } = await supabase.from('notifications').select('*').eq('user_id', state.currentUser.id).eq('read', false);
      const count = data?.length || 0;
      const badge = document.getElementById('notificationCount');
      if (badge) {
        if (count > 0) { badge.classList.remove('hidden'); badge.textContent = count > 9 ? '9+' : count; }
        else badge.classList.add('hidden');
      }
    }

    // =====================================================
    // 4. AUTHENTICATION
    // =====================================================
    async function renderAuth() {
      document.getElementById('logoutBtn')?.classList.add('hidden');
      const container = document.getElementById('appContainer');
      container.innerHTML = `
        <div class="flex items-center justify-center min-h-[80vh]">
          <div class="glass-card p-8 w-full max-w-md animate-fadeIn">
            <div class="text-center mb-8">
              <i class="fas fa-church text-royal text-5xl mb-3"></i>
              <h2 class="text-3xl font-bold bg-gradient-to-r from-royal to-gold bg-clip-text text-transparent">Gwarimpa AYF</h2>
              <p class="text-gray-500 dark:text-gray-400 mt-2">Conference & Community Portal</p>
            </div>
            <div id="authError" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded-lg mb-4"></div>
            <form id="loginForm">
              <div class="mb-4"><input type="email" id="email" placeholder="Email Address" required class="w-full p-3 rounded-xl border dark:bg-gray-800"></div>
              <div class="mb-6"><input type="password" id="password" placeholder="Password" required class="w-full p-3 rounded-xl border dark:bg-gray-800"></div>
              <button type="submit" class="w-full bg-royal hover:bg-royal/90 text-white py-3 rounded-xl font-semibold">Sign In</button>
            </form>
            <div class="relative my-6"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div><div class="relative flex justify-center text-sm"><span class="px-2 bg-white dark:bg-gray-900 text-gray-500">Or</span></div></div>
            <button id="googleBtn" class="w-full border border-gold/50 rounded-xl py-3 flex justify-center gap-3 hover:bg-gold/10"><i class="fab fa-google text-gold"></i> Google Login</button>
            <div class="text-center mt-6 space-y-2">
              <a href="#" id="signupLink" class="text-gold hover:underline block">Create New Account →</a>
              <a href="#" id="resetLink" class="text-royal dark:text-gold/70 text-sm hover:underline block">Forgot Password?</a>
            </div>
          </div>
        </div>`;
      
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const { error } = await supabase.auth.signInWithPassword({ 
          email: document.getElementById('email').value, 
          password: document.getElementById('password').value 
        });
        if (error) document.getElementById('authError').textContent = error.message;
        else checkUser();
      });
      
      document.getElementById('googleBtn').onclick = async () => {
        await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
      };
      
      document.getElementById('signupLink').onclick = async (e) => {
        e.preventDefault();
        const email = prompt("Enter your email address:");
        const password = prompt("Create a password (min 6 characters):");
        if (email && password) {
          const { error } = await supabase.auth.signUp({ email, password });
          alert(error ? error.message : "Registration successful! Check your email to confirm.");
        }
      };
      
      document.getElementById('resetLink').onclick = async (e) => {
        e.preventDefault();
        const email = prompt("Enter your registered email:");
        if (email) { await supabase.auth.resetPasswordForEmail(email); alert("Reset link sent!"); }
      };
    }

    async function showOnboarding(userId) {
      const formHtml = `
        <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
          <div class="glass-card p-6 w-full max-w-md max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-bold mb-4">Complete Your Profile</h3>
            <div class="space-y-3">
              <input type="text" id="onboardFullName" placeholder="Full Name" class="w-full p-3 rounded-xl border">
              <input type="tel" id="onboardPhone" placeholder="Phone Number" class="w-full p-3 rounded-xl border">
              <select id="onboardGender" class="w-full p-3 rounded-xl border"><option>Male</option><option>Female</option></select>
              <input type="text" id="onboardAge" placeholder="Age Range (e.g., 18-25)" class="w-full p-3 rounded-xl border">
              <input type="text" id="onboardParish" placeholder="Parish" class="w-full p-3 rounded-xl border">
              <input type="text" id="onboardPosition" placeholder="AYF Position" class="w-full p-3 rounded-xl border">
              <button id="completeOnboarding" class="w-full bg-gold text-royal py-3 rounded-xl font-bold">Register for Conference</button>
            </div>
          </div>
        </div>`;
      document.body.insertAdjacentHTML('beforeend', formHtml);
      
      document.getElementById('completeOnboarding').onclick = async () => {
        await supabase.from('profiles').insert([{
          id: userId, 
          full_name: document.getElementById('onboardFullName').value,
          phone: document.getElementById('onboardPhone').value,
          gender: document.getElementById('onboardGender').value,
          age_range: document.getElementById('onboardAge').value,
          parish: document.getElementById('onboardParish').value,
          ayf_position: document.getElementById('onboardPosition').value,
          role: 'member',
          avatar_url: `https://ui-avatars.com/api/?name=${encodeURIComponent(document.getElementById('onboardFullName').value)}&background=0A2E73&color=fff`
        }]);
        
        await supabase.from('registrations').insert([{ user_id: userId, status: 'approved' }]);
        document.querySelector('.fixed.bg-black\\/50').remove();
        alert("Registration complete! Your Conference ID has been generated.");
        checkUser();
      };
    }

    async function checkUser() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) { renderAuth(); return; }
      state.currentUser = user;
      
      let { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
      if (!profile) { await showOnboarding(user.id); return; }
      
      state.currentProfile = profile;
      document.getElementById('logoutBtn')?.classList.remove('hidden');
      
      // Show/hide admin nav based on role
      const isAdmin = await checkUserPermissions('moderator');
      document.querySelector('.admin-only-nav')?.classList.toggle('hidden', !isAdmin);
      
      await loadNotifications();
      setupRealtimeSubscriptions();
      renderMainView();
    }

    // =====================================================
    // 5. REALTIME SUBSCRIPTIONS
    // =====================================================
    function setupRealtimeSubscriptions() {
      // Clean up old subscriptions
      state.realtimeSubscriptions.forEach(sub => supabase.removeChannel(sub));
      state.realtimeSubscriptions = [];
      
      const postsChannel = supabase.channel('public-posts')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => {
          if (state.currentView === 'home' || state.currentView === 'community') renderMainView();
        })
        .subscribe();
      
      const notificationsChannel = supabase.channel('public-notifications')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${state.currentUser.id}` }, () => loadNotifications())
        .subscribe();
      
      state.realtimeSubscriptions = [postsChannel, notificationsChannel];
    }

    // =====================================================
    // 6. MAIN RENDER DISPATCHER
    // =====================================================
    async function renderMainView() {
      if (!state.currentProfile) return;
      
      const container = document.getElementById('appContainer');
      const isAdmin = await checkUserPermissions('moderator');
      
      if (state.currentView === 'admin' && isAdmin) {
        await renderAdminPanel(container);
      } else if (state.currentView === 'home') {
        await renderHomeFeed(container);
      } else if (state.currentView === 'conference') {
        await renderConferenceModule(container);
      } else if (state.currentView === 'resources') {
        await renderDocumentCenter(container);
      } else if (state.currentView === 'community') {
        await renderCommunityModule(container);
      } else if (state.currentView === 'profile') {
        await renderProfilePage(container);
      }
      
      attachNavigationListeners();
    }

    // =====================================================
    // 7. HOME FEED (SOCIAL MEDIA)
    // =====================================================
    async function renderHomeFeed(container) {
      const { data: posts } = await supabase
        .from('posts')
        .select(`*, profiles(full_name, avatar_url, role)`)
        .order('created_at', { ascending: false });
      
      const { data: reg } = await supabase.from('registrations').select('conference_id').eq('user_id', state.currentUser.id).single();
      const confDate = new Date(2026, 3, 15);
      const diffDays = Math.ceil((confDate - new Date()) / (1000 * 60 * 60 * 24));
      
      container.innerHTML = `
        <div class="glass-card p-5 mb-6 bg-gradient-to-r from-royal/10 to-gold/10">
          <div class="flex justify-between items-center flex-wrap gap-3">
            <div><h2 class="text-2xl font-bold">Welcome, ${state.currentProfile.full_name}!</h2><p class="text-gold font-mono">${reg?.conference_id || 'Pending Registration'}</p></div>
            <div class="text-center bg-white/50 dark:bg-gray-800/50 px-4 py-2 rounded-xl"><p class="text-sm">📅 Conference in</p><p class="text-2xl font-bold text-gold">${diffDays} days</p></div>
          </div>
        </div>
        
        <button id="createPostBtn" class="w-full glass-card p-4 mb-6 text-left font-semibold hover:shadow-lg transition"><i class="fas fa-pen-alt text-gold mr-2"></i> What's on your mind?</button>
        
        <div id="postsFeed">
          ${posts?.map(post => `
            <div class="glass-card p-5 mb-4 animate-fadeIn">
              <div class="flex gap-3 mb-3">
                <img src="${post.profiles.avatar_url}" class="w-12 h-12 rounded-full object-cover">
                <div class="flex-1"><b class="text-lg">${post.profiles.full_name}</b><p class="text-xs text-gray-500">${new Date(post.created_at).toLocaleString()}</p></div>
              </div>
              ${post.title ? `<h3 class="font-bold text-xl mb-2">${post.title}</h3>` : ''}
              <p class="text-gray-700 dark:text-gray-300 mb-3">${post.content}</p>
              <div class="flex gap-6 pt-3 border-t">
                <button data-like="${post.id}" class="like-btn flex items-center gap-2 hover:text-gold"><i class="far fa-heart"></i> ${post.likes_count || 0}</button>
                <button data-comment="${post.id}" class="comment-toggle flex items-center gap-2 hover:text-gold"><i class="far fa-comment"></i> ${post.comments_count || 0}</button>
                <button data-share="${post.id}" class="share-btn" onclick="navigator.share?.({title:'Post', text:'${post.content?.substring(0,100)}'})"><i class="fas fa-share-alt"></i> Share</button>
              </div>
              <div id="comments-${post.id}" class="hidden mt-4 pt-3 border-t">
                <div id="commentList-${post.id}" class="mb-3"></div>
                <div class="flex gap-2"><input type="text" id="commentInput-${post.id}" placeholder="Write a comment..." class="flex-1 p-2 rounded-xl border"><button data-comment-post="${post.id}" class="submit-comment bg-royal text-white px-4 py-2 rounded-xl">Post</button></div>
              </div>
            </div>
          `).join('') || '<div class="glass-card p-8 text-center">No posts yet. Be the first!</div>'}
        </div>`;
      
      document.getElementById('createPostBtn')?.addEventListener('click', () => {
        const content = prompt("Share your thoughts:");
        if (content) supabase.from('posts').insert([{ user_id: state.currentUser.id, content }]).then(() => renderMainView());
      });
      
      document.querySelectorAll('.like-btn').forEach(btn => btn.onclick = async () => {
        await supabase.from('likes').insert([{ user_id: state.currentUser.id, post_id: btn.dataset.like }]);
        await supabase.rpc('increment_post_likes', { post_id: btn.dataset.like });
        renderMainView();
      });
      
      document.querySelectorAll('.comment-toggle').forEach(btn => btn.onclick = async () => {
        const postId = btn.dataset.comment;
        const div = document.getElementById(`comments-${postId}`);
        if (div.classList.contains('hidden')) {
          div.classList.remove('hidden');
          const { data: comments } = await supabase.from('comments').select('*, profiles(full_name)').eq('post_id', postId);
          document.getElementById(`commentList-${postId}`).innerHTML = comments?.map(c => `<div class="mb-2 text-sm"><b>${c.profiles.full_name}:</b> ${c.content}</div>`).join('');
        } else div.classList.add('hidden');
      });
      
      document.querySelectorAll('.submit-comment').forEach(btn => btn.onclick = async () => {
        const postId = btn.dataset.commentPost;
        const input = document.getElementById(`commentInput-${postId}`);
        if (input.value) {
          await supabase.from('comments').insert([{ post_id: postId, user_id: state.currentUser.id, content: input.value }]);
          renderMainView();
        }
      });
    }

    // =====================================================
    // 8. CONFERENCE MODULE
    // =====================================================
    async function renderConferenceModule(container) {
      const { data: reg } = await supabase.from('registrations').select('*').eq('user_id', state.currentUser.id).single();
      
      container.innerHTML = `
        <div class="space-y-5">
          <div class="glass-card p-6 text-center">
            <h2 class="text-3xl font-bold text-royal dark:text-gold">Rise & Build</h2>
            <p class="mt-1">Theme: Empowering the Next Generation</p>
            <div class="mt-4 grid grid-cols-2 gap-3 text-sm"><div><i class="fas fa-calendar text-gold"></i> April 15-17, 2026</div><div><i class="fas fa-map-marker-alt text-gold"></i> Archbishop Vining Memorial Church</div></div>
          </div>
          
          <div class="glass-card p-5 text-center">
            <h3 class="font-bold mb-3">Your Conference Pass</h3>
            <div id="qrContainer" class="flex justify-center mb-3"></div>
            <p class="font-mono font-bold">${reg?.conference_id || 'Loading...'}</p>
            ${reg?.check_in_time ? `<p class="text-green-500 mt-2"><i class="fas fa-check-circle"></i> Checked in at ${new Date(reg.check_in_time).toLocaleTimeString()}</p>` : '<p class="text-yellow-500 mt-2">Not yet checked in</p>'}
          </div>
          
          <div class="glass-card p-5"><h3 class="font-bold mb-3">📅 Schedule</h3><div class="space-y-2"><div class="flex justify-between"><span>Day 1 (Apr 15)</span><span>9am - Opening Ceremony</span></div><div class="flex justify-between"><span>Day 2 (Apr 16)</span><span>10am - Seminars</span></div><div class="flex justify-between"><span>Day 3 (Apr 17)</span><span>9am - Holy Communion</span></div></div></div>
          
          <div class="glass-card p-5"><h3 class="font-bold mb-3">🏆 Parish Leaderboard</h3><div class="space-y-1"><div class="flex justify-between"><span>St. Paul's</span><span>48 registered</span></div><div class="flex justify-between"><span>St. Mary's</span><span>32 registered</span></div><div class="flex justify-between"><span>Christ Church</span><span>27 registered</span></div></div></div>
        </div>`;
      
      if (reg && document.getElementById('qrContainer')) {
        new QRCode(document.getElementById('qrContainer'), { text: reg.conference_id, width: 150, height: 150 });
      }
    }

    // =====================================================
    // 9. DOCUMENT CENTER
    // =====================================================
    async function renderDocumentCenter(container) {
      const { data: docs } = await supabase.from('documents').select('*').order('created_at', { ascending: false });
      const canUpload = await checkUserPermissions('conference_admin');
      
      container.innerHTML = `
        <div class="glass-card p-5 mb-5"><h2 class="text-2xl font-bold"><i class="fas fa-folder-open text-gold"></i> Resource Center</h2><input type="text" id="searchDocs" placeholder="Search documents..." class="w-full p-3 rounded-xl border mt-3"></div>
        <div class="grid gap-3 md:grid-cols-2" id="documentsList">
          ${docs?.map(doc => `
            <div class="glass-card p-4">
              <div class="flex items-start gap-3"><div class="text-3xl"><i class="fas fa-file-pdf text-red-500"></i></div><div class="flex-1"><h3 class="font-bold">${doc.title}</h3><p class="text-xs text-gray-500">👁️ ${doc.views || 0} ⬇️ ${doc.downloads || 0}</p></div><button data-doc="${doc.id}" class="downloadDoc bg-gold/20 p-2 rounded-xl"><i class="fas fa-download"></i></button></div>
            </div>
          `).join('')}
        </div>
        ${canUpload ? `
        <div class="glass-card p-5 mt-5"><h3 class="font-bold"><i class="fas fa-upload"></i> Upload Document</h3><input type="text" id="docTitle" placeholder="Title" class="w-full p-2 border rounded my-2"><input type="file" id="docFile" class="my-2"><button id="uploadBtn" class="bg-royal text-white px-4 py-2 rounded-xl">Upload</button></div>` : ''}`;
      
      document.getElementById('searchDocs')?.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.document-item').forEach(el => {
          el.style.display = el.dataset.title?.includes(term) ? '' : 'none';
        });
      });
      
      document.querySelectorAll('.downloadDoc').forEach(btn => btn.onclick = async () => {
        await supabase.rpc('increment_document_downloads', { doc_id: btn.dataset.doc });
        alert("Download started");
      });
      
      document.getElementById('uploadBtn')?.addEventListener('click', async () => {
        const title = document.getElementById('docTitle').value;
        if (title) await supabase.from('documents').insert([{ title, file_url: '#', file_type: 'pdf', uploaded_by: state.currentUser.id }]);
        renderMainView();
      });
    }

    // =====================================================
    // 10. COMMUNITY MODULE
    // =====================================================
    async function renderCommunityModule(container) {
      const { data: discussions } = await supabase.from('posts').select('*, profiles(full_name, avatar_url)').order('created_at', { ascending: false });
      
      container.innerHTML = `
        <div class="glass-card p-5 mb-5"><h2 class="text-2xl font-bold"><i class="fas fa-users text-gold"></i> AYF Community</h2><p class="text-gray-600 dark:text-gray-400">Connect, share, and grow together in faith</p></div>
        <div class="glass-card p-4 mb-5"><textarea id="discussionInput" rows="3" placeholder="Ask a question or start a discussion..." class="w-full p-3 rounded-xl border"></textarea><button id="postDiscussion" class="mt-3 bg-royal text-white px-6 py-2 rounded-xl w-full">Post to Community</button></div>
        <div id="discussionsFeed" class="space-y-4">
          ${discussions?.map(d => `
            <div class="glass-card p-4"><div class="flex gap-3"><img src="${d.profiles.avatar_url}" class="w-10 h-10 rounded-full"><div><b>${d.profiles.full_name}</b><p class="text-xs">${new Date(d.created_at).toLocaleString()}</p></div></div><p class="mt-2">${d.content}</p><div class="flex gap-4 mt-2"><button class="text-sm hover:text-gold"><i class="far fa-heart"></i> Like</button><button class="text-sm hover:text-gold"><i class="far fa-comment"></i> Reply</button></div></div>
          `).join('')}
        </div>`;
      
      document.getElementById('postDiscussion')?.addEventListener('click', async () => {
        const content = document.getElementById('discussionInput').value;
        if (content) await supabase.from('posts').insert([{ user_id: state.currentUser.id, content }]);
        renderMainView();
      });
    }

    // =====================================================
    // 11. PROFILE PAGE
    // =====================================================
    async function renderProfilePage(container) {
      const { data: reg } = await supabase.from('registrations').select('*').eq('user_id', state.currentUser.id).single();
      const { data: userPosts } = await supabase.from('posts').select('*', { count: 'exact' }).eq('user_id', state.currentUser.id);
      
      container.innerHTML = `
        <div class="glass-card p-6 text-center mb-5">
          <img src="${state.currentProfile.avatar_url}" class="w-28 h-28 rounded-full mx-auto border-4 border-gold mb-3">
          <h2 class="text-2xl font-bold">${state.currentProfile.full_name}</h2>
          <p class="text-gold font-mono">${reg?.conference_id || 'Not Registered'}</p>
          <p>${state.currentProfile.parish || 'Parish not set'} | ${state.currentProfile.ayf_position || 'Member'}</p>
          <div class="grid grid-cols-3 gap-3 mt-5"><div class="bg-royal/10 p-2 rounded"><div class="font-bold">${userPosts?.count || 0}</div><div>Posts</div></div><div class="bg-royal/10 p-2 rounded"><div class="font-bold">${reg?.check_in_count || 0}</div><div>Check-ins</div></div><div class="bg-royal/10 p-2 rounded"><div class="font-bold">${state.currentProfile.role}</div><div>Role</div></div></div>
        </div>`;
    }

    // =====================================================
    // 12. ADMIN PANEL (FULL DASHBOARD)
    // =====================================================
    async function renderAdminPanel(container) {
      // Fetch analytics data
      const { count: totalUsers } = await supabase.from('profiles').select('*', { count: 'exact' });
      const { count: totalRegistrations } = await supabase.from('registrations').select('*', { count: 'exact' });
      const { count: checkedIn } = await supabase.from('attendance_logs').select('*', { count: 'exact' }).eq('session_date', new Date().toISOString().split('T')[0]);
      const { data: parishData } = await supabase.from('profiles').select('parish');
      const parishCounts = parishData?.reduce((acc, p) => { if(p.parish) acc[p.parish] = (acc[p.parish] || 0) + 1; return acc; }, {});
      const { data: recentCheckins } = await supabase.from('attendance_logs').select('*, profiles(full_name)').order('check_in_time', { ascending: false }).limit(10);
      
      container.innerHTML = `
        <div class="lg:hidden mb-4"><button id="backToUser" class="glass-card px-4 py-2"><i class="fas fa-arrow-left"></i> Back to Portal</button></div>
        <div class="grid lg:grid-cols-4 gap-4">
          <div class="lg:col-span-1"><div class="glass-card p-4 sticky top-20"><h3 class="font-bold mb-3 text-gold"><i class="fas fa-shield-alt"></i> Admin Console</h3><div class="space-y-2"><button data-admin-tab="dashboard" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">📊 Dashboard</button><button data-admin-tab="registrations" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">✅ Approve Registrations</button><button data-admin-tab="qr-scanner" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">📷 QR Check-in Scanner</button><button data-admin-tab="users" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">👥 Manage Users & Roles</button><button data-admin-tab="documents" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">📄 Manage Documents</button><button data-admin-tab="events" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">📅 Create Events</button><button data-admin-tab="announcements" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">📢 Announcements</button><button data-admin-tab="reports" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">📈 Export Reports</button></div></div></div>
          <div class="lg:col-span-3" id="adminContent">
            <div class="glass-card p-5"><h2 class="text-2xl font-bold mb-4">Dashboard Overview</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"><div class="bg-royal/10 p-3 rounded text-center"><div class="text-2xl font-bold">${totalUsers || 0}</div><div>Total Users</div></div><div class="bg-royal/10 p-3 rounded text-center"><div class="text-2xl font-bold">${totalRegistrations || 0}</div><div>Registrations</div></div><div class="bg-royal/10 p-3 rounded text-center"><div class="text-2xl font-bold">${checkedIn || 0}</div><div>Checked in Today</div></div><div class="bg-royal/10 p-3 rounded text-center"><div class="text-2xl font-bold">${Object.keys(parishCounts || {}).length}</div><div>Parishes</div></div></div>
            <canvas id="adminChart" height="200"></canvas>
            <div class="mt-6"><h3 class="font-bold mb-2">Recent Check-ins</h3>${recentCheckins?.map(c => `<div class="flex justify-between border-b py-2"><span>${c.profiles?.full_name}</span><span class="text-sm">${new Date(c.check_in_time).toLocaleString()}</span></div>`).join('') || '<p>No check-ins today</p>'}</div></div>
          </div>
        </div>`;
      
      // Initialize chart
      const ctx = document.getElementById('adminChart')?.getContext('2d');
      if (ctx) {
        if (state.analyticsChart) state.analyticsChart.destroy();
        state.analyticsChart = new Chart(ctx, { type: 'bar', data: { labels: Object.keys(parishCounts || {}), datasets: [{ label: 'Registrations by Parish', data: Object.values(parishCounts || {}), backgroundColor: '#D4AF37' }] } });
      }
      
      // Admin tab handlers
      document.querySelectorAll('.admin-tab').forEach(btn => btn.onclick = async () => {
        const tab = btn.dataset.adminTab;
        const adminContent = document.getElementById('adminContent');
        
        if (tab === 'qr-scanner') {
          adminContent.innerHTML = `<div class="glass-card p-5"><h3 class="font-bold mb-3">QR Scanner - Point camera at attendee's QR code</h3><div id="qr-reader" style="width:100%; max-width:500px"></div><div id="scanResult" class="mt-3"></div></div>`;
          const html5QrCode = new Html5Qrcode("qr-reader");
          html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (decodedText) => {
            await supabase.from('attendance_logs').insert([{ user_id: state.currentUser.id, conference_id: decodedText, checked_by: state.currentUser.id }]);
            await supabase.from('registrations').update({ check_in_time: new Date(), check_in_count: supabase.rpc('increment', { x: 1 }) }).eq('conference_id', decodedText);
            document.getElementById('scanResult').innerHTML = `<div class="bg-green-500 text-white p-3 rounded">✅ Checked in: ${decodedText}</div>`;
            setTimeout(() => html5QrCode.stop(), 2000);
          }, (err) => console.log(err));
        } else if (tab === 'registrations') {
          const { data: pending } = await supabase.from('registrations').select('*, profiles(full_name, email, parish)').eq('status', 'pending');
          adminContent.innerHTML = `<div class="glass-card p-5"><h3>Pending Approvals (${pending?.length || 0})</h3>${pending?.map(p => `<div class="border-b py-3"><b>${p.profiles?.full_name}</b><p>${p.profiles?.email} | ${p.profiles?.parish}</p><button data-approve="${p.user_id}" class="approveReg bg-green-500 text-white px-3 py-1 rounded mt-2">Approve</button></div>`).join('') || '<p>No pending registrations</p>'}</div>`;
          document.querySelectorAll('.approveReg').forEach(btn => btn.onclick = async () => { await supabase.from('registrations').update({ status: 'approved' }).eq('user_id', btn.dataset.approve); renderAdminPanel(container); });
        } else if (tab === 'users') {
          const { data: users } = await supabase.from('profiles').select('*');
          adminContent.innerHTML = `<div class="glass-card p-5"><h3>User Management</h3>${users?.map(u => `<div class="flex justify-between items-center border-b py-2"><span><b>${u.full_name}</b><br><span class="text-xs">${u.email || u.id}</span></span><select data-user="${u.id}" class="roleSelect border rounded p-1"><option ${u.role === 'member' ? 'selected' : ''}>member</option><option ${u.role === 'moderator' ? 'selected' : ''}>moderator</option><option ${u.role === 'conference_admin' ? 'selected' : ''}>conference_admin</option><option ${u.role === 'archdeaconry_admin' ? 'selected' : ''}>archdeaconry_admin</option><option ${u.role === 'super_admin' ? 'selected' : ''}>super_admin</option></select></div>`).join('')}</div>`;
          document.querySelectorAll('.roleSelect').forEach(select => select.onchange = async () => { await supabase.from('profiles').update({ role: select.value }).eq('id', select.dataset.user); alert('Role updated'); renderAdminPanel(container); });
        } else if (tab === 'reports') {
          adminContent.innerHTML = `<div class="glass-card p-5"><h3>Export Reports</h3><button id="exportCSV" class="bg-royal text-white px-4 py-2 rounded mb-3">Export All Registrations (CSV)</button><pre id="reportPreview" class="mt-4 text-sm bg-gray-100 dark:bg-gray-800 p-3 rounded overflow-x-auto"></pre></div>`;
          document.getElementById('exportCSV')?.addEventListener('click', async () => {
            const { data } = await supabase.from('registrations').select('*, profiles(full_name, email, parish, phone)');
            const csv = "Name,Email,Parish,Phone,Conference ID,Status,Check-in Time\n" + data.map(r => `${r.profiles?.full_name},${r.profiles?.email},${r.profiles?.parish},${r.profiles?.phone},${r.conference_id},${r.status},${r.check_in_time || ''}`).join("\n");
            document.getElementById('reportPreview').textContent = csv;
          });
        } else if (tab === 'announcements') {
          adminContent.innerHTML = `<div class="glass-card p-5"><h3>Post Announcement</h3><input type="text" id="announceTitle" placeholder="Title" class="w-full p-2 border rounded mb-2"><textarea id="announceContent" rows="3" placeholder="Announcement message..." class="w-full p-2 border rounded mb-2"></textarea><button id="postAnnounceBtn" class="bg-gold text-royal px-4 py-2 rounded">Publish to All</button></div>`;
          document.getElementById('postAnnounceBtn')?.addEventListener('click', async () => {
            await supabase.from('posts').insert([{ user_id: state.currentUser.id, title: document.getElementById('announceTitle').value, content: document.getElementById('announceContent').value, is_announcement: true }]);
            alert('Announcement posted!');
            renderAdminPanel(container);
          });
        } else if (tab === 'events') {
          adminContent.innerHTML = `<div class="glass-card p-5"><h3>Create Event</h3><input type="text" id="eventTitle" placeholder="Event Title" class="w-full p-2 border rounded mb-2"><input type="date" id="eventDate" class="w-full p-2 border rounded mb-2"><input type="text" id="eventVenue" placeholder="Venue" class="w-full p-2 border rounded mb-2"><button id="createEventBtn" class="bg-royal text-white px-4 py-2 rounded">Create Event</button></div>`;
          document.getElementById('createEventBtn')?.addEventListener('click', async () => {
            await supabase.from('events').insert([{ title: document.getElementById('eventTitle').value, date: document.getElementById('eventDate').value, venue: document.getElementById('eventVenue').value, created_by: state.currentUser.id }]);
            alert('Event created!');
          });
        } else {
          // Dashboard - refresh data
          renderAdminPanel(container);
        }
      });
      
      document.getElementById('backToUser')?.addEventListener('click', () => { state.currentView = 'home'; renderMainView(); });
    }

    // =====================================================
    // 13. NAVIGATION
    // =====================================================
    function attachNavigationListeners() {
      document.querySelectorAll('.nav-btn').forEach(btn => btn.onclick = () => { state.currentView = btn.dataset.nav; renderMainView(); });
      document.getElementById('logoutBtn').onclick = async () => { await supabase.auth.signOut(); location.reload(); };
      document.getElementById('darkModeToggle').onclick = () => { state.darkMode = !state.darkMode; applyDarkMode(); };
      document.getElementById('notificationsBtn')?.addEventListener('click', async () => {
        const { data } = await supabase.from('notifications').select('*').eq('user_id', state.currentUser.id).order('created_at', { ascending: false }).limit(20);
        alert(data?.map(n => `${n.title}: ${n.message}`).join('\n') || 'No notifications');
      });
    }
    
    // Start the app
    checkUser();
  </script>
</body>
</html>
