<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gwarimpa Archdeaconry | AYF Conference Portal</title>
  <meta name="description" content="Official Conference Registration and Community Platform for Anglican Youth Fellowship">
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Gwarimpa%20AYF%20Portal%22,%22short_name%22:%22Gwarimpa%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22theme_color%22:%22%230A2E73%22,%22background_color%22:%22%23FFFFFF%22}">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- QR Code Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <!-- HTML5 QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 1.5rem;
      transition: all 0.3s ease;
    }
    .dark .glass-card {
      background: rgba(10, 46, 115, 0.75);
      border-color: rgba(212, 175, 55, 0.5);
    }
    .glass-card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
    .bottom-nav-active {
      color: #D4AF37;
      border-bottom: 2px solid #D4AF37;
    }
    .admin-sidebar {
      transition: transform 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
    .notification-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ef4444;
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
  </style>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            royal: '#0A2E73',
            gold: '#D4AF37',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-white transition-all">

  <div id="root" class="relative">
    <!-- Dynamic Header -->
    <header id="mainHeader" class="sticky top-0 z-30 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gold/20 shadow-sm">
      <div class="flex justify-between items-center px-4 py-3 max-w-7xl mx-auto">
        <div class="flex items-center gap-2">
          <i class="fas fa-church text-royal dark:text-gold text-2xl"></i>
          <h1 class="font-bold text-lg">Gwarimba Archdeaconry</h1>
        </div>
        <div class="flex gap-3">
          <button id="darkModeToggle" class="text-royal dark:text-gold text-xl"><i class="fas fa-moon"></i></button>
          <button id="notificationsBtn" class="text-royal dark:text-gold text-xl relative">
            <i class="fas fa-bell"></i>
            <span id="notificationCount" class="notification-badge hidden">0</span>
          </button>
          <button id="logoutBtn" class="text-red-500 text-sm bg-red-50 dark:bg-red-900/30 px-3 py-1 rounded-full hidden"><i class="fas fa-sign-out-alt"></i> Exit</button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main id="appContainer" class="max-w-7xl mx-auto px-4 py-6"></main>

    <!-- Mobile Bottom Navigation -->
    <nav id="bottomNav" class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-gray-800/90 backdrop-blur-md border-t border-gold/30 z-40 lg:hidden">
      <div class="flex justify-around py-2">
        <button data-nav="home" class="nav-btn flex flex-col items-center text-gray-500 dark:text-gray-400 text-xs"><i class="fas fa-home text-xl"></i><span>Home</span></button>
        <button data-nav="conference" class="nav-btn flex flex-col items-center text-gray-500 dark:text-gray-400 text-xs"><i class="fas fa-calendar-alt text-xl"></i><span>Conference</span></button>
        <button data-nav="resources" class="nav-btn flex flex-col items-center text-gray-500 dark:text-gray-400 text-xs"><i class="fas fa-folder-open text-xl"></i><span>Resources</span></button>
        <button data-nav="community" class="nav-btn flex flex-col items-center text-gray-500 dark:text-gray-400 text-xs"><i class="fas fa-users text-xl"></i><span>Community</span></button>
        <button data-nav="profile" class="nav-btn flex flex-col items-center text-gray-500 dark:text-gray-400 text-xs"><i class="fas fa-user-circle text-xl"></i><span>Profile</span></button>
      </div>
    </nav>
  </div>

  <script>
    // =========================================================================
    // 1. SUPABASE CONFIGURATION (REPLACE WITH YOUR CREDENTIALS)
    // =========================================================================
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =========================================================================
    // 2. GLOBAL STATE MANAGEMENT
    // =========================================================================
    let currentUser = null;
    let currentProfile = null;
    let currentView = 'home';
    let darkMode = localStorage.getItem('darkMode') === 'true';
    let isAdminMode = false;
    let adminActiveTab = 'dashboard';
    let notifications = [];
    let analyticsChart = null;
    let qrScanner = null;
    
    // Role-based permissions
    const roles = {
      super_admin: ['all'],
      archdeaconry_admin: ['manage_users', 'manage_events', 'view_analytics', 'manage_documents'],
      conference_admin: ['manage_registrations', 'qr_checkin', 'manage_announcements'],
      moderator: ['moderate_comments', 'manage_posts'],
      member: ['view_content', 'comment', 'like']
    };

    // Apply dark mode
    function applyDarkMode() {
      if (darkMode) document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
      localStorage.setItem('darkMode', darkMode);
    }
    applyDarkMode();
    document.getElementById('darkModeToggle')?.addEventListener('click', () => { darkMode = !darkMode; applyDarkMode(); });

    // =========================================================================
    // 3. DATABASE INITIALIZATION & SCHEMA (Run once in Supabase SQL)
    // =========================================================================
    const SQL_SCHEMA = `
    -- Profiles table
    CREATE TABLE IF NOT EXISTS profiles (
      id UUID REFERENCES auth.users(id) PRIMARY KEY,
      full_name TEXT NOT NULL,
      phone TEXT,
      gender TEXT,
      age_range TEXT,
      parish TEXT,
      ayf_position TEXT,
      avatar_url TEXT,
      role TEXT DEFAULT 'member',
      created_at TIMESTAMPTZ DEFAULT NOW()
    );

    -- Registrations with QR
    CREATE TABLE IF NOT EXISTS registrations (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      user_id UUID REFERENCES profiles(id) UNIQUE,
      conference_id TEXT UNIQUE,
      status TEXT DEFAULT 'pending',
      qr_code TEXT,
      check_in_time TIMESTAMPTZ,
      check_in_count INT DEFAULT 0,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );

    -- Posts (Social Feed)
    CREATE TABLE IF NOT EXISTS posts (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      user_id UUID REFERENCES profiles(id),
      title TEXT,
      content TEXT,
      media_urls TEXT[],
      media_type TEXT,
      likes_count INT DEFAULT 0,
      comments_count INT DEFAULT 0,
      is_announcement BOOLEAN DEFAULT FALSE,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );

    -- Comments
    CREATE TABLE IF NOT EXISTS comments (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      post_id UUID REFERENCES posts(id) ON DELETE CASCADE,
      user_id UUID REFERENCES profiles(id),
      parent_id UUID REFERENCES comments(id),
      content TEXT,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );

    -- Likes
    CREATE TABLE IF NOT EXISTS likes (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      user_id UUID REFERENCES profiles(id),
      post_id UUID REFERENCES posts(id),
      UNIQUE(user_id, post_id)
    );

    -- Documents
    CREATE TABLE IF NOT EXISTS documents (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      title TEXT NOT NULL,
      description TEXT,
      file_url TEXT,
      file_type TEXT,
      file_size INT,
      downloads INT DEFAULT 0,
      views INT DEFAULT 0,
      likes INT DEFAULT 0,
      category TEXT,
      uploaded_by UUID REFERENCES profiles(id),
      created_at TIMESTAMPTZ DEFAULT NOW()
    );

    -- Events
    CREATE TABLE IF NOT EXISTS events (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      title TEXT NOT NULL,
      description TEXT,
      date DATE,
      time TIME,
      venue TEXT,
      speaker TEXT,
      max_attendees INT,
      current_registrations INT DEFAULT 0,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );

    -- Event Registrations
    CREATE TABLE IF NOT EXISTS event_registrations (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      event_id UUID REFERENCES events(id),
      user_id UUID REFERENCES profiles(id),
      registered_at TIMESTAMPTZ DEFAULT NOW(),
      UNIQUE(event_id, user_id)
    );

    -- Notifications
    CREATE TABLE IF NOT EXISTS notifications (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      user_id UUID REFERENCES profiles(id),
      title TEXT,
      message TEXT,
      type TEXT,
      read BOOLEAN DEFAULT FALSE,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );

    -- Attendance Logs
    CREATE TABLE IF NOT EXISTS attendance_logs (
      id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
      user_id UUID REFERENCES profiles(id),
      conference_id TEXT,
      check_in_time TIMESTAMPTZ DEFAULT NOW(),
      checked_by UUID REFERENCES profiles(id)
    );

    -- Enable Realtime
    ALTER TABLE posts REPLICA IDENTITY FULL;
    ALTER TABLE comments REPLICA IDENTITY FULL;
    DROP PUBLICATION IF EXISTS supabase_realtime;
    CREATE PUBLICATION supabase_realtime FOR TABLE posts, comments, notifications;
    `;

    // =========================================================================
    // 4. HELPER FUNCTIONS
    // =========================================================================
    async function generateConferenceId() {
      const { count } = await supabase.from('registrations').select('*', { count: 'exact', head: true });
      const num = (count + 1).toString().padStart(4, '0');
      return `GAC2026-${num}`;
    }

    async function checkUserPermissions(requiredRole) {
      if (!currentProfile) return false;
      const userRole = currentProfile.role;
      if (userRole === 'super_admin') return true;
      if (requiredRole === 'member') return true;
      if (requiredRole === 'moderator' && ['super_admin', 'archdeaconry_admin', 'moderator'].includes(userRole)) return true;
      if (requiredRole === 'conference_admin' && ['super_admin', 'archdeaconry_admin', 'conference_admin'].includes(userRole)) return true;
      if (requiredRole === 'archdeaconry_admin' && ['super_admin', 'archdeaconry_admin'].includes(userRole)) return true;
      return false;
    }

    async function sendNotification(userId, title, message, type = 'info') {
      await supabase.from('notifications').insert([{ user_id: userId, title, message, type }]);
    }

    async function loadNotifications() {
      if (!currentUser) return;
      const { data } = await supabase.from('notifications').select('*').eq('user_id', currentUser.id).eq('read', false);
      const count = data?.length || 0;
      const badge = document.getElementById('notificationCount');
      if (badge) {
        if (count > 0) { badge.classList.remove('hidden'); badge.textContent = count > 9 ? '9+' : count; }
        else badge.classList.add('hidden');
      }
    }

    // =========================================================================
    // 5. AUTHENTICATION
    // =========================================================================
    async function renderAuth() {
      document.getElementById('logoutBtn')?.classList.add('hidden');
      const container = document.getElementById('appContainer');
      container.innerHTML = `
        <div class="flex items-center justify-center min-h-[80vh]">
          <div class="glass-card p-8 w-full max-w-md animate-fadeIn">
            <div class="text-center mb-8">
              <i class="fas fa-church text-royal text-5xl mb-3"></i>
              <h2 class="text-3xl font-bold bg-gradient-to-r from-royal to-gold bg-clip-text text-transparent">Gwarimpa AYF</h2>
              <p class="text-gray-500 dark:text-gray-400 mt-2">Conference & Community Portal</p>
            </div>
            
            <div id="authError" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded-lg mb-4"></div>
            
            <form id="loginForm">
              <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Email Address</label>
                <input type="email" id="email" required class="w-full p-3 rounded-xl border dark:bg-gray-800 dark:border-gray-700 focus:ring-2 focus:ring-gold">
              </div>
              <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" required class="w-full p-3 rounded-xl border dark:bg-gray-800 dark:border-gray-700 focus:ring-2 focus:ring-gold">
              </div>
              <button type="submit" class="w-full bg-royal hover:bg-royal/90 text-white py-3 rounded-xl font-semibold transition-all">Sign In</button>
            </form>
            
            <div class="relative my-6">
              <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300"></div></div>
              <div class="relative flex justify-center text-sm"><span class="px-2 bg-white dark:bg-gray-900 text-gray-500">Or continue with</span></div>
            </div>
            
            <button id="googleBtn" class="w-full border border-gold/50 rounded-xl py-3 flex justify-center gap-3 hover:bg-gold/10 transition-all"><i class="fab fa-google text-gold"></i> Google Login</button>
            
            <div class="text-center mt-6 space-y-2">
              <a href="#" id="signupLink" class="text-gold hover:underline block">Create New Account →</a>
              <a href="#" id="resetLink" class="text-royal dark:text-gold/70 text-sm hover:underline block">Forgot Password?</a>
            </div>
          </div>
        </div>`;
      
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          const errorDiv = document.getElementById('authError');
          errorDiv.textContent = error.message;
          errorDiv.classList.remove('hidden');
        } else checkUser();
      });
      
      document.getElementById('googleBtn').onclick = async () => {
        await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
      };
      
      document.getElementById('signupLink').onclick = async (e) => {
        e.preventDefault();
        const email = prompt("Enter your email address:");
        const password = prompt("Create a password (min 6 characters):");
        if (email && password) {
          const { error } = await supabase.auth.signUp({ email, password });
          if (error) alert(error.message);
          else alert("Registration successful! Please check your email to confirm your account.");
        }
      };
      
      document.getElementById('resetLink').onclick = async (e) => {
        e.preventDefault();
        const email = prompt("Enter your registered email:");
        if (email) { await supabase.auth.resetPasswordForEmail(email); alert("Password reset link sent to your email!"); }
      };
    }

    async function showOnboarding(userId) {
      const formHtml = `
        <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
          <div class="glass-card p-6 w-full max-w-md max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-bold mb-4">Complete Your Profile</h3>
            <div class="space-y-3">
              <input type="text" id="onboardFullName" placeholder="Full Name" class="w-full p-3 rounded-xl border">
              <input type="tel" id="onboardPhone" placeholder="Phone Number" class="w-full p-3 rounded-xl border">
              <select id="onboardGender" class="w-full p-3 rounded-xl border"><option value="">Select Gender</option><option>Male</option><option>Female</option></select>
              <input type="text" id="onboardAge" placeholder="Age Range (e.g., 18-25)" class="w-full p-3 rounded-xl border">
              <input type="text" id="onboardParish" placeholder="Parish" class="w-full p-3 rounded-xl border">
              <input type="text" id="onboardPosition" placeholder="AYF Position" class="w-full p-3 rounded-xl border">
              <button id="completeOnboarding" class="w-full bg-gold text-royal py-3 rounded-xl font-bold">Register for Conference</button>
            </div>
          </div>
        </div>`;
      document.body.insertAdjacentHTML('beforeend', formHtml);
      
      document.getElementById('completeOnboarding').onclick = async () => {
        const fullName = document.getElementById('onboardFullName').value;
        const phone = document.getElementById('onboardPhone').value;
        const gender = document.getElementById('onboardGender').value;
        const ageRange = document.getElementById('onboardAge').value;
        const parish = document.getElementById('onboardParish').value;
        const ayfPosition = document.getElementById('onboardPosition').value;
        
        await supabase.from('profiles').insert([{
          id: userId, full_name: fullName, phone, gender, age_range: ageRange,
          parish, ayf_position: ayfPosition, role: 'member',
          avatar_url: `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName)}&background=0A2E73&color=fff`
        }]);
        
        const conferenceId = await generateConferenceId();
        await supabase.from('registrations').insert([{
          user_id: userId, conference_id: conferenceId, status: 'approved', qr_code: conferenceId
        }]);
        
        document.querySelector('.fixed.bg-black\\/50').remove();
        alert(`Welcome! Your Conference ID: ${conferenceId}`);
        await sendNotification(userId, 'Registration Complete', `Your Conference ID is ${conferenceId}. Save your QR code for check-in!`, 'success');
        checkUser();
      };
    }

    async function checkUser() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) { renderAuth(); return; }
      currentUser = user;
      
      let { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
      if (!profile) { await showOnboarding(user.id); return; }
      
      currentProfile = profile;
      document.getElementById('logoutBtn')?.classList.remove('hidden');
      await loadNotifications();
      setupRealtimeSubscriptions();
      renderMainView();
    }

    // =========================================================================
    // 6. REALTIME SUBSCRIPTIONS
    // =========================================================================
    function setupRealtimeSubscriptions() {
      supabase.channel('public-posts').on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => {
        if (currentView === 'home' || currentView === 'community') renderMainView();
      }).subscribe();
      
      supabase.channel('public-notifications').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${currentUser.id}` }, () => {
        loadNotifications();
      }).subscribe();
    }

    // =========================================================================
    // 7. MAIN RENDER ENGINE
    // =========================================================================
    async function renderMainView() {
      if (!currentProfile) return;
      
      // Check if user is admin for desktop sidebar
      const isAdmin = await checkUserPermissions('moderator');
      const container = document.getElementById('appContainer');
      
      if (isAdmin && window.innerWidth >= 1024 && currentView === 'admin') {
        await renderAdminPanel(container);
      } else {
        if (currentView === 'home') await renderHomeFeed(container);
        else if (currentView === 'conference') await renderConferenceModule(container);
        else if (currentView === 'resources') await renderDocumentCenter(container);
        else if (currentView === 'community') await renderCommunityModule(container);
        else if (currentView === 'profile') await renderProfilePage(container);
        else if (currentView === 'admin') await renderAdminPanel(container);
      }
      
      attachNavigationListeners();
    }

    // =========================================================================
    // 8. HOME FEED (Social Media Style)
    // =========================================================================
    async function renderHomeFeed(container) {
      const { data: posts } = await supabase
        .from('posts')
        .select(`*, profiles(full_name, avatar_url, role)`)
        .order('created_at', { ascending: false });
      
      const { data: reg } = await supabase.from('registrations').select('conference_id').eq('user_id', currentUser.id).single();
      const confDate = new Date(2026, 3, 15);
      const diffDays = Math.ceil((confDate - new Date()) / (1000 * 60 * 60 * 24));
      
      let postsHtml = posts?.map(post => `
        <div class="glass-card p-5 mb-4 animate-fadeIn">
          <div class="flex gap-3 mb-3">
            <img src="${post.profiles.avatar_url}" class="w-12 h-12 rounded-full object-cover">
            <div class="flex-1">
              <div class="flex items-center gap-2">
                <b class="text-lg">${post.profiles.full_name}</b>
                ${post.profiles.role === 'super_admin' ? '<span class="text-xs bg-gold/20 px-2 py-0.5 rounded-full">Admin</span>' : ''}
              </div>
              <p class="text-xs text-gray-500">${new Date(post.created_at).toLocaleString()}</p>
            </div>
          </div>
          ${post.title ? `<h3 class="font-bold text-xl mb-2">${post.title}</h3>` : ''}
          <p class="text-gray-700 dark:text-gray-300 mb-3">${post.content}</p>
          ${post.media_urls && post.media_urls[0] ? `<img src="${post.media_urls[0]}" class="rounded-xl mb-3 max-h-64 w-full object-cover">` : ''}
          <div class="flex gap-6 pt-3 border-t border-gray-200 dark:border-gray-700">
            <button data-like="${post.id}" class="like-btn flex items-center gap-2 hover:text-gold transition"><i class="far fa-heart"></i> <span>${post.likes_count || 0}</span></button>
            <button data-comment="${post.id}" class="comment-toggle flex items-center gap-2 hover:text-gold transition"><i class="far fa-comment"></i> <span>${post.comments_count || 0}</span></button>
            <button data-share="${post.id}" class="share-btn flex items-center gap-2 hover:text-gold transition" onclick="navigator.share?.({title:'${post.title || 'Post'}', text:'${post.content.substring(0,100)}'})"><i class="fas fa-share-alt"></i> Share</button>
            <button data-save="${post.id}" class="save-btn flex items-center gap-2 hover:text-gold transition"><i class="far fa-bookmark"></i> Save</button>
          </div>
          <div id="comments-${post.id}" class="hidden mt-4 pt-3 border-t">
            <div id="commentList-${post.id}" class="mb-3 max-h-64 overflow-y-auto"></div>
            <div class="flex gap-2"><input type="text" id="commentInput-${post.id}" placeholder="Write a comment..." class="flex-1 p-2 rounded-xl border dark:bg-gray-800"><button data-comment-post="${post.id}" class="submit-comment bg-royal text-white px-4 py-2 rounded-xl">Post</button></div>
          </div>
        </div>
      `).join('');
      
      container.innerHTML = `
        <div class="glass-card p-5 mb-6 bg-gradient-to-r from-royal/10 to-gold/10">
          <div class="flex justify-between items-center flex-wrap gap-3">
            <div><h2 class="text-2xl font-bold">Welcome, ${currentProfile.full_name}!</h2><p class="text-gold font-mono">${reg?.conference_id || 'Pending Registration'}</p></div>
            <div class="text-center bg-white/50 dark:bg-gray-800/50 px-4 py-2 rounded-xl"><p class="text-sm">📅 Conference in</p><p class="text-2xl font-bold text-gold">${diffDays} days</p></div>
          </div>
        </div>
        
        ${await checkUserPermissions('moderator') ? `
        <div class="glass-card p-4 mb-4">
          <h3 class="font-bold mb-2"><i class="fas fa-bullhorn text-gold"></i> Admin Announcement</h3>
          <textarea id="announcementContent" rows="2" placeholder="Post an announcement to all members..." class="w-full p-3 rounded-xl border dark:bg-gray-800"></textarea>
          <div class="flex gap-2 mt-2"><input type="file" id="announcementMedia" accept="image/*" class="hidden"><button id="attachMediaBtn" class="px-3 py-1 border rounded"><i class="fas fa-image"></i></button><button id="postAnnouncementBtn" class="bg-gold text-royal px-4 py-1 rounded font-bold ml-auto">Publish</button></div>
        </div>` : ''}
        
        <button id="createPostBtn" class="w-full glass-card p-4 mb-6 text-left font-semibold hover:shadow-lg transition"><i class="fas fa-pen-alt text-gold mr-2"></i> What's on your mind, ${currentProfile.full_name.split(' ')[0]}?</button>
        <div id="postsFeed">${postsHtml || '<div class="glass-card p-8 text-center"><i class="fas fa-newspaper text-4xl text-gray-400 mb-2"></i><p>No posts yet. Be the first to share!</p></div>'}</div>`;
      
      // Post creation modal
      document.getElementById('createPostBtn')?.addEventListener('click', () => {
        const content = prompt("Share your thoughts, prayer requests, or updates:");
        if (content) supabase.from('posts').insert([{ user_id: currentUser.id, content }]).then(() => renderMainView());
      });
      
      document.getElementById('postAnnouncementBtn')?.addEventListener('click', async () => {
        const content = document.getElementById('announcementContent')?.value;
        if (content) await supabase.from('posts').insert([{ user_id: currentUser.id, content, is_announcement: true, title: '📢 ANNOUNCEMENT' }]);
        renderMainView();
      });
      
      // Like functionality
      document.querySelectorAll('.like-btn').forEach(btn => btn.onclick = async () => {
        await supabase.from('likes').insert([{ user_id: currentUser.id, post_id: btn.dataset.like }]);
        await supabase.rpc('increment_likes', { post_id: btn.dataset.like });
        renderMainView();
      });
      
      // Comment toggle and submission
      document.querySelectorAll('.comment-toggle').forEach(btn => {
        btn.onclick = async () => {
          const postId = btn.dataset.comment;
          const commentDiv = document.getElementById(`comments-${postId}`);
          if (commentDiv.classList.contains('hidden')) {
            commentDiv.classList.remove('hidden');
            const { data: comments } = await supabase.from('comments').select('*, profiles(full_name, avatar_url)').eq('post_id', postId).order('created_at', { ascending: true });
            const commentList = document.getElementById(`commentList-${postId}`);
            if (commentList) commentList.innerHTML = comments?.map(c => `<div class="flex gap-2 mb-2"><img src="${c.profiles.avatar_url}" class="w-6 h-6 rounded-full"><div><b class="text-sm">${c.profiles.full_name}</b><p class="text-sm">${c.content}</p></div></div>`).join('');
          } else commentDiv.classList.add('hidden');
        };
      });
      
      document.querySelectorAll('.submit-comment').forEach(btn => btn.onclick = async () => {
        const postId = btn.dataset.commentPost;
        const input = document.getElementById(`commentInput-${postId}`);
        if (input.value) {
          await supabase.from('comments').insert([{ post_id: postId, user_id: currentUser.id, content: input.value }]);
          input.value = '';
          renderMainView();
        }
      });
    }

    // =========================================================================
    // 9. CONFERENCE MODULE
    // =========================================================================
    async function renderConferenceModule(container) {
      const { data: reg } = await supabase.from('registrations').select('conference_id, qr_code, check_in_time').eq('user_id', currentUser.id).single();
      const { data: events } = await supabase.from('events').select('*').order('date', { ascending: true });
      
      container.innerHTML = `
        <div class="space-y-5">
          <div class="glass-card p-6 text-center">
            <h2 class="text-3xl font-bold text-royal dark:text-gold">Rise & Build</h2>
            <p class="text-gray-600 dark:text-gray-400 mt-1">Theme: Empowering the Next Generation</p>
            <div class="mt-4 grid grid-cols-2 gap-3 text-sm">
              <div><i class="fas fa-calendar text-gold"></i> April 15-17, 2026</div>
              <div><i class="fas fa-map-marker-alt text-gold"></i> Archbishop Vining Memorial Church</div>
            </div>
          </div>
          
          <div class="glass-card p-5">
            <h3 class="font-bold text-xl mb-3"><i class="fas fa-ticket-alt text-gold"></i> Your Conference Pass</h3>
            <div class="flex flex-col items-center">
              <div id="qrContainer" class="bg-white p-3 rounded-xl mb-3"></div>
              <p class="font-mono font-bold">${reg?.conference_id || 'Not Registered'}</p>
              ${reg?.check_in_time ? `<p class="text-green-500 mt-2"><i class="fas fa-check-circle"></i> Checked in at ${new Date(reg.check_in_time).toLocaleTimeString()}</p>` : '<p class="text-yellow-500 mt-2">Not yet checked in</p>'}
            </div>
          </div>
          
          <div class="glass-card p-5">
            <h3 class="font-bold text-xl mb-3"><i class="fas fa-chalkboard-user"></i> Speakers</h3>
            <div class="space-y-2"><div class="flex justify-between"><span>👨‍🏫 Ven. Dr. Peter Okafor</span><span class="text-gold">Keynote</span></div><div class="flex justify-between"><span>👩‍🏫 Rev. Sarah Adebayo</span><span class="text-gold">Youth Empowerment</span></div><div class="flex justify-between"><span>👨‍💼 Bro. Michael Eze</span><span class="text-gold">Tech & Faith</span></div></div>
          </div>
          
          <div class="glass-card p-5">
            <h3 class="font-bold text-xl mb-3"><i class="fas fa-clock"></i> Schedule</h3>
            <div class="space-y-2"><div class="flex justify-between"><span>Day 1 (Apr 15)</span><span>9am - Opening Ceremony</span></div><div class="flex justify-between"><span>Day 2 (Apr 16)</span><span>10am - Seminars & Workshops</span></div><div class="flex justify-between"><span>Day 3 (Apr 17)</span><span>9am - Holy Communion & Awards</span></div></div>
          </div>
          
          <div class="glass-card p-5">
            <h3 class="font-bold text-xl mb-3"><i class="fas fa-chart-simple"></i> Parish Participation</h3>
            <div class="space-y-1"><div class="flex justify-between"><span>🏆 St. Paul's</span><span>48 registered</span></div><div class="flex justify-between"><span>🥈 St. Mary's</span><span>32 registered</span></div><div class="flex justify-between"><span>🥉 Christ Church</span><span>27 registered</span></div></div>
          </div>
          
          <div class="glass-card p-5">
            <h3 class="font-bold text-xl mb-3"><i class="fas fa-calendar-week"></i> Side Events</h3>
            ${events?.map(e => `<div class="border-b border-gray-200 dark:border-gray-700 py-2"><div class="font-bold">${e.title}</div><div class="text-sm">📅 ${e.date} | 🕒 ${e.time} | 📍 ${e.venue}</div><button data-event="${e.id}" class="registerEventBtn mt-1 text-gold text-sm">Register →</button></div>`).join('')}
          </div>
        </div>`;
      
      if (reg && document.getElementById('qrContainer')) {
        new QRCode(document.getElementById('qrContainer'), { text: reg.conference_id, width: 150, height: 150 });
      }
      
      document.querySelectorAll('.registerEventBtn').forEach(btn => btn.onclick = async () => {
        await supabase.from('event_registrations').insert([{ event_id: btn.dataset.event, user_id: currentUser.id }]);
        alert("Registered for event!");
      });
    }

    // =========================================================================
    // 10. DOCUMENT CENTER
    // =========================================================================
    async function renderDocumentCenter(container) {
      const { data: docs } = await supabase.from('documents').select('*').order('created_at', { ascending: false });
      
      container.innerHTML = `
        <div class="glass-card p-5 mb-5">
          <h2 class="text-2xl font-bold mb-3"><i class="fas fa-folder-open text-gold"></i> Resource Center</h2>
          <input type="text" id="searchDocs" placeholder="Search documents..." class="w-full p-3 rounded-xl border dark:bg-gray-800">
        </div>
        
        <div class="grid gap-3 md:grid-cols-2" id="documentsList">
          ${docs?.map(doc => `
            <div class="glass-card p-4 document-item" data-title="${doc.title.toLowerCase()}">
              <div class="flex items-start gap-3">
                <div class="text-3xl"><i class="fas ${doc.file_type === 'pdf' ? 'fa-file-pdf text-red-500' : doc.file_type === 'image' ? 'fa-image text-green-500' : 'fa-file-word text-blue-500'}"></i></div>
                <div class="flex-1"><h3 class="font-bold">${doc.title}</h3><p class="text-xs text-gray-500">${doc.description || ''}</p><div class="flex gap-3 mt-2 text-xs"><span><i class="far fa-eye"></i> ${doc.views || 0}</span><span><i class="fas fa-download"></i> ${doc.downloads || 0}</span><span><i class="far fa-heart"></i> ${doc.likes || 0}</span></div></div>
                <button data-doc="${doc.id}" class="downloadDoc bg-gold/20 p-2 rounded-xl"><i class="fas fa-download"></i></button>
              </div>
              <div class="mt-2"><textarea id="commentDoc-${doc.id}" placeholder="Report error or suggest correction..." class="w-full text-sm p-2 rounded-lg border mt-2 hidden"></textarea><button data-doc-comment="${doc.id}" class="reportErrorBtn text-xs text-red-500">Report Issue</button></div>
            </div>
          `).join('')}
        </div>
        
        ${await checkUserPermissions('conference_admin') ? `
        <div class="glass-card p-5 mt-5">
          <h3 class="font-bold"><i class="fas fa-upload"></i> Admin Upload</h3>
          <input type="text" id="docTitle" placeholder="Document Title" class="w-full p-2 border rounded my-2"><input type="file" id="docFile" class="my-2"><button id="uploadDocumentBtn" class="bg-royal text-white px-4 py-2 rounded-xl">Upload Document</button>
        </div>` : ''}`;
      
      document.getElementById('searchDocs')?.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.document-item').forEach(el => {
          el.style.display = el.dataset.title?.includes(term) ? '' : 'none';
        });
      });
      
      document.querySelectorAll('.downloadDoc').forEach(btn => btn.onclick = async () => {
        await supabase.rpc('increment_downloads', { doc_id: btn.dataset.doc });
        alert("Download started (simulated)");
      });
      
      document.getElementById('uploadDocumentBtn')?.addEventListener('click', async () => {
        const title = document.getElementById('docTitle').value;
        alert("File upload would save to Supabase Storage. Configure bucket 'documents' first.");
        if (title) await supabase.from('documents').insert([{ title, file_type: 'pdf', uploaded_by: currentUser.id }]);
        renderMainView();
      });
    }

    // =========================================================================
    // 11. COMMUNITY MODULE (Facebook Groups Style)
    // =========================================================================
    async function renderCommunityModule(container) {
      const { data: discussions } = await supabase.from('posts').select('*, profiles(full_name, avatar_url)').order('created_at', { ascending: false });
      
      container.innerHTML = `
        <div class="glass-card p-5 mb-5">
          <h2 class="text-2xl font-bold mb-3"><i class="fas fa-users text-gold"></i> AYF Community</h2>
          <p class="text-gray-600 dark:text-gray-400">Connect, share, and grow together in faith</p>
        </div>
        
        <div class="glass-card p-4 mb-5">
          <textarea id="discussionInput" rows="3" placeholder="Ask a question, share a testimony, or start a discussion..." class="w-full p-3 rounded-xl border dark:bg-gray-800"></textarea>
          <div class="flex justify-between mt-3"><button id="postDiscussion" class="bg-royal text-white px-6 py-2 rounded-xl">Post to Community</button><label class="cursor-pointer"><i class="fas fa-image text-gold text-xl"></i><input type="file" id="discussionImage" class="hidden"></label></div>
        </div>
        
        <div id="discussionsFeed" class="space-y-4">
          ${discussions?.map(d => `
            <div class="glass-card p-4">
              <div class="flex gap-3 mb-3"><img src="${d.profiles.avatar_url}" class="w-10 h-10 rounded-full"><div><b>${d.profiles.full_name}</b><p class="text-xs text-gray-500">${new Date(d.created_at).toLocaleString()}</p></div></div>
              <p class="mb-3">${d.content}</p>
              <div class="flex gap-4"><button data-like-community="${d.id}" class="text-sm hover:text-gold"><i class="far fa-heart"></i> Like</button><button data-comment-community="${d.id}" class="text-sm hover:text-gold"><i class="far fa-comment"></i> Comment</button><button data-mention="${d.id}" class="text-sm hover:text-gold"><i class="fas fa-at"></i> Mention</button></div>
            </div>
          `).join('')}
        </div>`;
      
      document.getElementById('postDiscussion')?.addEventListener('click', async () => {
        const content = document.getElementById('discussionInput').value;
        if (content) await supabase.from('posts').insert([{ user_id: currentUser.id, content }]);
        renderMainView();
      });
    }

    // =========================================================================
    // 12. PROFILE PAGE
    // =========================================================================
    async function renderProfilePage(container) {
      const { data: reg } = await supabase.from('registrations').select('*').eq('user_id', currentUser.id).single();
      const { data: userPosts } = await supabase.from('posts').select('*').eq('user_id', currentUser.id);
      const { data: savedCount } = await supabase.from('likes').select('*', { count: 'exact' }).eq('user_id', currentUser.id);
      
      container.innerHTML = `
        <div class="glass-card p-6 text-center mb-5">
          <img src="${currentProfile.avatar_url}" class="w-28 h-28 rounded-full mx-auto border-4 border-gold mb-3">
          <h2 class="text-2xl font-bold">${currentProfile.full_name}</h2>
          <p class="text-gold font-mono">${reg?.conference_id || 'Not Registered'}</p>
          <p class="text-gray-600 dark:text-gray-400">${currentProfile.parish || 'Parish not set'} | ${currentProfile.ayf_position || 'Member'}</p>
          <div class="grid grid-cols-3 gap-3 mt-5">
            <div class="bg-royal/10 p-2 rounded"><div class="font-bold">${userPosts?.length || 0}</div><div class="text-xs">Posts</div></div>
            <div class="bg-royal/10 p-2 rounded"><div class="font-bold">${savedCount?.count || 0}</div><div class="text-xs">Likes Given</div></div>
            <div class="bg-royal/10 p-2 rounded"><div class="font-bold">${reg?.check_in_count || 0}</div><div class="text-xs">Check-ins</div></div>
          </div>
        </div>
        
        <div class="glass-card p-5 mb-5">
          <h3 class="font-bold mb-3"><i class="fas fa-clock"></i> Recent Activity</h3>
          ${userPosts?.slice(0, 3).map(p => `<div class="border-b py-2"><p class="text-sm">📝 ${p.content?.substring(0, 100)}</p><span class="text-xs text-gray-500">${new Date(p.created_at).toLocaleDateString()}</span></div>`).join('') || '<p class="text-gray-500">No recent activity</p>'}
        </div>
        
        ${await checkUserPermissions('moderator') ? `<button id="adminPortalBtn" class="w-full glass-card p-4 text-center font-bold text-gold"><i class="fas fa-shield-alt"></i> Admin Portal</button>` : ''}
      `;
      
      document.getElementById('adminPortalBtn')?.addEventListener('click', () => { currentView = 'admin'; renderMainView(); });
    }

    // =========================================================================
    // 13. ADMIN PANEL (Full Dashboard)
    // =========================================================================
    async function renderAdminPanel(container) {
      if (!await checkUserPermissions('moderator')) { currentView = 'home'; renderMainView(); return; }
      
      // Fetch analytics data
      const { count: totalUsers } = await supabase.from('profiles').select('*', { count: 'exact' });
      const { count: totalRegistrations } = await supabase.from('registrations').select('*', { count: 'exact' });
      const { data: parishStats } = await supabase.from('profiles').select('parish');
      const parishCounts = parishStats?.reduce((acc, p) => { acc[p.parish] = (acc[p.parish] || 0) + 1; return acc; }, {});
      const { data: recentCheckins } = await supabase.from('attendance_logs').select('*, profiles(full_name)').order('check_in_time', { ascending: false }).limit(10);
      
      container.innerHTML = `
        <div class="lg:hidden mb-4"><button id="backToUserView" class="glass-card px-4 py-2"><i class="fas fa-arrow-left"></i> Back to Portal</button></div>
        <div class="grid lg:grid-cols-4 gap-4">
          <div class="lg:col-span-1">
            <div class="glass-card p-4 sticky top-20">
              <h3 class="font-bold mb-3">Admin Menu</h3>
              <div class="space-y-2"><button data-admin-tab="dashboard" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">📊 Dashboard</button><button data-admin-tab="registrations" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">✅ Registrations</button><button data-admin-tab="qr-scanner" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">📷 QR Check-in</button><button data-admin-tab="users" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">👥 Manage Users</button><button data-admin-tab="documents" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">📄 Documents</button><button data-admin-tab="events" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">📅 Events</button><button data-admin-tab="reports" class="admin-tab w-full text-left p-2 rounded hover:bg-gold/20">📈 Reports</button></div>
            </div>
          </div>
          <div class="lg:col-span-3" id="adminContent">
            <!-- Dynamic admin content -->
            <div class="glass-card p-5"><h2 class="text-2xl font-bold mb-4">Dashboard</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"><div class="bg-royal/10 p-3 rounded text-center"><div class="text-2xl font-bold">${totalUsers || 0}</div><div>Total Users</div></div><div class="bg-royal/10 p-3 rounded text-center"><div class="text-2xl font-bold">${totalRegistrations || 0}</div><div>Registrations</div></div><div class="bg-royal/10 p-3 rounded text-center"><div class="text-2xl font-bold">${Object.keys(parishCounts || {}).length}</div><div>Parishes</div></div><div class="bg-royal/10 p-3 rounded text-center"><div class="text-2xl font-bold">${recentCheckins?.length || 0}</div><div>Today's Check-ins</div></div></div>
            <canvas id="analyticsChart" height="200"></canvas>
            <div class="mt-6"><h3 class="font-bold">Recent Check-ins</h3>${recentCheckins?.map(c => `<div class="flex justify-between border-b py-2"><span>${c.profiles?.full_name}</span><span class="text-sm">${new Date(c.check_in_time).toLocaleString()}</span></div>`).join('')}</div></div>
          </div>
        </div>`;
      
      // Chart initialization
      const ctx = document.getElementById('analyticsChart')?.getContext('2d');
      if (ctx && analyticsChart) analyticsChart.destroy();
      if (ctx) {
        analyticsChart = new Chart(ctx, { type: 'bar', data: { labels: Object.keys(parishCounts || {}), datasets: [{ label: 'Registrations by Parish', data: Object.values(parishCounts || {}), backgroundColor: '#D4AF37' }] } });
      }
      
      document.querySelectorAll('.admin-tab').forEach(btn => btn.onclick = async () => {
        const tab = btn.dataset.adminTab;
        const adminContent = document.getElementById('adminContent');
        if (tab === 'qr-scanner') {
          adminContent.innerHTML = `<div class="glass-card p-5"><h3>QR Scanner for Check-in</h3><div id="qr-reader" style="width:100%; max-width:500px"></div><div id="scanResult" class="mt-3"></div></div>`;
          const html5QrCode = new Html5Qrcode("qr-reader");
          html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (decodedText) => {
            await supabase.from('attendance_logs').insert([{ user_id: currentUser.id, conference_id: decodedText, checked_by: currentUser.id }]);
            await supabase.from('registrations').update({ check_in_time: new Date(), check_in_count: supabase.sql`check_in_count + 1` }).eq('conference_id', decodedText);
            document.getElementById('scanResult').innerHTML = `<div class="bg-green-500 text-white p-2 rounded">✅ Checked in: ${decodedText}</div>`;
            setTimeout(() => html5QrCode.stop(), 3000);
          }, (err) => console.log(err));
        } else if (tab === 'registrations') {
          const { data: pending } = await supabase.from('registrations').select('*, profiles(full_name, email, parish)').eq('status', 'pending');
          adminContent.innerHTML = `<div class="glass-card p-5"><h3>Pending Approvals</h3>${pending?.map(p => `<div class="border-b py-3"><b>${p.profiles?.full_name}</b><p>${p.profiles?.email} | ${p.profiles?.parish}</p><button data-approve="${p.user_id}" class="approveReg bg-green-500 text-white px-3 py-1 rounded mt-2">Approve</button></div>`).join('')}</div>`;
          document.querySelectorAll('.approveReg').forEach(btn => btn.onclick = async () => { await supabase.from('registrations').update({ status: 'approved' }).eq('user_id', btn.dataset.approve); renderAdminPanel(container); });
        } else if (tab === 'users') {
          const { data: users } = await supabase.from('profiles').select('*');
          adminContent.innerHTML = `<div class="glass-card p-5"><h3>User Management</h3>${users?.map(u => `<div class="flex justify-between items-center border-b py-2"><span>${u.full_name}</span><select data-role="${u.id}" class="roleSelect border rounded p-1"><option ${u.role === 'member' ? 'selected' : ''}>member</option><option ${u.role === 'moderator' ? 'selected' : ''}>moderator</option><option ${u.role === 'conference_admin' ? 'selected' : ''}>conference_admin</option></select></div>`).join('')}</div>`;
          document.querySelectorAll('.roleSelect').forEach(select => select.onchange = async () => { await supabase.from('profiles').update({ role: select.value }).eq('id', select.dataset.role); alert('Role updated'); });
        } else if (tab === 'reports') {
          adminContent.innerHTML = `<div class="glass-card p-5"><h3>Export Reports</h3><button id="exportCSV" class="bg-royal text-white px-4 py-2 rounded">Export Registrations CSV</button><pre id="reportPreview" class="mt-4 text-sm"></pre></div>`;
          document.getElementById('exportCSV')?.addEventListener('click', async () => {
            const { data } = await supabase.from('registrations').select('*, profiles(full_name, email, parish)');
            const csv = "Name,Email,Parish,Conference ID,Status\n" + data.map(r => `${r.profiles?.full_name},${r.profiles?.email},${r.profiles?.parish},${r.conference_id},${r.status}`).join("\n");
            document.getElementById('reportPreview').textContent = csv;
          });
        } else {
          adminContent.innerHTML = `<div class="glass-card p-5"><h3>${tab} Management - Feature coming</h3></div>`;
        }
      });
      
      document.getElementById('backToUserView')?.addEventListener('click', () => { currentView = 'home'; renderMainView(); });
    }

    // =========================================================================
    // 14. NAVIGATION & INITIALIZATION
    // =========================================================================
    function attachNavigationListeners() {
      document.querySelectorAll('.nav-btn').forEach(btn => btn.onclick = () => { currentView = btn.dataset.nav; renderMainView(); });
      document.getElementById('logoutBtn').onclick = async () => { await supabase.auth.signOut(); location.reload(); };
      document.getElementById('notificationsBtn')?.addEventListener('click', async () => {
        const { data } = await supabase.from('notifications').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
        alert(data?.map(n => `${n.title}: ${n.message}`).join('\n') || 'No notifications');
      });
    }
    
    // Start the app
    checkUser();
  </script>
</body>
</html>
