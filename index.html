  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    
    body {
      background: #f5f5f0 !important;
    }
    
    .dark body {
      background: #000 !important;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 1.5rem;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .dark .glass-card {
      background: rgba(26, 26, 26, 0.92);
      border-color: rgba(212, 175, 55, 0.4);
    }
    
    .glass-card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 20px 40px rgba(0,0,0,0.12);
      border-color: rgba(212, 175, 55, 0.5);
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }
    
    .animate-fadeInUp {
      animation: fadeInUp 0.6s ease-out forwards;
    }
    
    .animate-fadeInScale {
      animation: fadeInScale 0.5s ease-out forwards;
    }
    
    .animate-slideInRight {
      animation: slideInRight 0.5s ease-out forwards;
    }
    
    .animate-pulse-slow {
      animation: pulse 2s ease-in-out infinite;
    }
    
    .notification-card {
      background: white;
      border-left: 4px solid #D4AF37;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .dark .notification-card {
      background: #2d2d2d;
    }
    
    .notification-card:hover {
      transform: translateX(5px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .notification-badge {
      position: absolute;
      top: -5px;
      right: -8px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    .loader {
      border: 3px solid #e0e0e0;
      border-top: 3px solid #D4AF37;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .countdown-number {
      background: linear-gradient(135deg, #0A2E73, #1a4a9e);
      border-radius: 16px;
      padding: 14px 8px;
      min-width: 80px;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .countdown-number::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #D4AF37, #FFD700, #D4AF37);
      border-radius: 18px;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: -1;
    }
    
    .countdown-number:hover::before {
      opacity: 1;
    }
    
    .countdown-number:hover {
      transform: translateY(-3px);
    }
    
    .post-card {
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .post-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    }
    
    input, select, textarea {
      transition: all 0.3s ease;
      background: #fafaf8;
    }
    
    .dark input, .dark select, .dark textarea {
      background: #2d2d2d;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #D4AF37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
      transform: scale(1.01);
    }
    
    .btn-gold {
      background: linear-gradient(135deg, #D4AF37, #C5A028);
      transition: all 0.3s ease;
    }
    
    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
    }
    
    .btn-royal {
      background: linear-gradient(135deg, #0A2E73, #0d3a8a);
      transition: all 0.3s ease;
    }
    
    .btn-royal:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(10, 46, 115, 0.3);
    }
    
    .logo-container {
      transition: all 0.3s ease;
    }
    
    .logo-container:hover {
      transform: rotate(5deg) scale(1.05);
    }
    
    .nav-btn {
      transition: all 0.3s ease;
      position: relative;
    }
    
    .nav-btn:hover {
      transform: translateY(-3px);
      color: #D4AF37;
    }
    
    .nav-btn.active {
      color: #D4AF37;
    }
    
    .nav-btn.active::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 3px;
      background: #D4AF37;
      border-radius: 3px;
      animation: fadeInScale 0.3s ease-out;
    }
    
    .offline-badge {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: #ef4444;
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 12px;
      z-index: 100;
      display: none;
      animation: slideInRight 0.3s ease-out;
    }
    
    /* Custom scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }
    
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #e0e0e0;
      border-radius: 10px;
    }
    
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #D4AF37;
      border-radius: 10px;
    }
    
    /* Notification panel */
    .notification-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 380px;
      height: 100vh;
      background: white;
      box-shadow: -5px 0 30px rgba(0,0,0,0.2);
      z-index: 1000;
      transition: right 0.3s ease;
      overflow-y: auto;
    }
    
    .dark .notification-panel {
      background: #1a1a1a;
    }
    
    .notification-panel.open {
      right: 0;
    }
    
    .notification-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
    }
    
    .notification-overlay.show {
      display: block;
    }
  </style>

  </script>
</head>

  <script>
    // =====================================================
    // 1. SUPABASE INITIALIZATION
    // =====================================================
    const SUPABASE_URL = 'https://haxebhwcudkclyxsjaqx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheGViaHdjdWRrY2x5eHNqYXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDcyMjksImV4cCI6MjA5NjY4MzIyOX0.Iwu6NPRvnJtnfL4D_N2slvKOUidQ1UdLbUPG-4QCuM4';
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =====================================================
    // 2. GLOBAL STATE
    // =====================================================
    const AppState = {
      currentUser: null,
      currentProfile: null,
      currentView: 'home',
      darkMode: localStorage.getItem('darkMode') === 'true',
      adminTab: 'dashboard',
      realtimeSubscriptions: [],
      analyticsChart: null,
      qrScanner: null
    };

    // =====================================================
    // 3. PWA & OFFLINE SUPPORT
    // =====================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('Service Worker registered:', reg);
        }).catch(err => {
          console.log('Service Worker registration failed:', err);
        });
      });
    }

    window.addEventListener('online', () => {
      document.getElementById('offlineBadge').style.display = 'none';
      showAlert('Back online!', 'success');
      checkUser();
    });

    window.addEventListener('offline', () => {
      document.getElementById('offlineBadge').style.display = 'block';
    });

    function showAlert(message, type = 'info') {
      // Card-style notification that appears and disappears
      const container = document.getElementById('alertContainer') || (() => {
        const div = document.createElement('div');
        div.id = 'alertContainer';
        div.className = 'fixed bottom-20 right-4 z-50 space-y-2';
        document.body.appendChild(div);
        return div;
      })();
      
      const colors = {
        success: 'border-green-500 bg-green-50 dark:bg-green-900/20',
        error: 'border-red-500 bg-red-50 dark:bg-red-900/20',
        warning: 'border-yellow-500 bg-yellow-50 dark:bg-yellow-900/20',
        info: 'border-blue-500 bg-blue-50 dark:bg-blue-900/20'
      };
      
      const icons = {
        success: 'fa-check-circle text-green-500',
        error: 'fa-exclamation-circle text-red-500',
        warning: 'fa-exclamation-triangle text-yellow-500',
        info: 'fa-info-circle text-blue-500'
      };
      
      const alert = document.createElement('div');
      alert.className = `notification-card rounded-xl p-4 shadow-lg border-l-4 ${colors[type]} animate-slideInRight mb-3 flex items-start gap-3`;
      alert.innerHTML = `
        <i class="fas ${icons[type]} text-xl"></i>
        <div class="flex-1">
          <p class="text-sm font-medium">${message}</p>
        </div>
        <button class="close-alert text-gray-400 hover:text-gray-600">&times;</button>
      `;
      container.appendChild(alert);
      
      alert.querySelector('.close-alert').onclick = () => alert.remove();
      setTimeout(() => alert.remove(), 4000);
    }

    function applyDarkMode() {
      if (AppState.darkMode) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      localStorage.setItem('darkMode', AppState.darkMode);
    }
    applyDarkMode();

    async function checkUserPermissions(requiredRole) {
      if (!AppState.currentProfile) return false;
      const roleHierarchy = { 
        'super_admin': 5, 
        'archdeaconry_admin': 4, 
        'conference_admin': 3, 
        'moderator': 2, 
        'member': 1 
      };
      const userLevel = roleHierarchy[AppState.currentProfile.role] || 0;
      const requiredLevel = roleHierarchy[requiredRole] || 0;
      return userLevel >= requiredLevel;
    }

    async function loadNotifications() {
      if (!AppState.currentUser) return;
      const { data } = await supabaseClient
        .from('notifications')
        .select('*')
        .eq('user_id', AppState.currentUser.id)
        .eq('read', false)
        .order('created_at', { ascending: false });
      const count = data?.length || 0;
      const badge = document.getElementById('notificationCount');
      if (badge) {
        if (count > 0) {
          badge.classList.remove('hidden');
          badge.textContent = count > 9 ? '9+' : count;
        } else {
          badge.classList.add('hidden');
        }
      }
      return data || [];
    }

    async function showNotificationPanel() {
      const notifications = await loadNotifications();
      const panel = document.getElementById('notificationPanel');
      const overlay = document.getElementById('notificationOverlay');
      const list = document.getElementById('notificationList');
      
      if (notifications.length === 0) {
        list.innerHTML = '<div class="text-center text-gray-500 py-8"><i class="fas fa-bell-slash text-4xl mb-2 block"></i>No new notifications</div>';
      } else {
        list.innerHTML = notifications.map(n => `
          <div class="notification-card p-3 rounded-lg" data-id="${n.id}">
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-full bg-gold/20 flex items-center justify-center flex-shrink-0">
                <i class="fas fa-bell text-gold"></i>
              </div>
              <div class="flex-1">
                <h4 class="font-semibold text-sm">${n.title}</h4>
                <p class="text-xs text-gray-500 mt-1">${n.message}</p>
                <span class="text-xs text-gold mt-1 block">${new Date(n.created_at).toLocaleString()}</span>
              </div>
            </div>
          </div>
        `).join('');
        
        // Mark as read when viewed
        setTimeout(async () => {
          await supabaseClient.from('notifications').update({ read: true }).eq('user_id', AppState.currentUser.id);
          const badge = document.getElementById('notificationCount');
          if (badge) badge.classList.add('hidden');
        }, 2000);
      }
      
      panel.classList.add('open');
      overlay.classList.add('show');
    }

    // =====================================================
    // 4. COUNTDOWN TO JUNE 27, 2026 8:00 AM
    // =====================================================
    function getConferenceCountdown() {
      const targetDate = new Date(2026, 5, 27, 8, 0, 0);
      const now = new Date();
      const diff = targetDate - now;
      
      if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0, ended: true };
      
      return {
        days: Math.floor(diff / (1000 * 60 * 60 * 24)),
        hours: Math.floor((diff % (86400000)) / (3600000)),
        minutes: Math.floor((diff % 3600000) / 60000),
        seconds: Math.floor((diff % 60000) / 1000),
        ended: false
      };
    }

    function startCountdownTimer(elementId) {
      const updateTimer = () => {
        const countdown = getConferenceCountdown();
        const element = document.getElementById(elementId);
        if (element && !countdown.ended) {
          element.innerHTML = `
            <div class="grid grid-cols-4 gap-3 text-center">
              <div class="countdown-number"><div class="text-2xl md:text-3xl font-bold">${countdown.days}</div><div class="text-xs">Days</div></div>
              <div class="countdown-number"><div class="text-2xl md:text-3xl font-bold">${countdown.hours}</div><div class="text-xs">Hours</div></div>
              <div class="countdown-number"><div class="text-2xl md:text-3xl font-bold">${countdown.minutes}</div><div class="text-xs">Minutes</div></div>
              <div class="countdown-number"><div class="text-2xl md:text-3xl font-bold">${countdown.seconds}</div><div class="text-xs">Seconds</div></div>
            </div>
          `;
          // Animate each number
          gsap.fromTo('.countdown-number', 
            { scale: 0.8, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.5, stagger: 0.1 }
          );
        } else if (element && countdown.ended) {
          element.innerHTML = `<div class="text-center text-gold text-xl font-bold animate-pulse">🎉 CONFERENCE IS HERE! 🎉</div>`;
        }
      };
      updateTimer();
      setInterval(updateTimer, 1000);
    }

    // =====================================================
    // 5. REGISTRATION FORM
    // =====================================================
    async function showFullRegistrationForm() {
      const { data: parishes } = await supabaseClient.from('parishes').select('name');
      
      const formHtml = `
        <div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 overflow-y-auto animate-fadeInScale">
          <div class="glass-card p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto custom-scrollbar">
            <div class="text-center mb-6">
              <img src="/logo.png" alt="Logo" class="w-16 h-16 mx-auto mb-3" onerror="this.style.display='none'">
              <i class="fas fa-registered text-royal text-3xl"></i>
              <h2 class="text-2xl font-bold mt-2">Conference Registration</h2>
              <p class="text-gold font-bold">"If God Be For Us" - Romans 8:31</p>
              <p class="text-gray-600 dark:text-gray-400 text-sm">AYF Gwarimba Archdeaconry Conference 2026</p>
              <p class="text-sm mt-1"><i class="fas fa-map-marker-alt text-gold"></i> Venue: St Philip Gwarimpa</p>
              <p class="text-sm"><i class="fas fa-calendar"></i> Saturday, June 27th, 2026 | 8:00 AM</p>
            </div>
            
            <form id="fullRegistrationForm" class="space-y-4">
              <div class="animate-fadeInUp" style="animation-delay: 0.1s">
                <label class="block text-sm font-medium mb-1">Full Name *</label>
                <input type="text" id="regFullName" required class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold">
              </div>
              
              <div class="animate-fadeInUp" style="animation-delay: 0.15s">
                <label class="block text-sm font-medium mb-1">Email Address *</label>

                  <option value="26-35">26-35 years</option>

                </select>
              </div>

                <label class="block text-sm font-medium mb-1">AYF Position *</label>

                <label class="flex items-start gap-3 cursor-pointer">
                  <input type="checkbox" id="termsCheckbox" class="mt-1">
                  <span class="text-sm">I have read and agree to the <a href="/terms.html" target="_blank" class="text-gold underline">Terms & Conditions</a> and <a href="/privacy.html" target="_blank" class="text-gold underline">Privacy Policy</a></span>
                </label>
              </div>
              
              <div class="flex gap-3 pt-4">
                <button type="submit" id="registerSubmitBtn" disabled class="flex-1 bg-gray-400 text-white py-3 rounded-xl font-bold transition-all duration-300">Accept Terms to Register</button>
                <button type="button" id="cancelRegistration" class="flex-1 border border-gray-300 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-all duration-300">Cancel</button>
              </div>
            </form>
          </div>
        </div>`;
      
      document.body.insertAdjacentHTML('beforeend', formHtml);
      
      const termsCheckbox = document.getElementById('termsCheckbox');
      const submitBtn = document.getElementById('registerSubmitBtn');
      
      termsCheckbox.addEventListener('change', () => {
        submitBtn.disabled = !termsCheckbox.checked;
        if (termsCheckbox.checked) {
          submitBtn.className = 'flex-1 btn-royal text-white py-3 rounded-xl font-bold transition-all duration-300';
          gsap.to(submitBtn, { scale: 1.05, duration: 0.2, yoyo: true, repeat: 1 });
        } else {
          submitBtn.className = 'flex-1 bg-gray-400 text-white py-3 rounded-xl font-bold transition-all duration-300';
        }
      });
      
      document.getElementById('fullRegistrationForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!termsCheckbox.checked) {
          showAlert('Please accept Terms & Conditions to register', 'warning');
          return;
        }
        
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const fullName = document.getElementById('regFullName').value;
        const phone = document.getElementById('regPhone').value;
        const gender = document.getElementById('regGender').value;
        const ageRange = document.getElementById('regAgeRange').value;
        const parish = document.getElementById('regParish').value;
        const ayfPosition = document.getElementById('regPosition').value;
        
        submitBtn.textContent = "Creating Account...";
        submitBtn.disabled = true;
        
        try {
          const { data: authData, error: authError } = await supabaseClient.auth.signUp({
            email: email,
            password: password,
            options: { data: { full_name: fullName, phone: phone } }
          });
          
          if (authError) throw new Error(authError.message);
          if (!authData.user) throw new Error("Failed to create user account");
          
          const { error: profileError } = await supabaseClient.from('profiles').insert([{
            id: authData.user.id,
            full_name: fullName,
            phone: phone,
            gender: gender,
            age_range: ageRange,
            parish: parish,
            ayf_position: ayfPosition,
            role: 'member',
            avatar_url: `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName)}&background=0A2E73&color=fff`
          }]);
          
          if (profileError) throw new Error(profileError.message);
          
          const { error: regError } = await supabaseClient.from('registrations').insert([{ 
            user_id: authData.user.id, 
            status: 'pending'
          }]);
          
          if (regError) throw new Error(regError.message);
          
          showAlert("Registration successful! Please check your email to confirm your account.", 'success');
          document.querySelector('.fixed.bg-black\\/60').remove();
          renderAuth();
          
        } catch (error) {
          showAlert("Registration failed: " + error.message, 'error');
          submitBtn.textContent = "Register for Conference";
          submitBtn.disabled = false;
        }
      });
      
      document.getElementById('cancelRegistration')?.addEventListener('click', () => {
        gsap.to('.fixed.bg-black\\/60', { opacity: 0, duration: 0.3, onComplete: () => {
          document.querySelector('.fixed.bg-black\\/60').remove();
        }});
        renderAuth();
      });
    }

        } else {

      };

      };

    async function checkUser() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) {
        renderAuth();
        return;
      }
      AppState.currentUser = user;
      
      let { data: profile } = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('id', user.id)
        .single();
      
      if (!profile) {
        await showFullRegistrationForm();
        return;
      }
      
      AppState.currentProfile = profile;
      
      const isAdmin = await checkUserPermissions('moderator');
      const adminNav = document.querySelector('.admin-only-nav');
      if (adminNav) {
        if (isAdmin) adminNav.classList.remove('hidden');
        else adminNav.classList.add('hidden');
      }
      
      await loadNotifications();
      setupRealtimeSubscriptions();
      renderMainView();
    }

    // =====================================================
    // 7. REALTIME SUBSCRIPTIONS
    // =====================================================
    function setupRealtimeSubscriptions() {
      AppState.realtimeSubscriptions.forEach(sub => {
        supabaseClient.removeChannel(sub);
      });
      AppState.realtimeSubscriptions = [];
      
      const postsChannel = supabaseClient.channel('public-posts')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => {
          if (AppState.currentView === 'home' || AppState.currentView === 'community') {
            renderMainView();
          }
        })
        .subscribe();
      
      const notificationsChannel = supabaseClient.channel('public-notifications')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${AppState.currentUser.id}` }, () => {
          loadNotifications();
          showAlert('You have a new notification!', 'info');
        })
        .subscribe();
      
      AppState.realtimeSubscriptions = [postsChannel, notificationsChannel];
    }

    async function editSpeakers() {
      const { data: speakers } = await supabaseClient.from('speakers').select('*');
      const formHtml = `
        <div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 animate-fadeInScale">
          <div class="glass-card p-6 w-full max-w-md">
            <h3 class="font-bold text-xl mb-4">Edit Speakers</h3>
            <div id="speakersEditForm" class="space-y-3">
              <div><label>Youth President:</label><input type="text" id="speakerYouthPresident" value="${speakers?.find(s => s.position === 'Youth President')?.name || 'Sis. Blessing Ifemenam'}" class="w-full p-2 rounded border transition-all focus:ring-2 focus:ring-gold"></div>
              <div><label>General Secretary:</label><input type="text" id="speakerGenSec" value="${speakers?.find(s => s.position === 'General Secretary')?.name || 'Bro. Simi'}" class="w-full p-2 rounded border transition-all focus:ring-2 focus:ring-gold"></div>
              <div><label>Vice President:</label><input type="text" id="speakerVP" value="${speakers?.find(s => s.position === 'Vice President')?.name || 'Bro. Avan'}" class="w-full p-2 rounded border transition-all focus:ring-2 focus:ring-gold"></div>
            </div>
            <div class="flex gap-3 mt-4">
              <button id="saveSpeakersBtn" class="flex-1 btn-royal text-white py-2 rounded transition-all hover:scale-105">Save Changes</button>
              <button id="closeSpeakersBtn" class="flex-1 border py-2 rounded transition-all hover:bg-gray-100 dark:hover:bg-gray-700">Cancel</button>
            </div>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', formHtml);
      
      document.getElementById('saveSpeakersBtn').onclick = async () => {
        const updates = [
          { position: 'Youth President', name: document.getElementById('speakerYouthPresident').value },
          { position: 'General Secretary', name: document.getElementById('speakerGenSec').value },
          { position: 'Vice President', name: document.getElementById('speakerVP').value }
        ];
        
        for (const update of updates) {
          const existing = speakers?.find(s => s.position === update.position);
          if (existing) {
            await supabaseClient.from('speakers').update({ name: update.name }).eq('id', existing.id);
          } else {
            await supabaseClient.from('speakers').insert([{ position: update.position, name: update.name }]);
          }
        }
        showAlert('Speakers updated successfully!', 'success');
        document.querySelector('.fixed.bg-black\\/60').remove();
        renderMainView();
      };
      
      document.getElementById('closeSpeakersBtn').onclick = () => {
        document.querySelector('.fixed.bg-black\\/60').remove();
      };
    }

      if (AppState.currentView === 'admin' && isAdmin) {
        await renderAdminPanel(container);
      } else if (AppState.currentView === 'home') {
        await renderHomeFeed(container);
      } else if (AppState.currentView === 'conference') {
        await renderConferenceModule(container);
      } else if (AppState.currentView === 'resources') {
        await renderDocumentCenter(container);
      } else if (AppState.currentView === 'community') {
        await renderCommunityModule(container);
      } else if (AppState.currentView === 'profile') {

      gsap.fromTo('#appContainer > div',

          `).join('') || '<div class="glass-card p-8 text-center animate-fadeInUp"><i class="fas fa-newspaper text-4xl text-gray-400 mb-2"></i><p>No posts yet. Be the first to share!</p></div>'}
        </div>`;
      
      document.getElementById('createPostBtn')?.addEventListener('click', async () => {
        const content = prompt("Share your thoughts, prayer requests, or updates about the conference:");
        if (content) {
          await supabaseClient.from('posts').insert([{ user_id: AppState.currentUser.id, content }]);
          showAlert('Post shared successfully!', 'success');
          renderMainView();
        }
      });
      
      document.querySelectorAll('.like-btn').forEach(btn => {
        btn.onclick = async () => {
          gsap.to(btn, { scale: 1.2, duration: 0.2, yoyo: true, repeat: 1 });
          await supabaseClient.from('likes').insert([{ user_id: AppState.currentUser.id, post_id: btn.dataset.like }]);
          await supabaseClient.rpc('increment_post_likes', { post_id: btn.dataset.like });
          renderMainView();
        };
      });
      
      document.querySelectorAll('.comment-toggle').forEach(btn => {
        btn.onclick = async () => {
          const postId = btn.dataset.comment;
          const div = document.getElementById(`comments-${postId}`);
          if (div.classList.contains('hidden')) {
            div.classList.remove('hidden');
            gsap.fromTo(div, { opacity: 0, height: 0 }, { opacity: 1, height: 'auto', duration: 0.3 });
            const { data: comments } = await supabaseClient
              .from('comments')
              .select('*, profiles(full_name, avatar_url)')
              .eq('post_id', postId)
              .order('created_at', { ascending: true });
            const commentList = document.getElementById(`commentList-${postId}`);
            if (commentList) {
              commentList.innerHTML = comments?.map(c => `
                <div class="flex gap-2 animate-fadeInUp"><img src="${c.profiles.avatar_url}" class="w-6 h-6 rounded-full"><div><b class="text-sm">${c.profiles.full_name}</b><p class="text-sm">${c.content}</p></div></div>
              `).join('') || '<p class="text-sm text-gray-500">No comments yet</p>';
            }
          } else {
            gsap.to(div, { opacity: 0, height: 0, duration: 0.3, onComplete: () => div.classList.add('hidden') });
          }
        };
      });
      
      document.querySelectorAll('.submit-comment').forEach(btn => {
        btn.onclick = async () => {
          const postId = btn.dataset.commentPost;
          const input = document.getElementById(`commentInput-${postId}`);
          if (input.value) {
            gsap.to(btn, { scale: 0.95, duration: 0.1, yoyo: true, repeat: 1 });
            await supabaseClient.from('comments').insert([{ post_id: postId, user_id: AppState.currentUser.id, content: input.value }]);
            await supabaseClient.rpc('increment_post_comments', { post_id: postId });
            input.value = '';
            renderMainView();
          }
        };
      });
    }
    
    async function renderDocumentCenter(container) {
      const { data: docs } = await supabaseClient.from('documents').select('*').order('created_at', { ascending: false });
      container.innerHTML = `
        <div class="glass-card p-5 mb-5 animate-fadeInUp">
          <div class="flex items-center gap-3 mb-3">
            <img src="/logo.png" alt="Logo" class="w-10 h-10" onerror="this.style.display='none'">
            <h2 class="text-2xl font-bold"><i class="fas fa-folder-open text-gold"></i> Resource Center</h2>
          </div>
          <input type="text" id="searchDocs" placeholder="Search documents..." class="w-full p-3 rounded-xl border dark:bg-gray-800 transition-all focus:ring-2 focus:ring-gold">
        </div>
        <div class="grid gap-3 md:grid-cols-2" id="documentsList">
          ${docs?.map((doc, index) => `
            <div class="glass-card p-4 document-item animate-fadeInUp" style="animation-delay: ${index * 0.05}s" data-title="${doc.title.toLowerCase()}">
              <div class="flex items-start gap-3"><div class="text-3xl"><i class="fas ${doc.file_type === 'pdf' ? 'fa-file-pdf text-red-500' : 'fa-file-alt text-blue-500'}"></i></div>
              <div class="flex-1"><h3 class="font-bold">${doc.title}</h3><p class="text-xs text-gray-500">${doc.description || ''}</p>
              <div class="flex gap-3 mt-2 text-xs"><span><i class="far fa-eye"></i> ${doc.views || 0}</span><span><i class="fas fa-download"></i> ${doc.downloads || 0}</span></div></div>
              <button data-doc="${doc.id}" class="downloadDoc bg-gold/20 p-2 rounded-xl transition-all hover:scale-110"><i class="fas fa-download"></i></button></div>
            </div>
          `).join('') || '<div class="glass-card p-8 text-center">No documents yet</div>'}
        </div>`;
      
      document.querySelectorAll('.downloadDoc').forEach(btn => {
        btn.onclick = async () => {
          gsap.to(btn, { scale: 0.9, duration: 0.1, yoyo: true, repeat: 1 });
          await supabaseClient.rpc('increment_document_downloads', { doc_id: btn.dataset.doc });
          showAlert('Download started', 'success');
        };
      });
    }
    
    async function renderCommunityModule(container) {
      const { data: discussions } = await supabaseClient.from('posts').select('*, profiles(full_name, avatar_url)').order('created_at', { ascending: false });
      container.innerHTML = `
        <div class="glass-card p-5 mb-5 animate-fadeInUp">
          <div class="flex items-center gap-3">
            <img src="/logo.png" alt="Logo" class="w-10 h-10" onerror="this.style.display='none'">
            <div><h2 class="text-2xl font-bold"><i class="fas fa-users text-gold"></i> AYF Community</h2><p class="text-gray-600 dark:text-gray-400">Connect, share, and grow together in faith</p></div>
          </div>
        </div>
        <div class="glass-card p-4 mb-5 animate-fadeInUp"><textarea id="discussionInput" rows="3" placeholder="Share a testimony or start a discussion..." class="w-full p-3 rounded-xl border dark:bg-gray-800 transition-all focus:ring-2 focus:ring-gold"></textarea>
        <button id="postDiscussion" class="mt-3 btn-royal text-white px-6 py-2 rounded-xl w-full font-semibold transition-all hover:scale-105">Post to Community</button></div>
        <div id="discussionsFeed" class="space-y-4">${discussions?.map((d, index) => `
          <div class="glass-card p-4 animate-fadeInUp" style="animation-delay: ${index * 0.05}s"><div class="flex gap-3 mb-3"><img src="${d.profiles.avatar_url}" class="w-10 h-10 rounded-full"><div><b>${d.profiles.full_name}</b><p class="text-xs text-gray-500">${new Date(d.created_at).toLocaleString()}</p></div></div><p>${d.content}</p></div>
        `).join('') || '<div class="glass-card p-8 text-center">No discussions yet</div>'}</div>`;
      
      document.getElementById('postDiscussion')?.addEventListener('click', async () => {
        const content = document.getElementById('discussionInput').value;
        if (content) {
          await supabaseClient.from('posts').insert([{ user_id: AppState.currentUser.id, content }]);
          document.getElementById('discussionInput').value = '';
          showAlert('Posted to community!', 'success');
          renderMainView();
        }
      });
    }
    
    async function renderProfilePage(container) {
      const { data: reg } = await supabaseClient.from('registrations').select('*').eq('user_id', AppState.currentUser.id).single();
      container.innerHTML = `
        <div class="glass-card p-6 text-center mb-5 animate-fadeInUp">
          <img src="/logo.png" alt="Logo" class="w-20 h-20 mx-auto mb-3 logo-container" onerror="this.style.display='none'">
          <img src="${AppState.currentProfile.avatar_url}" class="w-28 h-28 rounded-full mx-auto border-4 border-gold mb-3 animate-pulse-slow">
          <h2 class="text-2xl font-bold">${AppState.currentProfile.full_name}</h2>
          <p class="text-gold">${reg?.conference_id || 'Pending'}</p>
          <p class="text-gray-600 dark:text-gray-400">${AppState.currentProfile.parish || 'Parish not set'} | ${AppState.currentProfile.ayf_position || 'Member'}</p>
        </div>`;
    }
    
    async function renderAdminPanel(container) {
      container.innerHTML = `<div class="glass-card p-5 animate-fadeInUp"><h2 class="text-2xl font-bold mb-4">Admin Dashboard</h2><p>Admin panel ready. Full management features available with database setup.</p></div>`;
    }
    
    function attachNavigationListeners() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          AppState.currentView = btn.dataset.nav;
          renderMainView();
        };
      });
      
      const userMenuBtn = document.getElementById('userMenuBtn');
      const userDropdown = document.getElementById('userDropdown');
      if (userMenuBtn) {
        userMenuBtn.onclick = (e) => {
          e.stopPropagation();
          userDropdown.classList.toggle('hidden');
          if (!userDropdown.classList.contains('hidden')) {
            gsap.fromTo(userDropdown, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.2 });
          }
        };
        document.addEventListener('click', (e) => { if (!userMenuBtn.contains(e.target) && !userDropdown.contains(e.target)) userDropdown.classList.add('hidden'); });
      }
      
      document.getElementById('profileDropdownLink')?.addEventListener('click', (e) => { e.preventDefault(); userDropdown.classList.add('hidden'); AppState.currentView = 'profile'; renderMainView(); });
      document.getElementById('logoutDropdownBtn')?.addEventListener('click', async () => { await supabaseClient.auth.signOut(); window.location.reload(); });
      
      const darkModeToggle = document.getElementById('darkModeToggle');
      if (darkModeToggle) darkModeToggle.onclick = () => { 
        AppState.darkMode = !AppState.darkMode; 
        applyDarkMode();
        gsap.to(darkModeToggle, { rotation: 360, duration: 0.5 });
      };
      
      const notificationsBtn = document.getElementById('notificationsBtn');
      if (notificationsBtn) {
        notificationsBtn.onclick = () => {
          showNotificationPanel();
        };
      }
      
      const closePanel = document.getElementById('closeNotificationPanel');
      const overlay = document.getElementById('notificationOverlay');
      if (closePanel) closePanel.onclick = () => {
        document.getElementById('notificationPanel').classList.remove('open');
        overlay.classList.remove('show');
      };
      if (overlay) overlay.onclick = () => {
        document.getElementById('notificationPanel').classList.remove('open');
        overlay.classList.remove('show');
      };
    }
    
    checkUser();
  </script>
</body>
</html>
