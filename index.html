  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

    body {
      background: #f5f5f0 !important;
    }

    .dark body {
      background: #1a1a1a !important;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 1.5rem;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .dark .glass-card {
      background: rgba(26, 26, 26, 0.92);
      border-color: rgba(212, 175, 55, 0.4);
    }

    .glass-card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 20px 40px rgba(0,0,0,0.12);
      border-color: rgba(212, 175, 55, 0.5);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes skeletonPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    .animate-fadeInUp { animation: fadeInUp 0.6s ease-out forwards; }
    .animate-fadeInScale { animation: fadeInScale 0.5s ease-out forwards; }
    .animate-slideInRight { animation: slideInRight 0.5s ease-out forwards; }
    .animate-pulse-slow { animation: pulse 2s ease-in-out infinite; }

    .skeleton {
      background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      animation: skeletonPulse 1.5s ease-in-out infinite;
      border-radius: 0.75rem;
    }

    .dark .skeleton {
      background: linear-gradient(90deg, #333 25%, #444 50%, #333 75%);
      background-size: 200% 100%;
    }

    .notification-card {
      background: white;
      border-left: 4px solid #D4AF37;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .dark .notification-card { background: #2d2d2d; }

    .notification-card:hover {
      transform: translateX(5px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .notification-badge {
      position: absolute;
      top: -5px;
      right: -8px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .loader {
      border: 3px solid #e0e0e0;
      border-top: 3px solid #D4AF37;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .countdown-number {
      background: linear-gradient(135deg, #0A2E73, #1a4a9e);
      border-radius: 16px;
      padding: 14px 8px;
      min-width: 80px;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .countdown-number::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #D4AF37, #FFD700, #D4AF37);
      border-radius: 18px;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: -1;
    }

    .countdown-number:hover::before { opacity: 1; }
    .countdown-number:hover { transform: translateY(-3px); }

    .post-card {
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .post-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    }

    input, select, textarea {
      transition: all 0.3s ease;
      background: #fafaf8;
    }

    .dark input, .dark select, .dark textarea { background: #2d2d2d; }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #D4AF37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
      transform: scale(1.01);
    }

    .btn-gold {
      background: linear-gradient(135deg, #D4AF37, #C5A028);
      transition: all 0.3s ease;
    }

    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
    }

    .btn-royal {
      background: linear-gradient(135deg, #0A2E73, #0d3a8a);
      transition: all 0.3s ease;
    }

    .btn-royal:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(10, 46, 115, 0.3);
    }

    .btn-royal:disabled, .btn-gold:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .logo-container { transition: all 0.3s ease; }
    .logo-container:hover { transform: rotate(5deg) scale(1.05); }

    .nav-btn {
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-btn:hover { transform: translateY(-3px); color: #D4AF37; }
    .nav-btn.active { color: #D4AF37; }

    .nav-btn.active::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 3px;
      background: #D4AF37;
      border-radius: 3px;
      animation: fadeInScale 0.3s ease-out;
    }

    .offline-badge {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: #ef4444;
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 12px;
      z-index: 100;
      display: none;
      animation: slideInRight 0.3s ease-out;
    }

    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #e0e0e0; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }

    .notification-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 380px;
      height: 100vh;
      background: white;
      box-shadow: -5px 0 30px rgba(0,0,0,0.2);
      z-index: 1000;
      transition: right 0.3s ease;
      overflow-y: auto;
    }

    .dark .notification-panel { background: #1a1a1a; }
    .notification-panel.open { right: 0; }

    .notification-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
    }

    .notification-overlay.show { display: block; }

    /* Lightbox styles */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 8px; }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      z-index: 2001;
    }

    /* Pull to refresh indicator */
    .ptr-indicator {
      text-align: center;
      padding: 15px;
      color: #D4AF37;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .ptr-indicator.visible { opacity: 1; }

    /* Reaction buttons */
    .reaction-btn {
      transition: all 0.2s ease;
      padding: 4px 8px;
      border-radius: 12px;
    }
    .reaction-btn:hover { transform: scale(1.2); background: rgba(212, 175, 55, 0.1); }
    .reaction-btn.active { background: rgba(212, 175, 55, 0.2); }

    /* Toast container */
    #toastContainer {
      position: fixed;
      bottom: 90px;
      right: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      animation: slideInRight 0.3s ease-out;
    }

    /* Modal improvements */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .modal-backdrop.open { opacity: 1; }
    .modal-content {
      transform: scale(0.95);
      transition: transform 0.3s ease;
    }
    .modal-backdrop.open .modal-content { transform: scale(1); }

    /* Image compression progress */
    .compress-progress {
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .compress-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #D4AF37, #FFD700);
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }
  </style>

  <script>

    // =====================================================
    // CONFIGURATION - Load from external config in production
    // =====================================================
    const CONFIG = {
      SUPABASE_URL: 'https://haxebhwcudkclyxsjaqx.supabase.co',
      SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3ZGt4eW5iYnNka2Vrem1tY2xwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODA2MDYsImV4cCI6MjA5Njc1NjYwNn0.IcxHv1sMcSK4pw9ZVJXi6KQz7_0vLy01wRA5Ljw6Tuo',
      CONFERENCE_DATE: new Date(2026, 5, 27, 8, 0, 0),
      ITEMS_PER_PAGE: 10,
      MAX_IMAGE_SIZE_MB: 2,
      IMAGE_QUALITY: 0.8,
      MAX_IMAGE_WIDTH: 1200
    };

    // =====================================================
    // SUPABASE INITIALIZATION
    // =====================================================
    const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

    // =====================================================
    // GLOBAL STATE
    // =====================================================
    const AppState = {
      currentUser: null,
      currentProfile: null,
      currentView: 'home',
      darkMode: localStorage.getItem('darkMode') === 'true',
      adminTab: 'dashboard',
      realtimeSubscriptions: [],
      analyticsChart: null,
      qrScanner: null,
      likedPosts: new Set(),
      likedComments: new Set(),
      postsCache: [],
      commentsCache: {},
      docsCache: [],
      eventsCache: [],
      currentPage: 1,
      isLoading: false,
      hasMorePosts: true,
      offlineQueue: [],
      isOnline: navigator.onLine
    };

    // =====================================================
    // UTILITY FUNCTIONS
    // =====================================================

    // XSS Sanitization
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Get image from post (supports both image_url and media_urls)
    function getPostImage(post) {
      if (post.image_url) return post.image_url;
      if (post.media_urls && post.media_urls.length > 0) return post.media_urls[0];
      return null;
    }

    // Get all images from post
    function getPostImages(post) {
      const images = [];
      if (post.image_url) images.push(post.image_url);
      if (post.media_urls && Array.isArray(post.media_urls)) {
        post.media_urls.forEach(url => { if (url && !images.includes(url)) images.push(url); });
      }
      return images;
    }


    // Parse mentions (@username)
    function parseMentions(text) {
      if (!text) return '';
      return escapeHtml(text).replace(/@([\w\s]+?)(?=\s|$|[^\w\s])/g, '<span class="text-gold font-semibold cursor-pointer hover:underline">@$1</span>');
    }

    // Format relative time
    function timeAgo(date) {
      const seconds = Math.floor((new Date() - new Date(date)) / 1000);
      const intervals = {
        year: 31536000, month: 2592000, week: 604800,
        day: 86400, hour: 3600, minute: 60
      };
      for (const [unit, secondsInUnit] of Object.entries(intervals)) {
        const interval = Math.floor(seconds / secondsInUnit);
        if (interval >= 1) return interval === 1 ? `1 ${unit} ago` : `${interval} ${unit}s ago`;
      }
      return 'Just now';
    }

    // Debounce function
    function debounce(fn, ms) {
      let timeout;
      return (...args) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => fn(...args), ms);
      };
    }

    // Compress image before upload
    async function compressImage(file, maxWidth = CONFIG.MAX_IMAGE_WIDTH, quality = CONFIG.IMAGE_QUALITY) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob((blob) => {
              resolve(new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() }));
            }, 'image/jpeg', quality);
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Upload to Supabase Storage
    async function uploadImage(file, bucket = 'post-images') {
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
      const filePath = `${AppState.currentUser.id}/${fileName}`;

      const { error: uploadError } = await supabaseClient.storage
        .from(bucket)
        .upload(filePath, file);

      if (uploadError) throw uploadError;

      const { data: { publicUrl } } = supabaseClient.storage
        .from(bucket)
        .getPublicUrl(filePath);

      return publicUrl;
    }

    // =====================================================
    // PWA & OFFLINE SUPPORT
    // =====================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('Service Worker registered:', reg);
        }).catch(err => {
          console.log('Service Worker registration failed:', err);
        });
      });
    }

    // PWA Install Prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const installBtn = document.createElement('button');
      installBtn.id = 'installPwaBtn';
      installBtn.className = 'fixed bottom-24 right-4 btn-gold text-white px-4 py-2 rounded-full shadow-lg z-50 flex items-center gap-2 animate-pulse-slow';
      installBtn.innerHTML = '<i class="fas fa-download"></i> Install App';
      installBtn.onclick = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') console.log('App installed');
          deferredPrompt = null;
          installBtn.remove();
        }
      };
      document.body.appendChild(installBtn);
    });

    window.addEventListener('online', () => {
      AppState.isOnline = true;
      document.getElementById('offlineBadge').style.display = 'none';
      showToast('Back online!', 'success');
      syncOfflineQueue();
      checkUser();
    });

    window.addEventListener('offline', () => {
      AppState.isOnline = false;

    // Offline queue for posts/comments
    function queueOfflineAction(action) {
      AppState.offlineQueue.push({ ...action, timestamp: Date.now() });
      localStorage.setItem('offlineQueue', JSON.stringify(AppState.offlineQueue));
    }

    async function syncOfflineQueue() {
      if (AppState.offlineQueue.length === 0) return;
      showToast(`Syncing ${AppState.offlineQueue.length} offline items...`, 'info');

      for (const action of [...AppState.offlineQueue]) {
        try {
          if (action.type === 'post') {
            await supabaseClient.from('posts').insert([action.data]);
          } else if (action.type === 'comment') {
            await supabaseClient.from('comments').insert([action.data]);
            await supabaseClient.rpc('increment_post_comments', { post_id: action.data.post_id });
          }
          AppState.offlineQueue = AppState.offlineQueue.filter(a => a.timestamp !== action.timestamp);
        } catch (err) {
          console.error('Failed to sync offline action:', err);
        }
      }
      localStorage.setItem('offlineQueue', JSON.stringify(AppState.offlineQueue));
      showToast('Sync complete!', 'success');
    }

    // =====================================================
    // TOAST NOTIFICATIONS (Replaces showAlert)
    // =====================================================
    function showToast(message, type = 'info', duration = 4000) {
      const container = document.getElementById('toastContainer');

      const colors = {
        success: 'border-green-500 bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-200',
        error: 'border-red-500 bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-200',
        warning: 'border-yellow-500 bg-yellow-50 dark:bg-yellow-900/20 text-yellow-800 dark:text-yellow-200',
        info: 'border-blue-500 bg-blue-50 dark:bg-blue-900/20 text-blue-800 dark:text-blue-200'
      };

      const icons = {
        success: 'fa-check-circle text-green-500',
        error: 'fa-exclamation-circle text-red-500',
        warning: 'fa-exclamation-triangle text-yellow-500',
        info: 'fa-info-circle text-blue-500'
      };

      const toast = document.createElement('div');
      toast.className = `toast notification-card rounded-xl p-4 shadow-lg border-l-4 ${colors[type]} flex items-start gap-3 max-w-sm`;
      toast.innerHTML = `
        <i class="fas ${icons[type]} text-xl flex-shrink-0 mt-0.5"></i>
        <div class="flex-1"><p class="text-sm font-medium">${escapeHtml(message)}</p></div>
        <button class="close-toast text-gray-400 hover:text-gray-600 flex-shrink-0" aria-label="Close">&times;</button>
      `;

      container.appendChild(toast);

      toast.querySelector('.close-toast').onclick = () => {
        gsap.to(toast, { opacity: 0, x: 50, duration: 0.3, onComplete: () => toast.remove() });
      };

      setTimeout(() => {
        if (toast.parentNode) {
          gsap.to(toast, { opacity: 0, x: 50, duration: 0.3, onComplete: () => toast.remove() });
        }
      }, duration);
    }

    // Legacy alias for backward compatibility
    function showAlert(message, type) { showToast(message, type); }

    async function checkUserPermissions(requiredRole) {
      if (!AppState.currentProfile) return false;
      const roleHierarchy = { 
        'super_admin': 5, 
        'archdeaconry_admin': 4, 
        'conference_admin': 3, 
        'moderator': 2, 
        'member': 1 
      };
      const userLevel = roleHierarchy[AppState.currentProfile.role] || 0;
      const requiredLevel = roleHierarchy[requiredRole] || 0;
      return userLevel >= requiredLevel;
    }

    async function loadNotifications() {
      if (!AppState.currentUser) return [];
      try {
        const { data } = await supabaseClient
          .from('notifications')
          .select('*')
          .eq('user_id', AppState.currentUser.id)
          .eq('read', false)
          .order('created_at', { ascending: false });
        const count = data?.length || 0;
        const badge = document.getElementById('notificationCount');
        if (badge) {
          if (count > 0) {
            badge.classList.remove('hidden');
            badge.textContent = count > 9 ? '9+' : count;
          } else {
            badge.classList.add('hidden');
          }
        }
        return data || [];
      } catch (err) {
        console.error('Error loading notifications:', err);
        return [];
      }
    }

    // =====================================================
    // COUNTDOWN
    // =====================================================
    function getConferenceCountdown() {
      const now = new Date();
      const diff = CONFIG.CONFERENCE_DATE - now;

      if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0, ended: true };

      return {
        days: Math.floor(diff / (1000 * 60 * 60 * 24)),
        hours: Math.floor((diff % 86400000) / 3600000),
        minutes: Math.floor((diff % 3600000) / 60000),
        seconds: Math.floor((diff % 60000) / 1000),
        ended: false
      };
    }

    function startCountdownTimer(elementId) {
      const updateTimer = () => {
        const countdown = getConferenceCountdown();
        const element = document.getElementById(elementId);
        if (!element) return;

        if (!countdown.ended) {
          element.innerHTML = `
            <div class="grid grid-cols-4 gap-3 text-center">
              <div class="countdown-number"><div class="text-2xl md:text-3xl font-bold">${String(countdown.days).padStart(2, '0')}</div><div class="text-xs opacity-80">Days</div></div>
              <div class="countdown-number"><div class="text-2xl md:text-3xl font-bold">${String(countdown.hours).padStart(2, '0')}</div><div class="text-xs opacity-80">Hours</div></div>
              <div class="countdown-number"><div class="text-2xl md:text-3xl font-bold">${String(countdown.minutes).padStart(2, '0')}</div><div class="text-xs opacity-80">Minutes</div></div>
              <div class="countdown-number"><div class="text-2xl md:text-3xl font-bold">${String(countdown.seconds).padStart(2, '0')}</div><div class="text-xs opacity-80">Seconds</div></div>
            </div>
          `;
        } else {
          element.innerHTML = `<div class="text-center text-gold text-xl font-bold animate-pulse">🎉 CONFERENCE IS HERE! 🎉</div>`;
        }
      };
      updateTimer();
      return setInterval(updateTimer, 1000);
    }

          return;

            options: { data: { full_name: fullName, phone: phone } }

          if (!authData.user) throw new Error("Failed to create user account");

          const { error: profileError } = await supabaseClient.from('profiles').insert([{
            id: authData.user.id,
            full_name: fullName,
            phone: phone,
            gender: gender,
            age_range: ageRange,

            role: 'member',

          const { error: regError } = await supabaseClient.from('registrations').insert([{

        closeModal(modal);
        renderAuth();
      });

          document.getElementById('authError').classList.remove('hidden');
          return;
        }

        submitBtn.disabled = true;
        spinner.classList.remove('hidden');

        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) {
          document.getElementById('authError').textContent = error.message;
          document.getElementById('authError').classList.remove('hidden');
          submitBtn.disabled = false;
          spinner.classList.add('hidden');
        } else {
          checkUser();
        }
      });

      document.getElementById('googleBtn').onclick = async () => {
        await supabaseClient.auth.signInWithOAuth({ 
          provider: 'google', 
          options: { redirectTo: window.location.origin } 
        });
      };

      document.getElementById('showRegisterLink').onclick = async (e) => {
        e.preventDefault();
        await showFullRegistrationForm();
      };

      document.getElementById('resetLink').onclick = async (e) => {
        e.preventDefault();
        const email = prompt("Enter your registered email:");
        if (email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
          if (error) {
            showToast(error.message, 'error');
          } else {
            showToast("Password reset link sent to your email!", 'success');
          }
        } else if (email) {
          showToast('Please enter a valid email address', 'warning');
        }
      };
    }

    async function checkUser() {
      console.log('[DEBUG] checkUser() starting...');
      try {
        const { data: { user } } = await supabaseClient.auth.getUser();
        console.log('[DEBUG] Auth user:', user ? user.id : 'null');
        if (!user) {
          renderAuth();
          return;
        }
        AppState.currentUser = user;

        let { data: profile, error: profileError } = await supabaseClient
          .from('profiles')
          .select('*')
          .eq('id', user.id)
          .single();

        if (profileError || !profile) {
          // Check if user signed up with OAuth but no profile exists
          const metadata = user.user_metadata || {};
          if (metadata.full_name || metadata.name) {
            // Auto-create profile for OAuth users
            const newProfile = {
              id: user.id,
              full_name: metadata.full_name || metadata.name || 'New User',
              phone: metadata.phone || '',
              gender: '',
              age_range: '',
              parish: '',
              ayf_position: 'Member',
              role: 'member',
              avatar_url: metadata.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(metadata.full_name || 'User')}&background=0A2E73&color=fff`
            };
            await supabaseClient.from('profiles').insert([newProfile]);
            profile = newProfile;
          } else {
            await showFullRegistrationForm();
            return;
          }
        }

        AppState.currentProfile = profile;

        const isAdmin = await checkUserPermissions('moderator');
        const adminNav = document.querySelector('.admin-only-nav');
        if (adminNav) {
          if (isAdmin) adminNav.classList.remove('hidden');
          else adminNav.classList.add('hidden');
        }

        await loadNotifications();
        setupRealtimeSubscriptions();
        renderMainView();

        // Sync any offline queue
        if (AppState.isOnline && AppState.offlineQueue.length > 0) {
          syncOfflineQueue();
        }
      } catch (err) {
        console.error('Error checking user:', err);
        showToast('Error loading your profile. Please try again.', 'error');
        renderAuth();
      }
    }

    // =====================================================
    // REALTIME SUBSCRIPTIONS
    // =====================================================
    function setupRealtimeSubscriptions() {
      AppState.realtimeSubscriptions.forEach(sub => {
        supabaseClient.removeChannel(sub);
      });
      AppState.realtimeSubscriptions = [];

      const postsChannel = supabaseClient.channel('public-posts')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, (payload) => {
          if (AppState.currentView === 'home' || AppState.currentView === 'community') {
            // Smart update: prepend new posts, don't full re-render
            if (payload.eventType === 'INSERT') {
              AppState.postsCache.unshift(payload.new);
              renderMainView();
            } else if (payload.eventType === 'UPDATE') {
              const idx = AppState.postsCache.findIndex(p => p.id === payload.new.id);
              if (idx !== -1) AppState.postsCache[idx] = payload.new;
              renderMainView();
            } else if (payload.eventType === 'DELETE') {
              AppState.postsCache = AppState.postsCache.filter(p => p.id !== payload.old.id);
              renderMainView();
            }
          }
        })
        .subscribe();

      const notificationsChannel = supabaseClient.channel('public-notifications')
        .on('postgres_changes', { 
          event: 'INSERT', 
          schema: 'public', 
          table: 'notifications', 
          filter: `user_id=eq.${AppState.currentUser.id}` 
        }, () => {
          loadNotifications();
          showToast('You have a new notification!', 'info');
        })
        .subscribe();

      AppState.realtimeSubscriptions = [postsChannel, notificationsChannel];
    }

        const feedEl = document.getElementById('postsFeed');
        if (feedEl && reset) {
          feedEl.innerHTML = `
            <div class="glass-card p-8 text-center text-red-500">
              <i class="fas fa-exclamation-circle text-3xl mb-2"></i>
              <p class="font-semibold">Failed to load posts</p>
              <p class="text-sm mt-2 text-gray-500">${escapeHtml(err.message || 'Unknown error')}</p>
              <button onclick="renderMainView()" class="mt-3 btn-gold text-white px-4 py-2 rounded-xl">Retry</button>
            </div>`;
        }
        showToast('Error loading posts: ' + (err.message || 'Unknown'), 'error');
      } finally {
        AppState.isLoading = false;
      }
    }

    function renderPostCard(post, index) {
      const isLiked = AppState.likedPosts.has(post.id);
      const isAnnouncement = post.is_announcement;
      const isPinned = post.is_pinned;

      // Safely get profile data
      const profile = post.profiles || {};

      const userRole = profile.role || 'member';
      const userParish = profile.parish || '';

      let postImages = [];
      if (post.image_url) postImages.push(post.image_url);
      if (post.media_urls && Array.isArray(post.media_urls)) {
        post.media_urls.forEach(url => { if (url && !postImages.includes(url)) postImages.push(url); });
      }

      // Build image HTML
      let imagesHtml = '';

      } else if (postImages.length > 1) {
        imagesHtml = `<div class="grid grid-cols-2 gap-2 mb-3">${postImages.map(url => `<img src="${escapeHtml(url)}" class="rounded-xl h-32 w-full object-cover cursor-pointer hover:opacity-90 transition-opacity" onclick="openLightbox('${escapeHtml(url)}')" loading="lazy" onerror="this.style.display='none'">`).join('')}</div>`;

          <div class="flex gap-3 mb-3">

            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <b class="text-lg">${escapeHtml(fullName)}</b>
                ${userRole !== 'member' ? `<span class="text-xs bg-gold/20 px-2 py-0.5 rounded-full text-gold font-semibold">${escapeHtml(userRole)}</span>` : ''}
                <span class="text-xs text-gray-400">${timeAgo(post.created_at)}</span>
              </div>
              <p class="text-xs text-gray-500">${escapeHtml(userParish)}</p>
            </div>
            ${post.user_id === AppState.currentUser?.id ? `
              <button class="delete-post-btn text-gray-400 hover:text-red-500 transition-colors" data-post="${post.id}" aria-label="Delete post">
                <i class="fas fa-trash-alt"></i>
              </button>
            ` : ''}
          </div>
          <p class="text-gray-700 dark:text-gray-300 mb-3 whitespace-pre-wrap">${escapeHtml(post.content || '')}</p>
          ${imagesHtml}
          <div class="flex gap-4 pt-3 border-t border-gray-200 dark:border-gray-700">
            <button data-like="${post.id}" class="like-btn flex items-center gap-2 hover:text-gold transition-all hover:scale-105 ${isLiked ? 'text-red-500' : 'text-gray-500 dark:text-gray-400'}">
              <i class="fas fa-heart ${isLiked ? 'text-red-500' : ''} transition-transform ${isLiked ? 'scale-110' : ''}"></i> 
              <span>${post.likes_count || 0}</span>
            </button>
            <button data-comment="${post.id}" class="comment-toggle flex items-center gap-2 hover:text-gold transition-all hover:scale-105 text-gray-500 dark:text-gray-400">
              <i class="far fa-comment"></i> <span>${post.comments_count || 0}</span>
            </button>
            <button class="share-btn flex items-center gap-2 hover:text-gold transition-all hover:scale-105 text-gray-500 dark:text-gray-400 ml-auto" data-post="${post.id}">
              <i class="fas fa-share-alt"></i>
            </button>
          </div>
          <div id="comments-${post.id}" class="hidden mt-4 pt-3 border-t border-gray-200 dark:border-gray-700">
            <div id="commentList-${post.id}" class="mb-3 max-h-64 overflow-y-auto space-y-2 custom-scrollbar">
              <div class="text-center text-gray-400 py-2"><i class="fas fa-spinner fa-spin"></i> Loading comments...</div>
            </div>
            <div class="flex gap-2">
              <input type="text" id="commentInput-${post.id}" placeholder="Write a comment..." class="flex-1 p-2 rounded-xl border dark:bg-gray-800 transition-all focus:ring-2 focus:ring-gold text-sm">
              <button data-comment-post="${post.id}" class="submit-comment btn-royal text-white px-4 py-2 rounded-xl transition-all hover:scale-105 text-sm">

    function attachPostHandlers() {
      // Create post modal
      const postModal = document.getElementById('postModal');
      const postContent = document.getElementById('postContent');
      const imageInput = document.getElementById('imageInput');
      const imagePreview = document.getElementById('imagePreview');
      const previewImg = document.getElementById('previewImg');
      const compressProgress = document.getElementById('compressProgress');
      const compressProgressBar = document.getElementById('compressProgressBar');
      let selectedImage = null;

      document.getElementById('createPostBtn')?.addEventListener('click', () => {
        postModal.classList.remove('hidden');
        requestAnimationFrame(() => postModal.classList.add('open'));
        postContent.focus();
      });

      document.getElementById('closeModal')?.addEventListener('click', () => {
        postModal.classList.remove('open');
        setTimeout(() => {
          postModal.classList.add('hidden');
          postContent.value = '';
          imagePreview.classList.add('hidden');
          selectedImage = null;
          document.getElementById('postCategory').value = 'general';
        }, 300);
      });

      document.getElementById('uploadImageBtn')?.addEventListener('click', () => imageInput.click());

      imageInput?.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.size > CONFIG.MAX_IMAGE_SIZE_MB * 1024 * 1024) {
          showToast(`Image too large. Compressing...`, 'info');
        }

        compressProgress.classList.remove('hidden');
        compressProgressBar.style.width = '30%';

        try {
          const compressed = await compressImage(file);
          compressProgressBar.style.width = '70%';

          const reader = new FileReader();
          reader.onload = (ev) => {
            selectedImage = compressed;
            previewImg.src = ev.target.result;
            imagePreview.classList.remove('hidden');
            compressProgressBar.style.width = '100%';
            setTimeout(() => compressProgress.classList.add('hidden'), 500);
          };
          reader.readAsDataURL(compressed);
        } catch (err) {
          showToast('Failed to process image', 'error');
          compressProgress.classList.add('hidden');
        }
      });

      document.getElementById('removeImage')?.addEventListener('click', () => {
        selectedImage = null;
        imagePreview.classList.add('hidden');
        imageInput.value = '';
      });

      document.getElementById('submitPost')?.addEventListener('click', async () => {
        const content = postContent.value.trim();
        const category = document.getElementById('postCategory').value;
        const submitBtn = document.getElementById('submitPost');
        const spinner = document.getElementById('postSpinner');

        if (!content && !selectedImage) {
          showToast('Please write something or add an image', 'warning');
          return;
        }

        submitBtn.disabled = true;
        spinner.classList.remove('hidden');

        try {
          let imageUrl = null;
          if (selectedImage) {
            imageUrl = await uploadImage(selectedImage);
          }

          const postData = { 
            user_id: AppState.currentUser.id, 
            content: content,
            category: category,
            is_announcement: category === 'announcement'
          };
          if (imageUrl) { postData.image_url = imageUrl; postData.media_urls = [imageUrl]; }

          if (!AppState.isOnline) {
            queueOfflineAction({ type: 'post', data: postData });
            showToast('Post queued for when you are back online', 'warning');
          } else {
            await supabaseClient.from('posts').insert([postData]);
            showToast('Post shared!', 'success');
          }

          postModal.classList.remove('open');
          setTimeout(() => {
            postModal.classList.add('hidden');
            postContent.value = '';
            imagePreview.classList.add('hidden');
            selectedImage = null;
            document.getElementById('postCategory').value = 'general';
          }, 300);

          renderMainView();
        } catch (err) {
          showToast('Failed to post: ' + err.message, 'error');
        } finally {
          submitBtn.disabled = false;
          spinner.classList.add('hidden');
        }
      });

      // Like handler
      document.querySelectorAll('.like-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const postId = btn.dataset.like;
          const isLiked = AppState.likedPosts.has(postId);
          const icon = btn.querySelector('i');
          const countSpan = btn.querySelector('span');

          // Optimistic UI update
          if (isLiked) {
            AppState.likedPosts.delete(postId);
            icon.classList.remove('text-red-500', 'scale-110');
            btn.classList.remove('text-red-500');
            countSpan.textContent = Math.max(0, parseInt(countSpan.textContent) - 1);
          } else {
            AppState.likedPosts.add(postId);
            icon.classList.add('text-red-500', 'scale-110');
            btn.classList.add('text-red-500');
            countSpan.textContent = parseInt(countSpan.textContent) + 1;
            gsap.fromTo(icon, { scale: 0.5 }, { scale: 1.2, duration: 0.2, yoyo: true, repeat: 1 });
          }

          try {
            if (isLiked) {
              await supabaseClient.from('likes').delete()
                .eq('user_id', AppState.currentUser.id)
                .eq('post_id', postId);
              await supabaseClient.rpc('decrement_post_likes', { post_id: postId });
            } else {
              await supabaseClient.from('likes').insert([{ user_id: AppState.currentUser.id, post_id: postId }]);
              await supabaseClient.rpc('increment_post_likes', { post_id: postId });
            }
          } catch (err) {
            // Revert on error
            if (isLiked) AppState.likedPosts.add(postId);
            else AppState.likedPosts.delete(postId);
            showToast('Failed to update like', 'error');
          }
        });
      });

      // Delete post handler
      document.querySelectorAll('.delete-post-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const postId = btn.dataset.post;
          if (!confirm('Are you sure you want to delete this post?')) return;

          try {
            await supabaseClient.from('posts').delete().eq('id', postId);
            showToast('Post deleted', 'success');
            renderMainView();
          } catch (err) {
            showToast('Failed to delete post', 'error');
          }
        });
      });

      // Share handler
      document.querySelectorAll('.share-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const postId = btn.dataset.post;
          const shareData = {
            title: 'AYF Gwarimpa Conference',
            text: 'Check out this post on AYF Gwarimpa Conference 2026',
            url: `${window.location.origin}/post/${postId}`
          };

          if (navigator.share) {
            try {
              await navigator.share(shareData);
            } catch (err) {
              // User cancelled
            }
          } else {
            await navigator.clipboard.writeText(shareData.url);
            showToast('Link copied to clipboard!', 'success');
          }
        });
      });

      // Comment toggle handler
      document.querySelectorAll('.comment-toggle').forEach(btn => {
        btn.addEventListener('click', async () => {
          const postId = btn.dataset.comment;
          const div = document.getElementById(`comments-${postId}`);

          if (div.classList.contains('hidden')) {
            div.classList.remove('hidden');
            gsap.fromTo(div, { opacity: 0, height: 0 }, { opacity: 1, height: 'auto', duration: 0.3 });

            // Load comments from cache or fetch
            if (AppState.commentsCache[postId]) {
              renderComments(postId, AppState.commentsCache[postId]);
            } else {
              await loadComments(postId);
            }
          } else {
            gsap.to(div, { opacity: 0, height: 0, duration: 0.3, onComplete: () => div.classList.add('hidden') });
          }
        });
      });

      // Submit comment handler
      document.querySelectorAll('.submit-comment').forEach(btn => {
        btn.addEventListener('click', async () => {
          const postId = btn.dataset.commentPost;
          const input = document.getElementById(`commentInput-${postId}`);
          const content = input.value.trim();

          if (!content) return;

          gsap.to(btn, { scale: 0.95, duration: 0.1, yoyo: true, repeat: 1 });

          const commentData = { post_id: postId, user_id: AppState.currentUser.id, content: content };

          try {
            if (!AppState.isOnline) {
              queueOfflineAction({ type: 'comment', data: commentData });
              showToast('Comment queued for sync', 'warning');
              input.value = '';
              return;
            }

            await supabaseClient.from('comments').insert([commentData]);
            await supabaseClient.rpc('increment_post_comments', { post_id: postId });

            input.value = '';
            const countSpan = document.querySelector(`.comment-toggle[data-comment="${postId}"] span`);
            if (countSpan) countSpan.textContent = parseInt(countSpan.textContent || 0) + 1;

            // Refresh comments
            await loadComments(postId);
            showToast('Comment posted!', 'success');
          } catch (err) {
            showToast('Failed to post comment', 'error');
          }
        });
      });

      // Load more handler
      document.getElementById('loadMoreBtn')?.addEventListener('click', () => {
        AppState.currentPage++;
        renderHomeFeed(document.getElementById('appContainer'), false);
      });
    }

    async function loadComments(postId) {
      try {
        const { data: comments } = await supabaseClient
          .from('comments')
          .select('*, profiles(full_name, avatar_url)')
          .eq('post_id', postId)
          .order('created_at', { ascending: true });

        AppState.commentsCache[postId] = comments || [];
        renderComments(postId, comments || []);
      } catch (err) {
        console.error('Error loading comments:', err);
      }
    }

    function renderComments(postId, comments) {
      const commentList = document.getElementById(`commentList-${postId}`);
      if (!commentList) return;

      if (comments.length === 0) {
        commentList.innerHTML = '<p class="text-sm text-gray-500 text-center py-2">No comments yet. Be the first!</p>';
        return;
      }

      commentList.innerHTML = comments.map(c => `
        <div class="flex gap-2 animate-fadeInUp p-2 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
          <img src="${escapeHtml(c.profiles?.avatar_url || '')}" class="w-8 h-8 rounded-full object-cover flex-shrink-0" onerror="this.src='https://ui-avatars.com/api/?name=User&background=0A2E73&color=fff'">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <b class="text-sm">${escapeHtml(c.profiles?.full_name || 'Unknown')}</b>
              <span class="text-xs text-gray-400">${timeAgo(c.created_at)}</span>
            </div>
            <p class="text-sm text-gray-700 dark:text-gray-300">${parseMentions(c.content)}</p>
          </div>
        </div>
      `).join('');
    }

      container.innerHTML = `
        <div class="glass-card p-5 mb-5 animate-fadeInUp">

          renderDocsList(filtered);

        // Category filter

              ? AppState.docsCache 
              : AppState.docsCache.filter(d => d.file_type === filter);

          <div class="flex justify-between items-center mt-3">
            <select id="discussionCategory" class="p-2 rounded-xl border dark:bg-gray-800 text-sm">
              <option value="general">General</option>
              <option value="testimony">Testimony</option>
              <option value="prayer">Prayer Request</option>
              <option value="bible-study">Bible Study</option>
            </select>
            <button id="postDiscussion" class="btn-royal text-white px-6 py-2 rounded-xl font-semibold transition-all hover:scale-105 flex items-center gap-2">
              <span>Post</span>
              <i class="fas fa-spinner fa-spin hidden" id="discussionSpinner"></i>
            </button>
          </div>
        </div>

        <div id="discussionsFeed" class="space-y-4">
          ${renderSkeletonPosts(2)}
        </div>`;

      try {
        console.log('[DEBUG] Fetching community posts...');
        const { data: discussions, error } = await supabaseClient
          .from('posts')
          .select('*, profiles(full_name, avatar_url, role, parish)')
          .order('created_at', { ascending: false })
          .limit(20);

        console.log('[DEBUG] Community posts:', discussions ? discussions.length : 0, 'Error:', error ? error.message : 'none');

        const feedEl = document.getElementById('discussionsFeed');
        if (!feedEl) return;

        if (error) {
          feedEl.innerHTML = `<div class="glass-card p-8 text-center text-red-500"><i class="fas fa-exclamation-circle text-3xl mb-2"></i><p>Error: ${escapeHtml(error.message)}</p></div>`;
          return;
        }

        if (!discussions || discussions.length === 0) {
          feedEl.innerHTML = `
            <div class="glass-card p-8 text-center animate-fadeInUp">
              <i class="fas fa-comments text-4xl text-gray-400 mb-2"></i>
              <p class="text-gray-500">No discussions yet. Start the conversation!</p>
            </div>`;
          return;
        }

        feedEl.innerHTML = discussions.map((d, i) => {
          const profile = d.profiles || {};
          const fullName = profile.full_name || 'Unknown User';
          const avatarUrl = profile.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName)}&background=0A2E73&color=fff`;

          // Get images
          let imagesHtml = '';
          let postImages = [];
          if (d.image_url) postImages.push(d.image_url);
          if (d.media_urls && Array.isArray(d.media_urls)) {
            d.media_urls.forEach(url => { if (url && !postImages.includes(url)) postImages.push(url); });
          }
          if (postImages.length === 1) {
            imagesHtml = `<img src="${escapeHtml(postImages[0])}" class="rounded-xl max-h-48 w-auto mt-3 cursor-pointer hover:opacity-90 transition-opacity" onclick="openLightbox('${escapeHtml(postImages[0])}')" loading="lazy" onerror="this.style.display='none'">`;
          } else if (postImages.length > 1) {
            imagesHtml = `<div class="grid grid-cols-2 gap-2 mt-3">${postImages.map(url => `<img src="${escapeHtml(url)}" class="rounded-xl h-32 w-full object-cover cursor-pointer hover:opacity-90 transition-opacity" onclick="openLightbox('${escapeHtml(url)}')" loading="lazy" onerror="this.style.display='none'">`).join('')}</div>`;
          }

          return `
            <div class="glass-card p-4 animate-fadeInUp" style="animation-delay: ${i * 0.05}s">
              <div class="flex gap-3 mb-3">
                <img src="${escapeHtml(avatarUrl)}" class="w-10 h-10 rounded-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=User&background=0A2E73&color=fff'">
                <div>
                  <b>${escapeHtml(fullName)}</b>
                  <p class="text-xs text-gray-500">${timeAgo(d.created_at)}</p>
                </div>
              </div>
              <p class="text-gray-700 dark:text-gray-300">${escapeHtml(d.content || '')}</p>
              ${imagesHtml}
            </div>
          `;
        }).join('');

      } catch (err) {
        console.error('[DEBUG] Community error:', err);
        const feedEl = document.getElementById('discussionsFeed');
        if (feedEl) {
          feedEl.innerHTML = `<div class="glass-card p-8 text-center text-red-500"><i class="fas fa-exclamation-circle text-3xl mb-2"></i><p>Error loading discussions</p><p class="text-sm text-gray-500">${escapeHtml(err.message)}</p></div>`;
        }
      }

      document.getElementById('postDiscussion')?.addEventListener('click', async () => {
        const content = document.getElementById('discussionInput').value.trim();
        const category = document.getElementById('discussionCategory').value;
        const btn = document.getElementById('postDiscussion');
        const spinner = document.getElementById('discussionSpinner');

        if (!content) {
          showToast('Please write something first', 'warning');
          return;
        }

        btn.disabled = true;
        spinner.classList.remove('hidden');

        try {
          await supabaseClient.from('posts').insert([{
            user_id: AppState.currentUser.id,
            content: content,
            category: category
          }]);
          document.getElementById('discussionInput').value = '';
          showToast('Posted to community!', 'success');
          renderCommunityModule(container);
        } catch (err) {
          showToast('Failed to post: ' + err.message, 'error');
        } finally {
          btn.disabled = false;
          spinner.classList.add('hidden');
        }
      });
    }

        document.getElementById('adminApproved').textContent = approved || 0;

        document.getElementById('adminCheckedIn').textContent = checkedIn || 0;
      } catch (err) {
        console.error('Error loading admin stats:', err);

    }

    async function handleQRScan(conferenceId) {
      const resultDiv = document.getElementById('scanResult');
      resultDiv.classList.remove('hidden');

      try {
        const { data: reg } = await supabaseClient
          .from('registrations')
          .select('*, profiles(full_name)')
          .eq('conference_id', conferenceId)
          .single();

        if (!reg) {
          resultDiv.className = 'mt-4 p-4 rounded-xl bg-red-100 text-red-700';
          resultDiv.innerHTML = '<i class="fas fa-times-circle mr-2"></i> Invalid QR code - No registration found';
          return;
        }

        if (reg.status !== 'approved') {
          resultDiv.className = 'mt-4 p-4 rounded-xl bg-yellow-100 text-yellow-700';
          resultDiv.innerHTML = `<i class="fas fa-exclamation-triangle mr-2"></i> ${escapeHtml(reg.profiles?.full_name || 'User')} - Registration not approved yet`;
          return;
        }

        // Check if already checked in today
        const today = new Date().toISOString().split('T')[0];
        const { data: existingCheckin } = await supabaseClient
          .from('attendance_logs')
          .select('*')
          .eq('user_id', reg.user_id)
          .eq('session_date', today)
          .maybeSingle();

        if (existingCheckin) {
          resultDiv.className = 'mt-4 p-4 rounded-xl bg-blue-100 text-blue-700';
          resultDiv.innerHTML = `<i class="fas fa-info-circle mr-2"></i> ${escapeHtml(reg.profiles?.full_name || 'User')} - Already checked in today!`;
          return;
        }

        // Record attendance
        await supabaseClient.from('attendance_logs').insert([{
          user_id: reg.user_id,
          conference_id: conferenceId,
          checked_by: AppState.currentUser.id,
          session_date: today
        }]);

        await supabaseClient.rpc('increment_checkins', { conf_id: conferenceId });

        resultDiv.className = 'mt-4 p-4 rounded-xl bg-green-100 text-green-700';
        resultDiv.innerHTML = `
          <i class="fas fa-check-circle mr-2"></i> 
          <b>${escapeHtml(reg.profiles?.full_name || 'User')}</b> checked in successfully!
          <div class="text-sm mt-1">Conference ID: ${conferenceId}</div>
        `;

        showToast('Check-in successful!', 'success');
        loadAdminStats();

      } catch (err) {
        resultDiv.className = 'mt-4 p-4 rounded-xl bg-red-100 text-red-700';
        resultDiv.innerHTML = `<i class="fas fa-times-circle mr-2"></i> Error: ${escapeHtml(err.message)}`;
      }
    }

    // =====================================================
    // NAVIGATION & EVENT LISTENERS
    // =====================================================
    function attachNavigationListeners() {
      // Bottom nav
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          AppState.currentView = btn.dataset.nav;
          renderMainView();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });

      // User dropdown
      const userMenuBtn = document.getElementById('userMenuBtn');
      const userDropdown = document.getElementById('userDropdown');
      if (userMenuBtn) {
        userMenuBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          userDropdown.classList.toggle('hidden');
          if (!userDropdown.classList.contains('hidden')) {
            gsap.fromTo(userDropdown, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.2 });
          }
        });
        document.addEventListener('click', (e) => { 
          if (!userMenuBtn.contains(e.target) && !userDropdown.contains(e.target)) {
            userDropdown.classList.add('hidden');
          }
        });
      }

      document.getElementById('profileDropdownLink')?.addEventListener('click', (e) => { 
        e.preventDefault(); 
        userDropdown.classList.add('hidden'); 
        AppState.currentView = 'profile'; 
        renderMainView(); 
      });

      document.getElementById('termsDropdownLink')?.addEventListener('click', (e) => { 
        e.preventDefault(); 
        window.open('/terms.html', '_blank'); 
      });

      document.getElementById('privacyDropdownLink')?.addEventListener('click', (e) => { 
        e.preventDefault(); 
        window.open('/privacy.html', '_blank'); 
      });

      document.getElementById('logoutDropdownBtn')?.addEventListener('click', async () => { 
        await supabaseClient.auth.signOut(); 
        AppState.currentUser = null;
        AppState.currentProfile = null;
        AppState.realtimeSubscriptions.forEach(sub => supabaseClient.removeChannel(sub));
        window.location.reload(); 
      });

      // Dark mode toggle
      const darkModeToggle = document.getElementById('darkModeToggle');
      if (darkModeToggle) {
        darkModeToggle.addEventListener('click', () => { 
          AppState.darkMode = !AppState.darkMode; 
          applyDarkMode();
          gsap.to(darkModeToggle, { rotation: 360, duration: 0.5 });
          const icon = darkModeToggle.querySelector('i');
          icon.className = AppState.darkMode ? 'fas fa-sun' : 'fas fa-moon';
        });
      }

      // Notifications
      const notificationsBtn = document.getElementById('notificationsBtn');
      if (notificationsBtn) {
        notificationsBtn.addEventListener('click', () => showNotificationPanel());
      }

      const closePanel = document.getElementById('closeNotificationPanel');
      const overlay = document.getElementById('notificationOverlay');
      if (closePanel) closePanel.addEventListener('click', closeNotificationPanel);
      if (overlay) overlay.addEventListener('click', closeNotificationPanel);

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeNotificationPanel();
          const modals = document.querySelectorAll('.modal-backdrop.open');
          modals.forEach(m => closeModal(m));
          closeLightbox();
        }
      });

      // Pull to refresh (touch)
      let touchStartY = 0;
      let isPulling = false;
      const ptrIndicator = document.getElementById('ptrIndicator');

      document.addEventListener('touchstart', (e) => {
        if (window.scrollY === 0) {
          touchStartY = e.touches[0].clientY;
          isPulling = true;
        }
      }, { passive: true });

      document.addEventListener('touchmove', (e) => {
        if (!isPulling) return;
        const diff = e.touches[0].clientY - touchStartY;
        if (diff > 80 && window.scrollY === 0) {
          ptrIndicator.classList.add('visible');
          ptrIndicator.innerHTML = '<i class="fas fa-sync-alt fa-spin mr-2"></i> Release to refresh...';
        }
      }, { passive: true });

      document.addEventListener('touchend', async () => {
        if (!isPulling) return;
        isPulling = false;
        if (ptrIndicator.classList.contains('visible')) {
          ptrIndicator.innerHTML = '<i class="fas fa-sync-alt fa-spin mr-2"></i> Refreshing...';
          await renderMainView();
          ptrIndicator.classList.remove('visible');
          showToast('Feed refreshed', 'success');
        }
      });
    }

    // =====================================================
    // GLOBAL ERROR HANDLER
    // =====================================================
    window.addEventListener('error', (e) => {
      console.error('Global error:', e.error);
      showToast('Something went wrong. Please refresh the page.', 'error');
    });

    window.addEventListener('unhandledrejection', (e) => {
      console.error('Unhandled promise rejection:', e.reason);
      showToast('An unexpected error occurred.', 'error');
    });

    // =====================================================
    // INIT
    // =====================================================
    // Load offline queue from storage
    try {
      const savedQueue = localStorage.getItem('offlineQueue');
      if (savedQueue) AppState.offlineQueue = JSON.parse(savedQueue);
    } catch (e) {}

    // Set initial dark mode icon
    const darkIcon = document.querySelector('#darkModeToggle i');
    if (darkIcon) darkIcon.className = AppState.darkMode ? 'fas fa-sun' : 'fas fa-moon';

    checkUser();
  </script>
</body>
</html>
