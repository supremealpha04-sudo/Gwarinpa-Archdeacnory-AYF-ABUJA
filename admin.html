<html lang="en">
<head>

  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/dist/html5-qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #f5f5f0; }
    .dark body { background: #1a1a1a; }
    .glass-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 1.5rem;
      transition: all 0.3s ease;
    }
    .dark .glass-card { background: rgba(30,30,30,0.95); }
    .stat-card { transition: all 0.3s ease; cursor: pointer; }
    .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .sidebar-item { transition: all 0.3s ease; cursor: pointer; border-left: 3px solid transparent; position: relative; }
    .sidebar-item:hover, .sidebar-item.active { background: rgba(212,175,55,0.15); border-left-color: #D4AF37; }
    .sidebar-item.active::after { content: ''; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 6px; height: 6px; background: #D4AF37; border-radius: 50%; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeInUp { animation: fadeInUp 0.5s ease-out; }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    .animate-slideInRight { animation: slideInRight 0.4s ease-out; }
    .btn-gold { background: linear-gradient(135deg, #D4AF37, #C5A028); transition: all 0.3s ease; }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212,175,55,0.3); }
    .btn-gold:disabled { opacity: 0.5; transform: none !important; cursor: not-allowed; }
    .btn-royal { background: linear-gradient(135deg, #0A2E73, #0d3a8a); transition: all 0.3s ease; }
    .btn-royal:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(10,46,115,0.3); }
    .btn-royal:disabled { opacity: 0.5; transform: none !important; cursor: not-allowed; }
    .btn-danger { background: linear-gradient(135deg, #dc2626, #b91c1c); transition: all 0.3s ease; }
    .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(220,38,38,0.3); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(212,175,55,0.2); }
    th { background: rgba(212,175,55,0.1); font-weight: 600; }
    tr:hover { background: rgba(212,175,55,0.05); }
    #toastContainer { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { pointer-events: auto; animation: slideInRight 0.3s ease-out; min-width: 280px; }
    .loader { border: 3px solid #e0e0e0; border-top: 3px solid #D4AF37; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
    .modal-backdrop.open { opacity: 1; pointer-events: auto; }
    .modal-content { transform: scale(0.95); transition: transform 0.3s ease; }
    .modal-backdrop.open .modal-content { transform: scale(1); }
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; display: none; align-items: center; justify-content: center; cursor: zoom-out; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 8px; }
    .lightbox-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 2rem; cursor: pointer; z-index: 2001; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
    .desktop-header { background: rgba(255,255,255,0.98); backdrop-filter: blur(16px); border-bottom: 2px solid rgba(212,175,55,0.4); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .dark .desktop-header { background: rgba(26,26,26,0.98); border-bottom-color: rgba(212,175,55,0.5); }
    .mobile-header { background: rgba(255,255,255,0.98); backdrop-filter: blur(16px); border-bottom: 2px solid rgba(212,175,55,0.4); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .dark .mobile-header { background: rgba(26,26,26,0.98); border-bottom-color: rgba(212,175,55,0.5); }
    @media (max-width: 1024px) { .sidebar-desktop { display: none; } .main-content-mobile { margin-left: 0 !important; } .mobile-nav { display: flex !important; } }
    @media (min-width: 1025px) { .mobile-nav { display: none !important; } }
    /* QR Scanner specific styles */
    #qr-reader { border: none !important; }
    #qr-reader video { border-radius: 12px; }
    #qr-reader__dashboard_section_csr span { color: #D4AF37 !important; }
    #qr-reader__dashboard_section_csr button { background: #0A2E73 !important; color: white !important; border-radius: 8px !important; border: none !important; padding: 8px 16px !important; }
    .scan-region-highlight { border: 2px solid #D4AF37 !important; border-radius: 12px !important; }
    .scan-region-highlight svg { stroke: #D4AF37 !important; }
    .code-scanning-highlight { background: rgba(212,175,55,0.3) !important; }
  </style>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { royal: '#0A2E73', gold: '#D4AF37' } } } }

</head>
<body class="text-gray-800 dark:text-white">

    <main class="flex-1 lg:ml-72 lg:mt-16 main-content-mobile p-4 lg:p-6 overflow-y-auto h-[calc(100vh-3.5rem)] lg:h-[calc(100vh-4rem)] custom-scrollbar pb-24 lg:pb-6">

  <script>
    const CONFIG = {
      SUPABASE_URL: 'https://pwdkxynbbsdkekzmmclp.supabase.co',
      SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3ZGt4eW5iYnNka2Vrem1tY2xwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODA2MDYsImV4cCI6MjA5Njc1NjYwNn0.IcxHv1sMcSK4pw9ZVJXi6KQz7_0vLy01wRA5Ljw6Tuo',
      ITEMS_PER_PAGE: 25
    };

    // FIXED: Use window.supabase.createClient since CDN exposes supabase as namespace object
    let supabaseClient = null;
    try {
      if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
        supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        console.log('Supabase initialized successfully');
      } else {
        console.error('Supabase library not loaded. Check CDN script tag.');
      }
    } catch (e) {
      console.error('Failed to initialize Supabase:', e);
    }

    let currentUser = null;
    let currentProfile = null;
    let analyticsChart = null;
    let parishChart = null;
    let currentTab = 'dashboard';
    let html5QrCode = null;
    let isScannerRunning = false;
    let scannerCameraId = null;

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML.replace(/'/g, '&#39;');
    }

    function timeAgo(date) {
      const seconds = Math.floor((new Date() - new Date(date)) / 1000);
      const intervals = { year: 31536000, month: 2592000, week: 604800, day: 86400, hour: 3600, minute: 60 };
      for (const [unit, secondsInUnit] of Object.entries(intervals)) {
        const interval = Math.floor(seconds / secondsInUnit);
        if (interval >= 1) return interval === 1 ? `1 ${unit} ago` : `${interval} ${unit}s ago`;
      }
      return 'Just now';
    }

    function debounce(fn, ms) {
      let timeout;
      return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => fn(...args), ms); };
    }

    function showToast(message, type, duration) {
      type = type || 'success';
      duration = duration || 4000;
      const toastId = type + '-' + message + '-' + Date.now();
      const existing = document.querySelector('[data-toast-id="' + CSS.escape(toastId) + '"]');
      if (existing) {
        clearTimeout(existing.dataset.timer);
        existing.dataset.timer = setTimeout(function() { removeToast(existing); }, duration);
        return;
      }
      const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
      const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle', warning: 'fa-exclamation-triangle' };
      const toast = document.createElement('div');
      toast.className = 'toast ' + colors[type] + ' text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 z-50';
      toast.dataset.toastId = toastId;
      toast.innerHTML = '<i class="fas ' + icons[type] + '"></i><span class="flex-1">' + escapeHtml(message) + '</span><button class="opacity-70 hover:opacity-100" onclick="removeToast(this.parentElement)"><i class="fas fa-times"></i></button>';
      document.getElementById('toastContainer').appendChild(toast);
      toast.dataset.timer = setTimeout(function() { removeToast(toast); }, duration);
    }

    function removeToast(toast) {
      if (!toast || !toast.parentElement) return;
      if (typeof gsap !== 'undefined') {
        gsap.to(toast, { opacity: 0, x: 50, duration: 0.3, onComplete: function() { toast.remove(); } });
      } else {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(50px)';
        setTimeout(function() { toast.remove(); }, 300);
      }
    }

    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function showDbError(content, msg) {
      content.innerHTML = '<div class="text-center p-6"><i class="fas fa-plug text-4xl text-red-500 mb-3"></i><h2 class="text-xl font-bold text-red-600 mb-2">Database Error</h2><p class="text-gray-500 mb-4">' + escapeHtml(msg) + '</p><button onclick="location.reload()" class="btn-royal text-white px-4 py-2 rounded-xl">Reload Page</button></div>';
    }

    // SECURITY NOTE: All admin operations rely on Supabase RLS policies.
// Ensure these policies are enforced server-side on all tables.
async function checkAuth() {
      if (!supabaseClient) {
        showDbError(document.getElementById('adminContent'), 'Database connection failed. Check console for details.');
        return;
      }
      try {
        const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
        if (userError || !user) { window.location.href = '/'; return; }
        currentUser = user;
        const { data: profile, error: profileError } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
        if (profileError || !profile) { window.location.href = '/'; return; }
        currentProfile = profile;
        const adminRoles = ['super_admin', 'archdeaconry_admin', 'conference_admin', 'moderator'];
        if (!adminRoles.includes(profile.role)) { window.location.href = '/'; return; }
        var hName = document.getElementById('headerUserName');
        var hRole = document.getElementById('headerUserRole');
        if (hName) hName.textContent = profile.full_name || 'Admin';
        if (hRole) hRole.textContent = (profile.role || 'Admin').replace(/_/g, ' ');
        loadDashboard();
      } catch (error) {
        console.error('Auth error:', error);
        showToast('Auth error: ' + error.message, 'error');
        document.getElementById('adminContent').innerHTML = '<div class="text-center p-6"><h2 class="text-xl font-bold text-red-600 mb-2">Authentication Error</h2><p class="text-gray-500">' + escapeHtml(error.message) + '</p><button onclick="location.reload()" class="btn-royal text-white px-4 py-2 rounded-xl mt-4">Reload</button></div>';
      }
    }

    let darkMode = localStorage.getItem('darkMode') === 'true';
    function applyDarkMode() {
      if (darkMode) document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
      localStorage.setItem('darkMode', darkMode);
      var icon = document.getElementById('darkModeIcon');
      var text = document.getElementById('darkModeText');
      if (icon) icon.className = darkMode ? 'fas fa-sun' : 'fas fa-moon';
      if (text) text.textContent = darkMode ? 'Light Mode' : 'Dark Mode';
    }
    applyDarkMode();

    async function loadDashboard() {
      var content = document.getElementById('adminContent');
      content.innerHTML = '<div class="flex justify-center items-center h-64"><div class="loader"></div></div>';
      if (!supabaseClient) { showDbError(content, 'Database not connected.'); return; }
      try {
        var [totalUsersRes, totalRegistrationsRes, pendingRegistrationsRes, totalPostsRes, totalCheckinsRes, totalDocumentsRes] = await Promise.all([
          supabaseClient.from('profiles').select('*', { count: 'exact', head: true }),
          supabaseClient.from('registrations').select('*', { count: 'exact', head: true }),
          supabaseClient.from('registrations').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
          supabaseClient.from('posts').select('*', { count: 'exact', head: true }),
          supabaseClient.from('attendance_logs').select('*', { count: 'exact', head: true }),
          supabaseClient.from('documents').select('*', { count: 'exact', head: true })
        ]);
        var [{ data: recentRegs }, { data: recentCheckins }, { data: parishData }] = await Promise.all([
          supabaseClient.from('registrations').select('*, profiles(full_name, parish)').order('created_at', { ascending: false }).limit(10),
          supabaseClient.from('attendance_logs').select('*, profiles(full_name, parish)').order('check_in_time', { ascending: false }).limit(10),
          supabaseClient.from('profiles').select('parish')
        ]);
        var parishCounts = {};
        if (parishData) parishData.forEach(function(p) { if(p.parish) parishCounts[p.parish] = (parishCounts[p.parish] || 0) + 1; });

        content.innerHTML = '<div class="space-y-6">' +
          '<div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-4">' +
            '<div class="glass-card p-4 stat-card animate-fadeInUp"><div class="flex justify-between items-start"><div><p class="text-gray-500 text-sm">Total Users</p><p class="text-2xl font-bold">' + (totalUsersRes.count || 0) + '</p></div><i class="fas fa-users text-2xl text-gold opacity-50"></i></div></div>' +
            '<div class="glass-card p-4 stat-card animate-fadeInUp" style="animation-delay:0.05s"><div class="flex justify-between items-start"><div><p class="text-gray-500 text-sm">Registrations</p><p class="text-2xl font-bold">' + (totalRegistrationsRes.count || 0) + '</p></div><i class="fas fa-id-card text-2xl text-gold opacity-50"></i></div></div>' +
            '<div class="glass-card p-4 stat-card animate-fadeInUp" style="animation-delay:0.1s"><div class="flex justify-between items-start"><div><p class="text-gray-500 text-sm">Pending</p><p class="text-2xl font-bold text-yellow-500">' + (pendingRegistrationsRes.count || 0) + '</p></div><i class="fas fa-clock text-2xl text-gold opacity-50"></i></div></div>' +
            '<div class="glass-card p-4 stat-card animate-fadeInUp" style="animation-delay:0.15s"><div class="flex justify-between items-start"><div><p class="text-gray-500 text-sm">Total Posts</p><p class="text-2xl font-bold">' + (totalPostsRes.count || 0) + '</p></div><i class="fas fa-newspaper text-2xl text-gold opacity-50"></i></div></div>' +

        function filterRows() {
          var term = (document.getElementById('searchReg') && document.getElementById('searchReg').value || '').toLowerCase();
          var status = document.getElementById('filterStatus') && document.getElementById('filterStatus').value || 'all';
          document.querySelectorAll('#regTableBody tr').forEach(function(row) {
            var rname = row.dataset.name || '';
            var remail = row.dataset.email || '';
            var rparish = row.dataset.parish || '';
            var rstatus = row.dataset.status || '';
            var matchesSearch = rname.indexOf(term) !== -1 || remail.indexOf(term) !== -1 || rparish.indexOf(term) !== -1;
            var matchesStatus = status === 'all' || rstatus === status;
            row.style.display = matchesSearch && matchesStatus ? '' : 'none';
          });
        }
        document.getElementById('searchReg') && document.getElementById('searchReg').addEventListener('input', debounce(filterRows, 300));
        document.getElementById('filterStatus') && document.getElementById('filterStatus').addEventListener('change', filterRows);

        document.getElementById('exportRegBtn') && document.getElementById('exportRegBtn').addEventListener('click', function() {
          var csv = 'Name,Email,Phone,Parish,Position,Gender,Age Range,Status,Conference ID,Registered At\n';
          document.querySelectorAll('#regTableBody tr').forEach(function(row) {
            if (row.style.display === 'none') return;
            var cells = row.querySelectorAll('td');
            if (cells.length >= 8) {
              function csvEscape(str) {
                str = String(str || '').replace(/"/g, '""');
                return '"' + str + '"';
              }
              csv += csvEscape(cells[0].innerText) + ',' + csvEscape(cells[1].innerText) + ',' + csvEscape(cells[2].innerText) + ',' + csvEscape(cells[3].innerText) + ',' + csvEscape(cells[4].innerText) + ',' + csvEscape(cells[5].innerText) + ',' + csvEscape(cells[6].innerText) + ',' + csvEscape(cells[7].innerText) + '\n';
            }
          });
          var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          var link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = 'registrations_' + new Date().toISOString().split('T')[0] + '.csv';

          URL.revokeObjectURL(link.href);
          showToast('CSV exported!', 'success');

        document.querySelectorAll('.approve-btn').forEach(function(btn) {

        });

      }
    }

    async function startScanner() {
      // FIX: Use scannerLock to prevent race conditions
      if (scannerLock) return;
      scannerLock = true;

      var startBtn = document.getElementById('startScanBtn');
      var stopBtn = document.getElementById('stopScanBtn');
      var placeholder = document.getElementById('qr-placeholder');

      try {
        // Check if library is actually loaded
        if (typeof window.Html5Qrcode === 'undefined') {
          throw new Error('QR Scanner library not loaded. Check your internet connection and refresh.');
        }

        if (placeholder) placeholder.style.display = 'none';

        // If scanner exists but was stopped, clear it first
        if (html5QrCode) {
          try { await html5QrCode.stop(); } catch(e) {}
          try { await html5QrCode.clear(); } catch(e) {}
          html5QrCode = null;
        }

        // Create fresh instance
        html5QrCode = new window.Html5Qrcode('qr-reader');

        // Try to get cameras and select back camera
        var cameras = [];
        try {
          if (typeof window.Html5Qrcode.getCameras === 'function') {
            cameras = await window.Html5Qrcode.getCameras();
          }
        } catch(e) {
          console.log('getCameras failed, trying default:', e && e.message || e);
        }

        var cameraConfig = { facingMode: 'environment' };

        // If we got cameras, try to find back camera
        if (cameras && cameras.length > 0) {
          var backCamera = cameras.find(function(c) { 
            return c.label && (c.label.toLowerCase().indexOf('back') !== -1 || c.label.toLowerCase().indexOf('rear') !== -1 || c.label.toLowerCase().indexOf('environment') !== -1); 
          });
          if (backCamera) {
            cameraConfig = { deviceId: { exact: backCamera.id } };
            scannerCameraId = backCamera.id;
          } else {
            cameraConfig = { deviceId: { exact: cameras[0].id } };
            scannerCameraId = cameras[0].id;
          }
        }

        var qrConfig = { 
          fps: 10, 
          qrbox: { width: 250, height: 250 },
          aspectRatio: 1.0
        };

        await html5QrCode.start(
          cameraConfig, 
          qrConfig, 
          async function(decodedText, decodedResult) {
            // Pause to prevent multiple scans
            try { html5QrCode.pause(); } catch(e) {}

            // Show scanning feedback
            showToast('QR detected: ' + decodedText.substring(0, 20) + '...', 'info', 2000);

            // Process the check-in
            await processCheckin(decodedText);

            // Resume after delay
            setTimeout(function() { 
              if (html5QrCode && isScannerRunning) {
                try { html5QrCode.resume(); } catch(e) {}
              }
            }, 2500);
          }, 
          function(errorMessage) {
            // QR code scan error - this fires constantly when no QR is in view, ignore silently
            // console.log('QR scan error:', errorMessage);
          }
        );

        isScannerRunning = true;

        if (startBtn) {
          startBtn.classList.add('hidden');
          startBtn.disabled = true;
        }
        if (stopBtn) {
          stopBtn.classList.remove('hidden');
          stopBtn.disabled = false;
        }

        showToast('Scanner started - point camera at QR code', 'success');

      } catch (err) {
        console.error('Scanner start error:', err);
        var errorMsg = 'Failed to start camera';
        if (err && err.message) {
          errorMsg += ': ' + err.message;
        } else if (err && typeof err === 'string') {
          errorMsg += ': ' + err;
        } else if (err) {
          errorMsg += ': ' + JSON.stringify(err);
        }
        showToast(errorMsg, 'error');

        // Reset UI
        if (startBtn) {
          startBtn.classList.remove('hidden');
          startBtn.disabled = false;
        }
        if (stopBtn) stopBtn.classList.add('hidden');
        if (placeholder) placeholder.style.display = 'flex';

        // Clean up failed instance
        if (html5QrCode) {
          try { await html5QrCode.stop(); } catch(e) {}
          try { await html5QrCode.clear(); } catch(e) {}
          html5QrCode = null;
        }
      } finally {
        scannerLock = false;
      }
    }
    async function stopScanner() {
      isScannerRunning = false;
      
      var startBtn = document.getElementById('startScanBtn');
      var stopBtn = document.getElementById('stopScanBtn');
      var placeholder = document.getElementById('qr-placeholder');
      
      if (html5QrCode) {
        try { 
          await html5QrCode.stop(); 
        } catch (e) { 
          console.log('Scanner stop error (safe to ignore):', e.message); 
        }
        try { 
          await html5QrCode.clear(); 
        } catch (e) { 
          console.log('Scanner clear error (safe to ignore):', e.message); 
        }
        html5QrCode = null;
      }
      
      if (startBtn) {
        startBtn.classList.remove('hidden');
        startBtn.disabled = false;
      }
      if (stopBtn) {
        stopBtn.classList.add('hidden');
      }
      if (placeholder) {
        placeholder.style.display = 'flex';
      }
    }

        document.getElementById('saveSpeakers') && document.getElementById('saveSpeakers').addEventListener('click', async function() {
          var updates = [
            { position: 'Youth President', name: document.getElementById('speakerYouthPresident').value.trim() },

          for (var j = 0; j < updates.length; j++) {
            if (updates[j].name.length > 100) { showToast(updates[j].position + ' name too long (max 100 chars)', 'warning'); return; }

    async function loadNotificationsTab() {
      var content = document.getElementById('adminContent');
      content.innerHTML = '<div class="flex justify-center items-center h-64"><div class="loader"></div></div>';
      if (!supabaseClient) { showDbError(content, 'Database not connected.'); return; }
      try {
        var { data: users } = await supabaseClient.from('profiles').select('id, full_name, email').order('full_name');
        var userOptions = '';
        if (users && users.length > 0) {
          userOptions = users.map(function(u) { return '<option value="' + u.id + '">' + escapeHtml(u.full_name) + ' (' + escapeHtml(u.email || '') + ')</option>'; }).join('');
        }
        content.innerHTML = '<div class="glass-card p-6 animate-fadeInUp"><h2 class="text-2xl font-bold mb-6"><i class="fas fa-bell text-gold mr-2"></i> Send Notification</h2><div class="max-w-lg mx-auto space-y-4"><div><label class="block text-sm font-medium mb-1">Send To</label><select id="notificationRecipient" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all"><option value="all">All Users (' + (users ? users.length : 0) + ')</option><option value="registered">Registered Users Only</option><option value="approved">Approved Registrations Only</option>' + userOptions + '</select></div><div><label class="block text-sm font-medium mb-1">Notification Type</label><select id="notificationType" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all"><option value="info">Info</option><option value="success">Success</option><option value="warning">Warning</option><option value="announcement">Announcement</option></select></div><div><label class="block text-sm font-medium mb-1">Title *</label><input type="text" id="notificationTitle" placeholder="Notification title" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all"></div><div><label class="block text-sm font-medium mb-1">Message *</label><textarea id="notificationMessage" rows="4" placeholder="Write your message..." class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all resize-none"></textarea></div><button id="sendNotificationBtn" class="btn-gold text-white py-3 rounded-xl font-bold w-full hover:scale-105 transition-transform flex items-center justify-center gap-2"><i class="fas fa-paper-plane"></i><span>Send Notification</span><i class="fas fa-spinner fa-spin hidden" id="notifSpinner"></i></button></div></div>';

        document.getElementById('sendNotificationBtn') && document.getElementById('sendNotificationBtn').addEventListener('click', async function() {
          var recipient = document.getElementById('notificationRecipient').value;
          var type = document.getElementById('notificationType').value;
          var title = document.getElementById('notificationTitle').value.trim();
          var message = document.getElementById('notificationMessage').value.trim();
          if (!title || !message) { showToast('Title and message are required', 'warning'); return; }
          var btn = document.getElementById('sendNotificationBtn');
          var spinner = document.getElementById('notifSpinner');
          btn.disabled = true;
          spinner.classList.remove('hidden');
          try {
            var userIds = [];
            if (recipient === 'all') {
              var { data: allUsers } = await supabaseClient.from('profiles').select('id');
              userIds = allUsers ? allUsers.map(function(u) { return u.id; }) : [];
            } else if (recipient === 'registered') {
              var { data: regUsers } = await supabaseClient.from('registrations').select('user_id');
              userIds = regUsers ? regUsers.map(function(u) { return u.user_id; }) : [];
            } else if (recipient === 'approved') {
              var { data: approvedUsers } = await supabaseClient.from('registrations').select('user_id').eq('status', 'approved');
              userIds = approvedUsers ? approvedUsers.map(function(u) { return u.user_id; }) : [];
            } else {
              userIds = [recipient];
            }
            if (userIds.length === 0) { showToast('No recipients found', 'warning'); return; }
            if (userIds.length > 5000) { showToast('Too many recipients (max 5000)', 'error'); return; }
            var notifications = userIds.map(function(userId) { return { user_id: userId, title: title, message: message, type: type }; });
            var sentCount = 0;
            var failedBatches = [];
            for (var i = 0; i < notifications.length; i += 100) {
              var batch = notifications.slice(i, i + 100);
              try {
                var { error: batchError } = await supabaseClient.from('notifications').insert(batch);
                if (batchError) throw batchError;
                sentCount += batch.length;
              } catch (batchErr) {
                console.error('Batch failed:', batchErr);
                failedBatches.push({ start: i, error: batchErr.message });
              }
            }
            if (failedBatches.length === 0) {
              showToast('Sent to ' + sentCount + ' user(s)!', 'success');
            } else {
              showToast('Sent to ' + sentCount + '/' + userIds.length + ' users. ' + failedBatches.length + ' batch(es) failed.', 'warning');
            }
            document.getElementById('notificationTitle').value = '';
            document.getElementById('notificationMessage').value = '';
          } catch (err) { showToast('Failed to send: ' + err.message, 'error'); }
          finally { btn.disabled = false; spinner.classList.add('hidden'); }
        });
      } catch (error) {
        console.error('Notifications error:', error);
        content.innerHTML = '<div class="text-center text-red-500 p-6">Error loading users: ' + escapeHtml(error.message) + '. <button onclick="loadNotificationsTab()" class="text-gold underline ml-2">Retry</button></div>';
      }
    }

    function downloadFile(content, filename, type) {
      var blob = new Blob([content], { type: type });
      var link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    async function loadSettings() {
      var content = document.getElementById('adminContent');
      content.innerHTML = '<div class="glass-card p-6 animate-fadeInUp max-w-2xl mx-auto"><h2 class="text-2xl font-bold mb-6"><i class="fas fa-cog text-gold mr-2"></i> Settings</h2><div class="space-y-6"><div class="glass-card p-5"><h3 class="font-bold mb-3"><i class="fas fa-calendar-alt text-gold mr-2"></i> Conference Settings</h3><div class="space-y-3"><div><label class="text-sm font-medium">Conference Date</label><input type="date" id="confDate" value="2026-06-27" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all mt-1"></div><div><label class="text-sm font-medium">Conference Time</label><input type="time" id="confTime" value="08:00" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all mt-1"></div><div><label class="text-sm font-medium">Venue</label><input type="text" id="confVenue" value="St Philip Gwarimpa" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all mt-1"></div><button id="saveConfSettings" class="btn-gold text-white px-4 py-2 rounded-xl w-full hover:scale-105 transition-transform"><i class="fas fa-save mr-2"></i> Save Conference Settings</button></div></div><div class="glass-card p-5"><h3 class="font-bold mb-3"><i class="fas fa-database text-gold mr-2"></i> Database Operations</h3><div class="space-y-3"><button id="backupDb" class="btn-royal text-white px-4 py-2 rounded-xl w-full hover:scale-105 transition-transform"><i class="fas fa-download mr-2"></i> Export Full Database Backup</button><p class="text-xs text-gray-500">Downloads a JSON file with all tables for offline backup.</p></div></div></div></div>';

      document.getElementById('saveConfSettings') && document.getElementById('saveConfSettings').addEventListener('click', function() { showToast('Settings saved!', 'success'); });
      document.getElementById('backupDb') && document.getElementById('backupDb').addEventListener('click', async function() {
        if (!supabaseClient) { showToast('Database not connected', 'error'); return; }
        var tables = ['profiles', 'registrations', 'posts', 'comments', 'likes', 'notifications', 'documents', 'events', 'attendance_logs', 'parishes', 'organizations'];
        var backup = { exported_at: new Date().toISOString() };
        var results = await Promise.all(tables.map(function(t) { return supabaseClient.from(t).select('*'); }));
        tables.forEach(function(t, i) { backup[t] = results[i].data; });
        downloadFile(JSON.stringify(backup, null, 2), 'ayf_backup_' + new Date().toISOString().split('T')[0] + '.json', 'application/json');
        showToast('Full backup exported!', 'success');
      });
    }

    // ============================================
    // TAB NAVIGATION & INITIALIZATION
    // ============================================

    async function switchTab(tab) {
      // Stop scanner if leaving checkin tab
      if (currentTab === 'checkin' && tab !== 'checkin') {
        await stopScanner();
      }
      
      if (currentTab === tab && tab !== 'checkin') return;
      currentTab = tab;
      
      // Update page title
      var pageTitle = document.getElementById('pageTitle');
      if (pageTitle) {
        var titles = {
          dashboard: 'Dashboard',
          registrations: 'Registrations',
          posts: 'Manage Posts',
          users: 'Manage Users',
          checkin: 'QR Check-in',
          documents: 'Documents',
          speakers: 'Speakers',
          notifications: 'Send Notification',
          analytics: 'Analytics',
          settings: 'Settings',
          more: 'More Options'
        };
        pageTitle.textContent = titles[tab] || tab.charAt(0).toUpperCase() + tab.slice(1);
      }
      
      // Update sidebar active state
      document.querySelectorAll('.sidebar-item').forEach(function(item) {
        item.classList.toggle('active', item.dataset.tab === tab);
      });
      
      // Update mobile nav active state
      document.querySelectorAll('.mobile-nav-btn').forEach(function(btn) {
        var isActive = btn.dataset.tab === tab;
        btn.classList.toggle('active', isActive);
        btn.classList.toggle('text-gold', isActive);
        btn.classList.toggle('text-gray-500', !isActive);
        btn.classList.toggle('dark:text-gray-400', !isActive);
      });

      // Hide mobile sidebar if open
      var overlay = document.getElementById('mobileSidebarOverlay');
      var sidebar = document.querySelector('aside');
      if (overlay && !overlay.classList.contains('hidden')) {
        overlay.classList.add('hidden');
        if (sidebar) {
          sidebar.classList.remove('translate-x-0');
          sidebar.classList.add('-translate-x-full');
        }
      }

      // Route to correct loader
      switch(tab) {
        case 'dashboard': await loadDashboard(); break;
        case 'registrations': await loadRegistrations(); break;
        case 'posts': await loadPosts(); break;
        case 'users': await loadUsers(); break;
        case 'checkin': await loadCheckin(); break;
        case 'documents': await loadDocuments(); break;
        case 'speakers': await loadSpeakers(); break;
        case 'notifications': await loadNotificationsTab(); break;
        case 'analytics': await loadAnalytics(); break;
        case 'settings': await loadSettings(); break;
        case 'more': await loadMoreMenu(); break;
        default: await loadDashboard(); break;
      }
    }

    // Initialize everything when DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
      // Sidebar navigation
      document.querySelectorAll('.sidebar-item[data-tab]').forEach(function(item) {
        item.addEventListener('click', function() {
          switchTab(this.dataset.tab);
        });
      });

      // Mobile navigation
      document.querySelectorAll('.mobile-nav-btn[data-tab]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          switchTab(this.dataset.tab);
        });
      });

      // Mobile menu toggle
      var mobileMenuBtn = document.getElementById('mobileMenuBtn');
      var sidebar = document.querySelector('aside');
      var overlay = document.getElementById('mobileSidebarOverlay');
      
      if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener('click', function() {
          if (sidebar) {
            sidebar.classList.toggle('-translate-x-full');
            sidebar.classList.toggle('translate-x-0');
          }
          if (overlay) overlay.classList.toggle('hidden');
        });
      }
      
      if (overlay) {
        overlay.addEventListener('click', function() {
          if (sidebar) {
            sidebar.classList.add('-translate-x-full');
            sidebar.classList.remove('translate-x-0');
          }
          overlay.classList.add('hidden');
        });
      }

      // Dark mode toggle
      var darkModeToggle = document.getElementById('darkModeToggle');
      if (darkModeToggle) {
        darkModeToggle.addEventListener('click', function() {
          darkMode = !darkMode;
          applyDarkMode();
        });
      }

      // Start auth check
      checkAuth().catch(function(err) { console.error('Auth init error:', err); });
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', function() {
      stopScanner();
    });

    // Handle visibility change (tab switching)
    document.addEventListener('visibilitychange', function() {
      if (document.hidden && isScannerRunning) {
        stopScanner();
      }
    });
  </script>
</body>
