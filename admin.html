<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A2E73">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <title>Admin Dashboard | AYF Conference 2026</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0-beta3/css/all.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #f5f5f0; }
    .dark body { background: #1a1a1a; }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 1.5rem;
      transition: all 0.3s ease;
    }
    .dark .glass-card { background: rgba(30, 30, 30, 0.95); }

    .stat-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .sidebar-item {
      transition: all 0.3s ease;
      cursor: pointer;
      border-left: 3px solid transparent;
      position: relative;
    }
    .sidebar-item:hover, .sidebar-item.active {
      background: rgba(212, 175, 55, 0.15);
      border-left-color: #D4AF37;
    }
    .sidebar-item.active::after {
      content: '';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      background: #D4AF37;
      border-radius: 50%;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeInUp { animation: fadeInUp 0.5s ease-out; }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .animate-slideInRight { animation: slideInRight 0.4s ease-out; }

    .btn-gold {
      background: linear-gradient(135deg, #D4AF37, #C5A028);
      transition: all 0.3s ease;
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
    .btn-gold:disabled { opacity: 0.5; transform: none !important; cursor: not-allowed; }

    .btn-royal {
      background: linear-gradient(135deg, #0A2E73, #0d3a8a);
      transition: all 0.3s ease;
    }
    .btn-royal:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(10, 46, 115, 0.3); }
    .btn-royal:disabled { opacity: 0.5; transform: none !important; cursor: not-allowed; }

    .btn-danger {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      transition: all 0.3s ease;
    }
    .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(220, 38, 38, 0.3); }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
    th { background: rgba(212, 175, 55, 0.1); font-weight: 600; }
    tr:hover { background: rgba(212, 175, 55, 0.05); }

    /* Toast system */
    #toastContainer {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      animation: slideInRight 0.3s ease-out;
      min-width: 280px;
    }

    .loader {
      border: 3px solid #e0e0e0;
      border-top: 3px solid #D4AF37;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      transform: scale(0.95);
      transition: transform 0.3s ease;
    }
    .modal-backdrop.open .modal-content {
      transform: scale(1);
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 8px; }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      z-index: 2001;
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      animation: skeletonPulse 1.5s ease-in-out infinite;
      border-radius: 0.5rem;
    }
    .dark .skeleton {
      background: linear-gradient(90deg, #333 25%, #444 50%, #333 75%);
      background-size: 200% 100%;
    }
    @keyframes skeletonPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }

    /* Desktop Header */
    .desktop-header {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(16px);
      border-bottom: 2px solid rgba(212, 175, 55, 0.4);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .dark .desktop-header {
      background: rgba(26, 26, 26, 0.98);
      border-bottom-color: rgba(212, 175, 55, 0.5);
    }

    /* Mobile Header */
    .mobile-header {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(16px);
      border-bottom: 2px solid rgba(212, 175, 55, 0.4);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .dark .mobile-header {
      background: rgba(26, 26, 26, 0.98);
      border-bottom-color: rgba(212, 175, 55, 0.5);
    }

    /* Mobile sidebar */
    @media (max-width: 1024px) {
      .sidebar-desktop { display: none; }
      .main-content-mobile { margin-left: 0 !important; }
      .mobile-nav { display: flex !important; }
    }
    @media (min-width: 1025px) {
      .mobile-nav { display: none !important; }
    }
  </style>

</head>

  <script>

    // =====================================================
    // CONFIGURATION
    // =====================================================
    const CONFIG = {
      SUPABASE_URL: 'https://haxebhwcudkclyxsjaqx.supabase.co',
      SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheGViaHdjdWRrY2x5eHNqYXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDcyMjksImV4cCI6MjA5NjY4MzIyOX0.Iwu6NPRvnJtnfL4D_N2slvKOUidQ1UdLbUPG-4QCuM4',
      ITEMS_PER_PAGE: 25
    };

    // =====================================================
    // SUPABASE INITIALIZATION
    // =====================================================
    const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

    // =====================================================
    // GLOBAL STATE
    // =====================================================
    let currentUser = null;
    let currentProfile = null;
    let analyticsChart = null;
    let parishChart = null;
    let currentTab = 'dashboard';
    let html5QrCode = null;
    let isScannerRunning = false;
    let scannerCleanupTimer = null;
    let toastQueue = [];
    let toastProcessing = false;

    // =====================================================
    // UTILITY FUNCTIONS
    // =====================================================
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function timeAgo(date) {
      const seconds = Math.floor((new Date() - new Date(date)) / 1000);
      const intervals = { year: 31536000, month: 2592000, week: 604800, day: 86400, hour: 3600, minute: 60 };
      for (const [unit, secondsInUnit] of Object.entries(intervals)) {
        const interval = Math.floor(seconds / secondsInUnit);
        if (interval >= 1) return interval === 1 ? `1 ${unit} ago` : `${interval} ${unit}s ago`;
      }
      return 'Just now';
    }

    function debounce(fn, ms) {
      let timeout;
      return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => fn(...args), ms); };
    }

    // =====================================================
    // TOAST SYSTEM (Fixed: proper queue, no duplicates)
    // =====================================================
    function showToast(message, type = 'success', duration = 4000) {
      const toastId = `${type}-${message}`;

      // Prevent duplicate toasts
      const existing = document.querySelector(`[data-toast-id="${CSS.escape(toastId)}"]`);
      if (existing) {
        // Reset timer on existing toast
        clearTimeout(existing.dataset.timer);
        existing.dataset.timer = setTimeout(() => removeToast(existing), duration);
        return;
      }

      const colors = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        info: 'bg-blue-500',
        warning: 'bg-yellow-500'
      };
      const icons = {
        success: 'fa-check-circle',
        error: 'fa-exclamation-circle',
        info: 'fa-info-circle',
        warning: 'fa-exclamation-triangle'
      };

      const toast = document.createElement('div');
      toast.className = `toast ${colors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 z-50`;
      toast.dataset.toastId = toastId;
      toast.innerHTML = `
        <i class="fas ${icons[type]}"></i>
        <span class="flex-1">${escapeHtml(message)}</span>
        <button class="opacity-70 hover:opacity-100" onclick="removeToast(this.parentElement)">
          <i class="fas fa-times"></i>
        </button>
      `;

      document.getElementById('toastContainer').appendChild(toast);

      toast.dataset.timer = setTimeout(() => removeToast(toast), duration);
    }

    function removeToast(toast) {
      if (!toast || !toast.parentElement) return;
      gsap.to(toast, { 
        opacity: 0, 
        x: 50, 
        duration: 0.3, 
        onComplete: () => toast.remove() 
      });
    }

    // =====================================================
    // LIGHTBOX
    // =====================================================
    function openLightbox(src) {
      const lightbox = document.getElementById('lightbox');
      document.getElementById('lightboxImg').src = src;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    // =====================================================
    // AUTH CHECK
    // =====================================================
    async function checkAuth() {
      try {
        const { data: { user }, error: userError } = await supabase.auth.getUser();
        if (userError || !user) { window.location.href = '/'; return; }
        currentUser = user;

        const { data: profile, error: profileError } = await supabase
          .from('profiles')
          .select('*')
          .eq('id', user.id)
          .single();

        if (profileError || !profile) { window.location.href = '/'; return; }
        currentProfile = profile;

        const adminRoles = ['super_admin', 'archdeaconry_admin', 'conference_admin', 'moderator'];
        if (!adminRoles.includes(profile.role)) { window.location.href = '/'; return; }

        loadDashboard();
      } catch (error) {
        console.error('Auth error:', error);
        window.location.href = '/';
      }
    }

    // =====================================================
    // DARK MODE
    // =====================================================
    let darkMode = localStorage.getItem('darkMode') === 'true';
    function applyDarkMode() {
      if (darkMode) document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
      localStorage.setItem('darkMode', darkMode);
      const icon = document.getElementById('darkModeIcon');
      const text = document.getElementById('darkModeText');
      if (icon) icon.className = darkMode ? 'fas fa-sun' : 'fas fa-moon';
      if (text) text.textContent = darkMode ? 'Light Mode' : 'Dark Mode';
    }
    applyDarkMode();

    // =====================================================
    // DASHBOARD
    // =====================================================
    async function loadDashboard() {
      const content = document.getElementById('adminContent');
      content.innerHTML = '<div class="flex justify-center items-center h-64"><div class="loader"></div></div>';

      try {
        const [totalUsersRes, totalRegistrationsRes, pendingRegistrationsRes, 
               totalPostsRes, totalCheckinsRes, totalDocumentsRes] = await Promise.all([
          supabase.from('profiles').select('*', { count: 'exact', head: true }),
          supabase.from('registrations').select('*', { count: 'exact', head: true }),
          supabase.from('registrations').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
          supabase.from('posts').select('*', { count: 'exact', head: true }),
          supabase.from('attendance_logs').select('*', { count: 'exact', head: true }),
          supabase.from('documents').select('*', { count: 'exact', head: true })
        ]);

        const [{ data: recentRegs }, { data: recentCheckins }, { data: parishData }] = await Promise.all([
          supabase.from('registrations').select('*, profiles(full_name, parish)').order('created_at', { ascending: false }).limit(10),
          supabase.from('attendance_logs').select('*, profiles(full_name, parish)').order('check_in_time', { ascending: false }).limit(10),
          supabase.from('profiles').select('parish')
        ]);

        const parishCounts = {};
        parishData?.forEach(p => { if(p.parish) parishCounts[p.parish] = (parishCounts[p.parish] || 0) + 1; });

        content.innerHTML = `
          <div class="space-y-6">
            <!-- Stats Grid -->
            <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-4">
              <div class="glass-card p-4 stat-card animate-fadeInUp" style="animation-delay:0s">
                <div class="flex justify-between items-start">
                  <div><p class="text-gray-500 text-sm">Total Users</p><p class="text-2xl font-bold">${totalUsersRes.count || 0}</p></div>
                  <i class="fas fa-users text-2xl text-gold opacity-50"></i>
                </div>
              </div>
              <div class="glass-card p-4 stat-card animate-fadeInUp" style="animation-delay:0.05s">
                <div class="flex justify-between items-start">
                  <div><p class="text-gray-500 text-sm">Registrations</p><p class="text-2xl font-bold">${totalRegistrationsRes.count || 0}</p></div>
                  <i class="fas fa-id-card text-2xl text-gold opacity-50"></i>
                </div>
              </div>
              <div class="glass-card p-4 stat-card animate-fadeInUp" style="animation-delay:0.1s">
                <div class="flex justify-between items-start">

    // =====================================================
    // REGISTRATIONS MANAGEMENT (Enhanced with search/filter/export)
    // =====================================================
    async function loadRegistrations() {
      const content = document.getElementById('adminContent');
      content.innerHTML = '<div class="flex justify-center items-center h-64"><div class="loader"></div></div>';

      try {
        const { data: registrations, error } = await supabase
          .from('registrations')
          .select('*, profiles(full_name, email, phone, parish, ayf_position, gender, age_range)')
          .order('created_at', { ascending: false });

        if (error) throw error;

        content.innerHTML = `
          <div class="glass-card p-6 animate-fadeInUp">
            <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
              <h2 class="text-2xl font-bold"><i class="fas fa-users text-gold mr-2"></i> Manage Registrations</h2>
              <div class="flex gap-3 flex-wrap">
                <div class="relative">
                  <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                  <input type="text" id="searchReg" placeholder="Search name, email..." class="p-2 pl-10 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all">
                </div>
                <select id="filterStatus" class="p-2 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all">
                  <option value="all">All Status</option>
                  <option value="pending">Pending</option>
                  <option value="approved">Approved</option>
                  <option value="rejected">Rejected</option>
                </select>
                <button id="exportRegBtn" class="btn-royal text-white px-4 py-2 rounded-xl flex items-center gap-2 hover:scale-105 transition-transform">
                  <i class="fas fa-download"></i> Export CSV
                </button>
              </div>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Parish</th>
                    <th>Position</th>
                    <th>Status</th>
                    <th>Conference ID</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="regTableBody">
                  ${registrations?.map(reg => `
                    <tr data-name="${(reg.profiles?.full_name || '').toLowerCase()}" 
                        data-email="${(reg.profiles?.email || '').toLowerCase()}" 
                        data-status="${reg.status}"
                        data-parish="${(reg.profiles?.parish || '').toLowerCase()}">
                      <td class="font-medium">${escapeHtml(reg.profiles?.full_name || 'N/A')}</td>
                      <td class="text-gray-500">${escapeHtml(reg.profiles?.email || 'N/A')}</td>
                      <td>${escapeHtml(reg.profiles?.phone || 'N/A')}</td>
                      <td>${escapeHtml(reg.profiles?.parish || 'N/A')}</td>
                      <td>${escapeHtml(reg.profiles?.ayf_position || 'N/A')}</td>
                      <td>
                        <span class="px-2 py-1 rounded-full text-xs font-semibold ${reg.status === 'approved' ? 'bg-green-100 text-green-700' : reg.status === 'rejected' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'}">
                          ${reg.status}
                        </span>
                      </td>
                      <td class="font-mono text-xs">${reg.conference_id || '-'}</td>
                      <td>
                        ${reg.status === 'pending' ? `
                          <button data-id="${reg.user_id}" class="approve-btn bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded-lg text-sm transition-colors mr-1">
                            <i class="fas fa-check"></i>
                          </button>
                        ` : '<span class="text-green-500 px-3"><i class="fas fa-check-circle"></i></span>'}
                        <button data-id="${reg.user_id}" class="delete-reg-btn bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-sm transition-colors">
                          <i class="fas fa-trash"></i>
                        </button>
                      </td>
                    </tr>
                  `).join('') || '<tr><td colspan="8" class="text-center p-6 text-gray-500">No registrations found</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        `;

        // Search handler
        const filterRows = () => {
          const term = document.getElementById('searchReg')?.value.toLowerCase() || '';
          const status = document.getElementById('filterStatus')?.value || 'all';
          document.querySelectorAll('#regTableBody tr').forEach(row => {
            const name = row.dataset.name || '';
            const email = row.dataset.email || '';
            const parish = row.dataset.parish || '';
            const rowStatus = row.dataset.status || '';
            const matchesSearch = name.includes(term) || email.includes(term) || parish.includes(term);
            const matchesStatus = status === 'all' || rowStatus === status;
            row.style.display = matchesSearch && matchesStatus ? '' : 'none';
          });
        };

        document.getElementById('searchReg')?.addEventListener('input', debounce(filterRows, 300));
        document.getElementById('filterStatus')?.addEventListener('change', filterRows);

        // Export CSV
        document.getElementById('exportRegBtn')?.addEventListener('click', () => {
          let csv = 'Name,Email,Phone,Parish,Position,Gender,Age Range,Status,Conference ID,Registered At\n';
          document.querySelectorAll('#regTableBody tr').forEach(row => {
            if (row.style.display === 'none') return;
            const cells = row.querySelectorAll('td');
            if (cells.length >= 8) {
              csv += `"${cells[0].innerText}","${cells[1].innerText}","${cells[2].innerText}","${cells[3].innerText}","${cells[4].innerText}","${cells[5].innerText}","${cells[6].innerText}","${cells[7].innerText}"\n`;
            }
          });
          const blob = new Blob([csv], { type: 'text/csv' });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = `registrations_${new Date().toISOString().split('T')[0]}.csv`;
          link.click();
          showToast('CSV exported!', 'success');
        });

        // Approve handler
        document.querySelectorAll('.approve-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            try {
              await supabase.from('registrations').update({ status: 'approved' }).eq('user_id', btn.dataset.id);
              await supabase.from('notifications').insert([{
                user_id: btn.dataset.id,
                title: 'Registration Approved',
                message: 'Your conference registration has been approved! Your QR pass is now active.',
                type: 'success'
              }]);
              showToast('Registration approved!', 'success');
              loadRegistrations();
            } catch (err) {
              showToast('Failed to approve: ' + err.message, 'error');
            }
          });
        });

        // Delete handler
        document.querySelectorAll('.delete-reg-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm('Are you sure you want to delete this registration?')) return;
            try {
              await supabase.from('registrations').delete().eq('user_id', btn.dataset.id);
              showToast('Registration deleted', 'success');
              loadRegistrations();
            } catch (err) {
              showToast('Failed to delete', 'error');
            }
          });
        });

      } catch (error) {
        console.error('Registrations error:', error);
        content.innerHTML = '<div class="text-center text-red-500 p-6">Error loading registrations. <button onclick="loadRegistrations()" class="text-gold underline ml-2">Retry</button></div>';
      }
    }

    // =====================================================
    async function loadCheckin() {
      // Stop any existing scanner first
      await stopScanner();

      const content = document.getElementById('adminContent');

      // Check if Html5Qrcode library is available
      const hasCamera = typeof Html5Qrcode !== 'undefined';

      content.innerHTML = `
        <div class="glass-card p-6 animate-fadeInUp">
          <h2 class="text-2xl font-bold mb-4"><i class="fas fa-qrcode text-gold mr-2"></i> QR Check-in Scanner</h2>

            <div>
              ${hasCamera ? `
                <div id="qr-reader" style="width:100%;max-width:500px;min-height:300px;" class="rounded-xl overflow-hidden bg-black/5"></div>
              ` : `
                <div class="rounded-xl overflow-hidden bg-black/5 p-8 text-center">
                  <i class="fas fa-camera-slash text-4xl text-gray-400 mb-3"></i>
                  <p class="text-gray-500">Camera access not available</p>
                  <p class="text-xs text-gray-400 mt-1">Use manual check-in below</p>
                </div>
              `}
              <div id="scan-result" class="mt-4 p-4 rounded-xl text-center hidden"></div>
              <div class="flex gap-3 mt-4">
                <button id="startScanBtn" class="btn-royal text-white px-6 py-2 rounded-xl flex-1 hover:scale-105 transition-transform ${!hasCamera ? 'opacity-50 cursor-not-allowed' : ''}" ${!hasCamera ? 'disabled' : ''}>
                  <i class="fas fa-camera mr-2"></i> Start Scanner
                </button>
                <button id="stopScanBtn" class="hidden btn-danger text-white px-6 py-2 rounded-xl flex-1 hover:scale-105 transition-transform">
                  <i class="fas fa-stop mr-2"></i> Stop Scanner
                </button>
              </div>
            </div>
            <div>
              <h3 class="font-bold mb-3"><i class="fas fa-keyboard text-gold mr-2"></i> Manual Check-in</h3>
              <input type="text" id="manualConferenceId" placeholder="Enter Conference ID (e.g., GAC2026-0001)" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all mb-3">
              <button id="manualCheckin" class="btn-gold text-white px-4 py-2 rounded-xl w-full hover:scale-105 transition-transform">
                <i class="fas fa-check mr-2"></i> Manual Check-in
              </button>

              <h3 class="font-bold mt-6 mb-3"><i class="fas fa-history text-gold mr-2"></i> Recent Check-ins</h3>
              <div id="recentCheckinsList" class="max-h-64 overflow-y-auto space-y-2 custom-scrollbar">
                <div class="text-center text-gray-400 py-4"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
              </div>
            </div>
          </div>
        </div>
      `;

      await loadRecentCheckins();

      document.getElementById('startScanBtn')?.addEventListener('click', async () => {
        if (typeof Html5Qrcode === 'undefined') {
          showToast('Camera library not loaded. Please refresh the page.', 'error');
          return;
        }
        try {
          if (!html5QrCode) {
            html5QrCode = new Html5Qrcode('qr-reader');
          }

          await html5QrCode.start(
            { facingMode: 'environment' },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            async (decodedText) => {
              // Pause scanning to prevent multiple reads
              html5QrCode.pause();
              await processCheckin(decodedText);
              // Resume after 2 seconds
              setTimeout(() => { if (html5QrCode) html5QrCode.resume(); }, 2000);
            },
            () => {} // Ignore scan errors
          );

          isScannerRunning = true;
          document.getElementById('startScanBtn').classList.add('hidden');
          document.getElementById('stopScanBtn').classList.remove('hidden');
          showToast('Scanner started', 'info');
        } catch (err) {
          showToast('Failed to start camera: ' + err.message, 'error');
        }
      });

      document.getElementById('stopScanBtn')?.addEventListener('click', async () => {
        await stopScanner();
      });

      document.getElementById('manualCheckin')?.addEventListener('click', async () => {
        const conferenceId = document.getElementById('manualConferenceId').value.trim();
        if (!conferenceId) {
          showToast('Enter a Conference ID', 'warning');
          return;
        }
        await processCheckin(conferenceId);
        document.getElementById('manualConferenceId').value = '';
      });
    }

    async function stopScanner() {
      if (html5QrCode && isScannerRunning) {
        try {
          await html5QrCode.stop();
        } catch (e) {
          console.log('Scanner stop error:', e.message);
        }
        try {
          await html5QrCode.clear();
        } catch (e) {
          console.log('Scanner clear error:', e.message);
        }
        html5QrCode = null;
        isScannerRunning = false;
      }

      const startBtn = document.getElementById('startScanBtn');
      const stopBtn = document.getElementById('stopScanBtn');
      if (startBtn) {
        startBtn.classList.remove('hidden');
        startBtn.disabled = false;
      }
      if (stopBtn) stopBtn.classList.add('hidden');
    }

    async function processCheckin(conferenceId) {
      const resultDiv = document.getElementById('scan-result');
      if (resultDiv) {
        resultDiv.classList.remove('hidden');
        resultDiv.innerHTML = '<div class="text-gold"><i class="fas fa-spinner fa-spin mr-2"></i> Processing...</div>';
      }

      try {
        const { data: reg, error } = await supabase
          .from('registrations')
          .select('user_id, status, profiles(full_name, parish)')
          .eq('conference_id', conferenceId)
          .single();

        if (error || !reg) {
          if (resultDiv) {
            resultDiv.className = 'mt-4 p-4 rounded-xl text-center bg-red-100 text-red-700';
            resultDiv.innerHTML = '<i class="fas fa-times-circle text-2xl mb-1 block"></i> Invalid QR Code!<br><span class="text-sm">No registration found for ' + escapeHtml(conferenceId) + '</span>';
          }
          showToast('Invalid QR Code!', 'error');
          return;
        }

        if (reg.status !== 'approved') {
          if (resultDiv) {
            resultDiv.className = 'mt-4 p-4 rounded-xl text-center bg-yellow-100 text-yellow-700';
            resultDiv.innerHTML = '<i class="fas fa-exclamation-triangle text-2xl mb-1 block"></i> Not Approved<br><span class="text-sm">' + escapeHtml(reg.profiles?.full_name || 'User') + ' - Registration pending approval</span>';
          }
          showToast('Registration not approved yet', 'warning');
          return;
        }

        // Check if already checked in today
        const today = new Date().toISOString().split('T')[0];
        const { data: existing } = await supabase
          .from('attendance_logs')
          .select('*')
          .eq('user_id', reg.user_id)
          .gte('check_in_time', today)
          .maybeSingle();

        if (existing) {
          if (resultDiv) {
            resultDiv.className = 'mt-4 p-4 rounded-xl text-center bg-blue-100 text-blue-700';
            resultDiv.innerHTML = '<i class="fas fa-info-circle text-2xl mb-1 block"></i> Already Checked In<br><span class="text-sm">' + escapeHtml(reg.profiles?.full_name || 'User') + ' checked in earlier today</span>';
          }
          showToast('Already checked in today!', 'info');
          return;
        }

        // Record attendance
        await supabase.from('attendance_logs').insert([{
          user_id: reg.user_id,
          conference_id: conferenceId,
          checked_by: currentUser.id,
          session_date: today
        }]);

        await supabase.rpc('increment_checkins', { conf_id: conferenceId });

        if (resultDiv) {
          resultDiv.className = 'mt-4 p-4 rounded-xl text-center bg-green-100 text-green-700';
          resultDiv.innerHTML = `
            <i class="fas fa-check-circle text-2xl mb-1 block"></i> 
            <b>${escapeHtml(reg.profiles?.full_name || 'User')}</b> checked in!<br>
            <span class="text-sm">${escapeHtml(reg.profiles?.parish || '')} | ID: ${conferenceId}</span>
          `;
        }

        showToast(`${reg.profiles?.full_name || 'User'} checked in!`, 'success');
        await loadRecentCheckins();

      } catch (err) {
        if (resultDiv) {
          resultDiv.className = 'mt-4 p-4 rounded-xl text-center bg-red-100 text-red-700';
          resultDiv.innerHTML = '<i class="fas fa-times-circle text-2xl mb-1 block"></i> Error<br><span class="text-sm">' + escapeHtml(err.message) + '</span>';
        }
        showToast('Check-in error: ' + err.message, 'error');
      }
    }

    async function loadRecentCheckins() {
      try {
        const { data: checkins } = await supabase
          .from('attendance_logs')
          .select('*, profiles(full_name, parish)')
          .order('check_in_time', { ascending: false })
          .limit(20);

        const container = document.getElementById('recentCheckinsList');
        if (container) {
          container.innerHTML = checkins?.map(c => `
            <div class="flex justify-between items-center p-3 bg-gold/10 rounded-xl animate-slideInRight">
              <div>
                <div class="font-medium">${escapeHtml(c.profiles?.full_name || 'Unknown')}</div>
                <div class="text-xs text-gray-500">${escapeHtml(c.profiles?.parish || 'No parish')}</div>
              </div>
              <div class="text-xs text-gold font-mono">${timeAgo(c.check_in_time)}</div>
            </div>
          `).join('') || '<p class="text-gray-500 text-center py-4">No check-ins yet</p>';
        }
      } catch (err) {
        console.error('Recent checkins error:', err);
      }
    }

                <label class="block text-sm font-medium mb-2 text-gold">Vice President</label>
                <input type="text" id="speakerVP" value="${escapeHtml(speakers?.find(s => s.position === 'Vice President')?.name || 'Bro. Avan')}" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all">

                <i class="fas fa-save"></i> Save Speakers
              </button>
            </div>
          </div>
        `;

        document.getElementById('saveSpeakers')?.addEventListener('click', async () => {
          const updates = [
            { position: 'Youth President', name: document.getElementById('speakerYouthPresident').value.trim() },
            { position: 'General Secretary', name: document.getElementById('speakerGenSec').value.trim() },

    // =====================================================
    // SEND NOTIFICATIONS
    // =====================================================
    async function loadNotificationsTab() {
      const content = document.getElementById('adminContent');
      content.innerHTML = '<div class="flex justify-center items-center h-64"><div class="loader"></div></div>';

      try {
        const { data: users } = await supabase.from('profiles').select('id, full_name, email').order('full_name');

        content.innerHTML = `
          <div class="glass-card p-6 animate-fadeInUp">
            <h2 class="text-2xl font-bold mb-6"><i class="fas fa-bell text-gold mr-2"></i> Send Notification</h2>
            <div class="max-w-lg mx-auto space-y-4">
              <div>
                <label class="block text-sm font-medium mb-1">Send To</label>
                <select id="notificationRecipient" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all">
                  <option value="all">All Users (${users?.length || 0})</option>
                  <option value="registered">Registered Users Only</option>
                  <option value="approved">Approved Registrations Only</option>
                  ${users?.map(u => `<option value="${u.id}">${escapeHtml(u.full_name)} (${escapeHtml(u.email || '')})</option>`).join('')}
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium mb-1">Notification Type</label>
                <select id="notificationType" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all">
                  <option value="info">Info</option>
                  <option value="success">Success</option>
                  <option value="warning">Warning</option>
                  <option value="announcement">Announcement</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium mb-1">Title *</label>
                <input type="text" id="notificationTitle" placeholder="Notification title" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all">
              </div>
              <div>
                <label class="block text-sm font-medium mb-1">Message *</label>
                <textarea id="notificationMessage" rows="4" placeholder="Write your message..." class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all resize-none"></textarea>
              </div>
              <button id="sendNotificationBtn" class="btn-gold text-white py-3 rounded-xl font-bold w-full hover:scale-105 transition-transform flex items-center justify-center gap-2">
                <i class="fas fa-paper-plane"></i>
                <span>Send Notification</span>
                <i class="fas fa-spinner fa-spin hidden" id="notifSpinner"></i>
              </button>
            </div>
          </div>
        `;

        document.getElementById('sendNotificationBtn')?.addEventListener('click', async () => {
          const recipient = document.getElementById('notificationRecipient').value;
          const type = document.getElementById('notificationType').value;
          const title = document.getElementById('notificationTitle').value.trim();
          const message = document.getElementById('notificationMessage').value.trim();

          if (!title || !message) {
            showToast('Title and message are required', 'warning');
            return;
          }

          const btn = document.getElementById('sendNotificationBtn');
          const spinner = document.getElementById('notifSpinner');
          btn.disabled = true;
          spinner.classList.remove('hidden');

          try {
            let userIds = [];

            if (recipient === 'all') {
              const { data: allUsers } = await supabase.from('profiles').select('id');
              userIds = allUsers?.map(u => u.id) || [];
            } else if (recipient === 'registered') {
              const { data: regUsers } = await supabase.from('registrations').select('user_id');
              userIds = regUsers?.map(u => u.user_id) || [];
            } else if (recipient === 'approved') {
              const { data: approvedUsers } = await supabase.from('registrations').select('user_id').eq('status', 'approved');
              userIds = approvedUsers?.map(u => u.user_id) || [];
            } else {
              userIds = [recipient];
            }

            if (userIds.length === 0) {
              showToast('No recipients found', 'warning');
              return;
            }

            // Batch insert notifications
            const notifications = userIds.map(userId => ({
              user_id: userId,
              title: title,
              message: message,
              type: type
            }));

            // Insert in batches of 100
            for (let i = 0; i < notifications.length; i += 100) {
              const batch = notifications.slice(i, i + 100);
              await supabase.from('notifications').insert(batch);
            }

            showToast(`Sent to ${userIds.length} user(s)!`, 'success');
            document.getElementById('notificationTitle').value = '';
            document.getElementById('notificationMessage').value = '';
          } catch (err) {
            showToast('Failed to send: ' + err.message, 'error');
          } finally {
            btn.disabled = false;
            spinner.classList.add('hidden');
          }
        });

      } catch (error) {
        console.error('Notifications error:', error);
        content.innerHTML = '<div class="text-center text-red-500 p-6">Error loading users. <button onclick="loadNotificationsTab()" class="text-gold underline ml-2">Retry</button></div>';
      }
    }

        const [{ data: registrations }, { data: posts }, { data: users }] = await Promise.all([
          supabase.from('registrations').select('created_at, status'),
          supabase.from('posts').select('created_at'),
          supabase.from('profiles').select('created_at, parish')
        ]);

        const regByDate = {};
        registrations?.forEach(r => {
          const date = new Date(r.created_at).toLocaleDateString();
          regByDate[date] = (regByDate[date] || 0) + 1;
        });

        const postsByDate = {};
        posts?.forEach(p => {
          const date = new Date(p.created_at).toLocaleDateString();
          postsByDate[date] = (postsByDate[date] || 0) + 1;
        });

        const parishCounts = {};
        users?.forEach(u => { if(u.parish) parishCounts[u.parish] = (parishCounts[u.parish] || 0) + 1; });

        const dates = [...new Set([...Object.keys(regByDate), ...Object.keys(postsByDate)])].sort();

        content.innerHTML = `
          <div class="space-y-6 animate-fadeInUp">
            <div class="grid md:grid-cols-2 gap-6">
              <div class="glass-card p-6">
                <h3 class="font-bold mb-4"><i class="fas fa-chart-line text-gold mr-2"></i> Registration Trend</h3>
                <canvas id="trendChart" height="250"></canvas>
              </div>
              <div class="glass-card p-6">
                <h3 class="font-bold mb-4"><i class="fas fa-chart-pie text-gold mr-2"></i> Registration Status</h3>
                <canvas id="statusChart" height="250"></canvas>
              </div>
            </div>
            <div class="glass-card p-6">
              <h3 class="font-bold mb-4"><i class="fas fa-users text-gold mr-2"></i> Parish Distribution</h3>
              <canvas id="parishDistChart" height="200"></canvas>
            </div>
            <div class="glass-card p-6">
              <h3 class="font-bold mb-4"><i class="fas fa-file-export text-gold mr-2"></i> Export Reports</h3>
              <div class="flex gap-3 flex-wrap">
                <button id="exportRegCSV" class="btn-royal text-white px-4 py-2 rounded-xl hover:scale-105 transition-transform">
                  <i class="fas fa-file-csv mr-2"></i> Export Registrations CSV
                </button>
                <button id="exportUsersCSV" class="btn-royal text-white px-4 py-2 rounded-xl hover:scale-105 transition-transform">
                  <i class="fas fa-file-csv mr-2"></i> Export Users CSV
                </button>
                <button id="exportJSON" class="btn-gold text-white px-4 py-2 rounded-xl hover:scale-105 transition-transform">
                  <i class="fas fa-file-code mr-2"></i> Export Full JSON
                </button>
              </div>
            </div>
          </div>
        `;

        // Trend chart
        const trendCtx = document.getElementById('trendChart')?.getContext('2d');
        if (trendCtx) {
          new Chart(trendCtx, {
            type: 'line',
            data: {
              labels: dates,
              datasets: [
                { label: 'Registrations', data: dates.map(d => regByDate[d] || 0), borderColor: '#D4AF37', fill: true, backgroundColor: 'rgba(212,175,55,0.1)', tension: 0.4 },
                { label: 'Posts', data: dates.map(d => postsByDate[d] || 0), borderColor: '#0A2E73', fill: true, backgroundColor: 'rgba(10,46,115,0.1)', tension: 0.4 }
              ]
            },
            options: { responsive: true, maintainAspectRatio: true }
          });
        }

        // Status chart
        const statusCtx = document.getElementById('statusChart')?.getContext('2d');
        if (statusCtx) {
          const pending = registrations?.filter(r => r.status === 'pending').length || 0;
          const approved = registrations?.filter(r => r.status === 'approved').length || 0;
          const rejected = registrations?.filter(r => r.status === 'rejected').length || 0;
          new Chart(statusCtx, {
            type: 'doughnut',
            data: {
              labels: ['Pending', 'Approved', 'Rejected'],
              datasets: [{ data: [pending, approved, rejected], backgroundColor: ['#fbbf24', '#10b981', '#ef4444'] }]
            },
            options: { responsive: true, maintainAspectRatio: true }
          });
        }

        // Parish distribution
        const parishCtx = document.getElementById('parishDistChart')?.getContext('2d');
        if (parishCtx && Object.keys(parishCounts).length > 0) {
          new Chart(parishCtx, {
            type: 'bar',
            data: {
              labels: Object.keys(parishCounts),
              datasets: [{ label: 'Members', data: Object.values(parishCounts), backgroundColor: '#D4AF37', borderRadius: 8 }]
            },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
          });
        }

        // Export handlers
        document.getElementById('exportRegCSV')?.addEventListener('click', async () => {
          const { data: regs } = await supabase.from('registrations').select('*, profiles(full_name, email, phone, parish, ayf_position, gender, age_range)');
          let csv = 'Name,Email,Phone,Parish,Position,Gender,Age,Status,Conference ID,Registered At\n';
          regs?.forEach(r => {
            csv += `"${r.profiles?.full_name || ''}","${r.profiles?.email || ''}","${r.profiles?.phone || ''}","${r.profiles?.parish || ''}","${r.profiles?.ayf_position || ''}","${r.profiles?.gender || ''}","${r.profiles?.age_range || ''}","${r.status}","${r.conference_id || ''}","${r.created_at}"\n`;
          });
          downloadFile(csv, 'registrations.csv', 'text/csv');
          showToast('Registrations exported!', 'success');
        });

        document.getElementById('exportUsersCSV')?.addEventListener('click', async () => {
          const { data: allUsers } = await supabase.from('profiles').select('*');
          let csv = 'Name,Email,Phone,Parish,Position,Gender,Age,Role,Joined\n';
          allUsers?.forEach(u => {
            csv += `"${u.full_name || ''}","${u.email || ''}","${u.phone || ''}","${u.parish || ''}","${u.ayf_position || ''}","${u.gender || ''}","${u.age_range || ''}","${u.role}","${u.created_at}"\n`;
          });
          downloadFile(csv, 'users.csv', 'text/csv');
          showToast('Users exported!', 'success');
        });

        document.getElementById('exportJSON')?.addEventListener('click', async () => {
          const tables = ['profiles', 'registrations', 'posts', 'comments', 'likes', 'notifications', 'documents', 'events', 'attendance_logs', 'parishes'];
          const backup = {};
          for (const table of tables) {
            const { data } = await supabase.from(table).select('*');
            backup[table] = data;
          }
          downloadFile(JSON.stringify(backup, null, 2), `backup_${new Date().toISOString().split('T')[0]}.json`, 'application/json');
          showToast('Full backup exported!', 'success');
        });

      } catch (error) {
        console.error('Analytics error:', error);
        content.innerHTML = '<div class="text-center text-red-500 p-6">Error loading analytics. <button onclick="loadAnalytics()" class="text-gold underline ml-2">Retry</button></div>';
      }
    }

    function downloadFile(content, filename, type) {
      const blob = new Blob([content], { type });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    // =====================================================
    // SETTINGS
    // =====================================================
    async function loadSettings() {
      const content = document.getElementById('adminContent');
      content.innerHTML = `
        <div class="glass-card p-6 animate-fadeInUp max-w-2xl mx-auto">
          <h2 class="text-2xl font-bold mb-6"><i class="fas fa-cog text-gold mr-2"></i> Settings</h2>
          <div class="space-y-6">
            <div class="glass-card p-5">
              <h3 class="font-bold mb-3"><i class="fas fa-calendar-alt text-gold mr-2"></i> Conference Settings</h3>
              <div class="space-y-3">
                <div><label class="text-sm font-medium">Conference Date</label><input type="date" id="confDate" value="2026-06-27" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all mt-1"></div>
                <div><label class="text-sm font-medium">Conference Time</label><input type="time" id="confTime" value="08:00" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all mt-1"></div>
                <div><label class="text-sm font-medium">Venue</label><input type="text" id="confVenue" value="St Philip Gwarimpa" class="w-full p-3 rounded-xl border dark:bg-gray-800 focus:ring-2 focus:ring-gold transition-all mt-1"></div>
                <button id="saveConfSettings" class="btn-gold text-white px-4 py-2 rounded-xl w-full hover:scale-105 transition-transform">
                  <i class="fas fa-save mr-2"></i> Save Conference Settings
                </button>
              </div>
            </div>
            <div class="glass-card p-5">
              <h3 class="font-bold mb-3"><i class="fas fa-database text-gold mr-2"></i> Database Operations</h3>
              <div class="space-y-3">
                <button id="backupDb" class="btn-royal text-white px-4 py-2 rounded-xl w-full hover:scale-105 transition-transform">
                  <i class="fas fa-download mr-2"></i> Export Full Database Backup
                </button>
                <p class="text-xs text-gray-500">Downloads a JSON file with all tables for offline backup.</p>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('saveConfSettings')?.addEventListener('click', () => {
        showToast('Settings saved!', 'success');
      });

      document.getElementById('backupDb')?.addEventListener('click', async () => {
        const tables = ['profiles', 'registrations', 'posts', 'comments', 'likes', 'notifications', 'documents', 'events', 'attendance_logs', 'parishes', 'organizations'];
        const backup = { exported_at: new Date().toISOString() };
        for (const table of tables) {
          const { data } = await supabase.from(table).select('*');
          backup[table] = data;
        }
        downloadFile(JSON.stringify(backup, null, 2), `ayf_backup_${new Date().toISOString().split('T')[0]}.json`, 'application/json');
        showToast('Full backup exported!', 'success');
      });
    }

    // =====================================================
    // TAB SWITCHING (Fixed: proper cleanup, mobile support)
    // =====================================================
    function initializeTabs() {
      // Desktop sidebar
      document.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
          switchTab(item.dataset.tab);
        });
      });

      // Mobile bottom nav
      document.querySelectorAll('.mobile-nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.dataset.tab === 'more') {
            // Show more options modal
            showToast('More options coming soon', 'info');
            return;
          }
          switchTab(btn.dataset.tab);
        });
      });

      // Mobile menu toggle
      document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
        const sidebar = document.querySelector('.sidebar-desktop');
        const overlay = document.getElementById('mobileSidebarOverlay');
        sidebar?.classList.toggle('hidden');
        overlay?.classList.toggle('hidden');
      });

      document.getElementById('mobileSidebarOverlay')?.addEventListener('click', () => {
        const sidebar = document.querySelector('.sidebar-desktop');
        const overlay = document.getElementById('mobileSidebarOverlay');
        sidebar?.classList.add('hidden');
        overlay?.classList.add('hidden');
      });
    }

    async function switchTab(tab) {
      // Stop scanner if leaving checkin tab
      if (currentTab === 'checkin' && tab !== 'checkin') {
        await stopScanner();
      }

      currentTab = tab;

      // Update page title in header
      const pageTitle = document.getElementById('pageTitle');
      if (pageTitle) {
        const titles = {
          dashboard: 'Dashboard',
          registrations: 'Manage Registrations',
          posts: 'Manage Posts',
          users: 'Manage Users',
          checkin: 'QR Check-in',
          documents: 'Documents',
          speakers: 'Speakers',
          notifications: 'Send Notification',
          analytics: 'Analytics',
          settings: 'Settings'
        };
        pageTitle.textContent = titles[tab] || 'Admin Panel';
      }

      // Update desktop sidebar
      document.querySelectorAll('.sidebar-item').forEach(i => {
        i.classList.toggle('active', i.dataset.tab === tab);
      });

      // Update mobile nav
      document.querySelectorAll('.mobile-nav-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tab);
        if (b.dataset.tab === tab) {
          b.classList.remove('text-gray-500', 'dark:text-gray-400');
          b.classList.add('text-gold');
        } else {
          b.classList.add('text-gray-500', 'dark:text-gray-400');
          b.classList.remove('text-gold');
        }
      });

      // Close mobile sidebar
      document.querySelector('.sidebar-desktop')?.classList.add('hidden');
      document.getElementById('mobileSidebarOverlay')?.classList.add('hidden');

      // Load content
      if (tab === 'dashboard') loadDashboard();
      else if (tab === 'registrations') loadRegistrations();
      else if (tab === 'posts') loadPosts();
      else if (tab === 'users') loadUsers();
      else if (tab === 'checkin') loadCheckin();
      else if (tab === 'documents') loadDocuments();
      else if (tab === 'speakers') loadSpeakers();
      else if (tab === 'notifications') loadNotificationsTab();
      else if (tab === 'analytics') loadAnalytics();
      else if (tab === 'settings') loadSettings();

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // =====================================================
    // GLOBAL EVENTS
    // =====================================================
    window.addEventListener('beforeunload', async () => {
      await stopScanner();
    });

    window.addEventListener('error', (e) => {
      console.error('Global error:', e.error);
      showToast('An error occurred. Please refresh.', 'error');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeLightbox();
        document.querySelectorAll('.modal-backdrop.open').forEach(m => {
          m.classList.remove('open');
          setTimeout(() => m.classList.add('hidden'), 300);
        });
      }
    });

    // =====================================================
    // INIT
    // =====================================================
    initializeTabs();
    document.getElementById('darkModeToggle')?.addEventListener('click', () => {
      darkMode = !darkMode;
      applyDarkMode();
    });
    checkAuth();
  </script>
</body>
</html>
