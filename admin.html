<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A2E73">
  <title>Admin Dashboard | AYF Conference 2026</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #f5f5f0; }
    .dark body { background: #1a1a1a; }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 1.5rem;
      transition: all 0.3s ease;
    }
    .dark .glass-card { background: rgba(30, 30, 30, 0.95); }
    
    .stat-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    
    .sidebar-item {
      transition: all 0.3s ease;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover, .sidebar-item.active {
      background: rgba(212, 175, 55, 0.15);
      border-left-color: #D4AF37;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeInUp { animation: fadeInUp 0.5s ease-out; }
    
    .btn-gold {
      background: linear-gradient(135deg, #D4AF37, #C5A028);
      transition: all 0.3s ease;
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
    
    .btn-royal {
      background: linear-gradient(135deg, #0A2E73, #0d3a8a);
      transition: all 0.3s ease;
    }
    .btn-royal:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(10, 46, 115, 0.3); }
    
    .btn-danger {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      transition: all 0.3s ease;
    }
    .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(220, 38, 38, 0.3); }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    }
    th {
      background: rgba(212, 175, 55, 0.1);
      font-weight: 600;
    }
    tr:hover {
      background: rgba(212, 175, 55, 0.05);
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      animation: fadeInUp 0.3s ease-out;
    }
    
    .loader {
      border: 3px solid #e0e0e0;
      border-top: 3px solid #D4AF37;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { royal: '#0A2E73', gold: '#D4AF37' }
        }
      }
    }
  </script>
</head>
<body class="text-gray-800 dark:text-white">

  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-72 glass-card m-4 flex flex-col fixed h-[calc(100%-2rem)] overflow-y-auto">
      <div class="p-6 border-b border-gold/20">
        <div class="flex items-center gap-3">
          <img src="/logo.png" alt="Logo" class="w-10 h-10" onerror="this.style.display='none'">
          <div>
            <h2 class="font-bold text-lg">Admin Panel</h2>
            <p class="text-xs text-gray-500">AYF Conference 2026</p>
          </div>
        </div>
      </div>
      
      <nav class="flex-1 p-4 space-y-2">
        <div class="sidebar-item p-3 rounded-r-xl flex items-center gap-3" data-tab="dashboard">
          <i class="fas fa-chart-line w-5 text-gold"></i> <span>Dashboard</span>
        </div>
        <div class="sidebar-item p-3 rounded-r-xl flex items-center gap-3" data-tab="registrations">
          <i class="fas fa-users w-5 text-gold"></i> <span>Registrations</span>
          <span id="pendingBadge" class="ml-auto bg-red-500 text-white text-xs px-2 py-1 rounded-full hidden">0</span>
        </div>
        <div class="sidebar-item p-3 rounded-r-xl flex items-center gap-3" data-tab="posts">
          <i class="fas fa-newspaper w-5 text-gold"></i> <span>Manage Posts</span>
        </div>
        <div class="sidebar-item p-3 rounded-r-xl flex items-center gap-3" data-tab="users">
          <i class="fas fa-user-cog w-5 text-gold"></i> <span>Manage Users</span>
        </div>
        <div class="sidebar-item p-3 rounded-r-xl flex items-center gap-3" data-tab="checkin">
          <i class="fas fa-qrcode w-5 text-gold"></i> <span>QR Check-in</span>
        </div>
        <div class="sidebar-item p-3 rounded-r-xl flex items-center gap-3" data-tab="documents">
          <i class="fas fa-folder-open w-5 text-gold"></i> <span>Documents</span>
        </div>
        <div class="sidebar-item p-3 rounded-r-xl flex items-center gap-3" data-tab="speakers">
          <i class="fas fa-microphone-alt w-5 text-gold"></i> <span>Speakers</span>
        </div>
        <div class="sidebar-item p-3 rounded-r-xl flex items-center gap-3" data-tab="notifications">
          <i class="fas fa-bell w-5 text-gold"></i> <span>Send Notification</span>
        </div>
        <div class="sidebar-item p-3 rounded-r-xl flex items-center gap-3" data-tab="analytics">
          <i class="fas fa-chart-pie w-5 text-gold"></i> <span>Analytics</span>
        </div>
        <div class="sidebar-item p-3 rounded-r-xl flex items-center gap-3" data-tab="settings">
          <i class="fas fa-cog w-5 text-gold"></i> <span>Settings</span>
        </div>
      </nav>
      
      <div class="p-4 border-t border-gold/20">
        <div class="flex items-center gap-3 mb-3">
          <button id="darkModeToggle" class="btn-royal text-white px-3 py-2 rounded-lg text-sm w-full">
            <i class="fas fa-moon mr-2"></i> Dark Mode
          </button>
        </div>
        <a href="/" class="flex items-center gap-3 p-3 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/20 text-red-600 transition w-full">
          <i class="fas fa-sign-out-alt"></i> <span>Back to Portal</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-80 p-6 overflow-y-auto h-screen">
      <div id="adminContent" class="animate-fadeInUp">
        <div class="flex justify-center items-center h-64">
          <div class="loader"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // =====================================================
    // SUPABASE INITIALIZATION (SINGLE DECLARATION)
    // =====================================================
    const SUPABASE_URL = 'https://haxebhwcudkclyxsjaqx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheGViaHdjdWRrY2x5eHNqYXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDcyMjksImV4cCI6MjA5NjY4MzIyOX0.Iwu6NPRvnJtnfL4D_N2slvKOUidQ1UdLbUPG-4QCuM4';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // =====================================================
    // GLOBAL VARIABLES
    // =====================================================
    let currentUser = null;
    let currentProfile = null;
    let analyticsChart = null;
    let parishChart = null;
    let currentTab = 'dashboard';
    let html5QrCode = null;
    
    // =====================================================
    // HELPER FUNCTIONS
    // =====================================================
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      const colors = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        info: 'bg-blue-500',
        warning: 'bg-yellow-500'
      };
      toast.className = `toast ${colors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 z-50`;
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    async function checkAuth() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        window.location.href = '/';
        return;
      }
      currentUser = user;
      
      const { data: profile } = await supabase
        .from('profiles')
        .select('*')
        .eq('id', user.id)
        .single();
      
      currentProfile = profile;
      
      const adminRoles = ['super_admin', 'archdeaconry_admin', 'conference_admin', 'moderator'];
      if (!profile || !adminRoles.includes(profile.role)) {
        window.location.href = '/';
        return;
      }
      
      loadDashboard();
    }
    
    // =====================================================
    // DASHBOARD
    // =====================================================
    async function loadDashboard() {
      const content = document.getElementById('adminContent');
      content.innerHTML = '<div class="flex justify-center items-center h-64"><div class="loader"></div></div>';
      
      // Get counts
      const [{ count: totalUsers }, { count: totalRegistrations }, { count: pendingRegistrations }, 
             { count: totalPosts }, { count: totalCheckins }, { count: totalDocuments }] = await Promise.all([
        supabase.from('profiles').select('*', { count: 'exact', head: true }),
        supabase.from('registrations').select('*', { count: 'exact', head: true }),
        supabase.from('registrations').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
        supabase.from('posts').select('*', { count: 'exact', head: true }),
        supabase.from('attendance_logs').select('*', { count: 'exact', head: true }),
        supabase.from('documents').select('*', { count: 'exact', head: true })
      ]);
      
      // Get recent registrations
      const { data: recentRegs } = await supabase
        .from('registrations')
        .select('*, profiles(full_name, email, parish)')
        .order('created_at', { ascending: false })
        .limit(10);
      
      // Get recent check-ins
      const { data: recentCheckins } = await supabase
        .from('attendance_logs')
        .select('*, profiles(full_name, parish)')
        .order('check_in_time', { ascending: false })
        .limit(10);
      
      // Get parish distribution
      const { data: parishData } = await supabase.from('profiles').select('parish');
      const parishCounts = {};
      parishData?.forEach(p => { if(p.parish) parishCounts[p.parish] = (parishCounts[p.parish] || 0) + 1; });
      
      content.innerHTML = `
        <div class="space-y-6">
          <!-- Stats Grid -->
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4">
            <div class="glass-card p-4 stat-card"><div class="flex justify-between items-start"><div><p class="text-gray-500 text-sm">Total Users</p><p class="text-2xl font-bold">${totalUsers || 0}</p></div><i class="fas fa-users text-2xl text-gold opacity-50"></i></div></div>
            <div class="glass-card p-4 stat-card"><div class="flex justify-between items-start"><div><p class="text-gray-500 text-sm">Registrations</p><p class="text-2xl font-bold">${totalRegistrations || 0}</p></div><i class="fas fa-id-card text-2xl text-gold opacity-50"></i></div></div>
            <div class="glass-card p-4 stat-card"><div class="flex justify-between items-start"><div><p class="text-gray-500 text-sm">Pending</p><p class="text-2xl font-bold text-yellow-500">${pendingRegistrations || 0}</p></div><i class="fas fa-clock text-2xl text-gold opacity-50"></i></div></div>
            <div class="glass-card p-4 stat-card"><div class="flex justify-between items-start"><div><p class="text-gray-500 text-sm">Total Posts</p><p class="text-2xl font-bold">${totalPosts || 0}</p></div><i class="fas fa-newspaper text-2xl text-gold opacity-50"></i></div></div>
            <div class="glass-card p-4 stat-card"><div class="flex justify-between items-start"><div><p class="text-gray-500 text-sm">Check-ins</p><p class="text-2xl font-bold">${totalCheckins || 0}</p></div><i class="fas fa-check-circle text-2xl text-gold opacity-50"></i></div></div>
            <div class="glass-card p-4 stat-card"><div class="flex justify-between items-start"><div><p class="text-gray-500 text-sm">Documents</p><p class="text-2xl font-bold">${totalDocuments || 0}</p></div><i class="fas fa-file-alt text-2xl text-gold opacity-50"></i></div></div>
          </div>
          
          <!-- Charts Row -->
          <div class="grid md:grid-cols-2 gap-6">
            <div class="glass-card p-6"><h3 class="font-bold mb-4"><i class="fas fa-chart-bar text-gold mr-2"></i> Registrations by Parish</h3><canvas id="parishChart" height="250"></canvas></div>
            <div class="glass-card p-6"><h3 class="font-bold mb-4"><i class="fas fa-chart-line text-gold mr-2"></i> Activity Overview</h3><canvas id="activityChart" height="250"></canvas></div>
          </div>
          
          <!-- Recent Activity -->
          <div class="grid md:grid-cols-2 gap-6">
            <div class="glass-card p-6"><h3 class="font-bold mb-4"><i class="fas fa-user-plus text-gold mr-2"></i> Recent Registrations</h3><div class="space-y-3 max-h-80 overflow-y-auto">${recentRegs?.map(reg => `<div class="flex justify-between items-center p-2 border-b border-gray-200 dark:border-gray-700"><div><div class="font-medium">${reg.profiles?.full_name || 'Unknown'}</div><div class="text-xs text-gray-500">${reg.profiles?.parish || 'No parish'}</div></div><span class="text-xs px-2 py-1 rounded-full ${reg.status === 'approved' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${reg.status}</span></div>`).join('') || '<p class="text-gray-500">No registrations yet</p>'}</div></div>
            <div class="glass-card p-6"><h3 class="font-bold mb-4"><i class="fas fa-qrcode text-gold mr-2"></i> Recent Check-ins</h3><div class="space-y-3 max-h-80 overflow-y-auto">${recentCheckins?.map(check => `<div class="flex justify-between items-center p-2 border-b border-gray-200 dark:border-gray-700"><div><div class="font-medium">${check.profiles?.full_name || 'Unknown'}</div><div class="text-xs text-gray-500">${check.profiles?.parish || 'No parish'}</div></div><span class="text-xs text-gold">${new Date(check.check_in_time).toLocaleString()}</span></div>`).join('') || '<p class="text-gray-500">No check-ins yet</p>'}</div></div>
          </div>
        </div>
      `;
      
      // Create parish chart
      const parishCtx = document.getElementById('parishChart')?.getContext('2d');
      if (parishCtx && Object.keys(parishCounts).length > 0) {
        if (parishChart) parishChart.destroy();
        parishChart = new Chart(parishCtx, {
          type: 'bar',
          data: { labels: Object.keys(parishCounts), datasets: [{ label: 'Registrations', data: Object.values(parishCounts), backgroundColor: '#D4AF37', borderRadius: 8 }] },
          options: { responsive: true, maintainAspectRatio: true }
        });
      }
      
      // Create activity chart
      const activityCtx = document.getElementById('activityChart')?.getContext('2d');
      if (activityCtx) {
        if (analyticsChart) analyticsChart.destroy();
        analyticsChart = new Chart(activityCtx, {
          type: 'line',
          data: { labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'], datasets: [{ label: 'Registrations', data: [5, 12, 8, 15], borderColor: '#D4AF37', fill: true }, { label: 'Posts', data: [3, 7, 4, 9], borderColor: '#0A2E73', fill: true }] },
          options: { responsive: true }
        });
      }
      
      document.getElementById('pendingBadge').textContent = pendingRegistrations || 0;
      document.getElementById('pendingBadge').classList.toggle('hidden', !pendingRegistrations);
    }
    
    // =====================================================
    // REGISTRATIONS MANAGEMENT
    // =====================================================
    async function loadRegistrations() {
      const { data: registrations } = await supabase
        .from('registrations')
        .select('*, profiles(full_name, email, phone, parish, ayf_position, gender, age_range)')
        .order('created_at', { ascending: false });
      
      const content = document.getElementById('adminContent');
      content.innerHTML = `
        <div class="glass-card p-6">
          <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
            <h2 class="text-2xl font-bold"><i class="fas fa-users text-gold mr-2"></i> Manage Registrations</h2>
            <div class="flex gap-3"><input type="text" id="searchReg" placeholder="Search..." class="p-2 rounded-xl border dark:bg-gray-800"><select id="filterStatus" class="p-2 rounded-xl border dark:bg-gray-800"><option value="all">All</option><option value="pending">Pending</option><option value="approved">Approved</option></select><button id="exportRegBtn" class="btn-royal text-white px-4 py-2 rounded-xl"><i class="fas fa-download"></i> Export</button></div>
          </div>
          <div class="overflow-x-auto"><table class="w-full"><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Parish</th><th>Position</th><th>Status</th><th>Action</th></tr></thead><tbody id="regTableBody">${registrations?.map(reg => `<tr data-name="${reg.profiles?.full_name?.toLowerCase() || ''}" data-email="${reg.profiles?.email?.toLowerCase() || ''}" data-status="${reg.status}"><td>${reg.profiles?.full_name || 'N/A'}</td><td>${reg.profiles?.email || 'N/A'}</td><td>${reg.profiles?.phone || 'N/A'}</td><td>${reg.profiles?.parish || 'N/A'}</td><td>${reg.profiles?.ayf_position || 'N/A'}</td><td><span class="px-2 py-1 rounded-full text-xs ${reg.status === 'approved' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${reg.status}</span></td><td>${reg.status === 'pending' ? `<button data-id="${reg.user_id}" class="approve-btn bg-green-500 text-white px-3 py-1 rounded-lg text-sm">Approve</button>` : '<span class="text-green-500">✓</span>'}<button data-id="${reg.user_id}" class="delete-reg-btn bg-red-500 text-white px-3 py-1 rounded-lg text-sm ml-2">Del</button></td></tr>`).join('') || '<tr><td colspan="7" class="text-center p-6">No registrations</td></tr>'}</tbody></table></div>
        </div>
      `;
      
      document.getElementById('searchReg')?.addEventListener('input', () => { const term = document.getElementById('searchReg').value.toLowerCase(); const status = document.getElementById('filterStatus').value; document.querySelectorAll('#regTableBody tr').forEach(row => { const name = row.dataset.name || ''; const email = row.dataset.email || ''; const rowStatus = row.dataset.status || ''; row.style.display = (name.includes(term) || email.includes(term)) && (status === 'all' || rowStatus === status) ? '' : 'none'; }); });
      document.getElementById('filterStatus')?.addEventListener('change', () => { const term = document.getElementById('searchReg').value.toLowerCase(); const status = document.getElementById('filterStatus').value; document.querySelectorAll('#regTableBody tr').forEach(row => { const name = row.dataset.name || ''; const email = row.dataset.email || ''; const rowStatus = row.dataset.status || ''; row.style.display = (name.includes(term) || email.includes(term)) && (status === 'all' || rowStatus === status) ? '' : 'none'; }); });
      document.getElementById('exportRegBtn')?.addEventListener('click', () => { let csv = 'Name,Email,Phone,Parish,Position,Status\n'; document.querySelectorAll('#regTableBody tr').forEach(row => { if (row.style.display !== 'none') { const cells = row.querySelectorAll('td'); if (cells.length >= 6) csv += `"${cells[0].innerText}","${cells[1].innerText}","${cells[2].innerText}","${cells[3].innerText}","${cells[4].innerText}","${cells[5].innerText}"\n`; } }); const blob = new Blob([csv], { type: 'text/csv' }); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'registrations.csv'; link.click(); showToast('CSV exported!', 'success'); });
      
      document.querySelectorAll('.approve-btn').forEach(btn => { btn.onclick = async () => { await supabase.from('registrations').update({ status: 'approved' }).eq('user_id', btn.dataset.id); await supabase.from('notifications').insert([{ user_id: btn.dataset.id, title: 'Registration Approved', message: 'Your conference registration has been approved!', type: 'success' }]); showToast('Approved!', 'success'); loadRegistrations(); }; });
      document.querySelectorAll('.delete-reg-btn').forEach(btn => { btn.onclick = async () => { if (confirm('Delete?')) { await supabase.from('registrations').delete().eq('user_id', btn.dataset.id); showToast('Deleted!', 'success'); loadRegistrations(); } }; });
    }
    
    // =====================================================
    // POSTS MANAGEMENT
    // =====================================================
    async function loadPosts() {
      const { data: posts } = await supabase.from('posts').select('*, profiles(full_name, avatar_url, role)').order('created_at', { ascending: false });
      const content = document.getElementById('adminContent');
      content.innerHTML = `<div class="glass-card p-6"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold"><i class="fas fa-newspaper text-gold mr-2"></i> Manage Posts</h2><button id="refreshPosts" class="btn-royal text-white px-4 py-2 rounded-xl"><i class="fas fa-sync-alt"></i> Refresh</button></div><div class="space-y-4 max-h-[70vh] overflow-y-auto">${posts?.map(post => `<div class="border-b border-gray-200 dark:border-gray-700 pb-4"><div class="flex justify-between items-start"><div class="flex gap-3"><img src="${post.profiles?.avatar_url}" class="w-10 h-10 rounded-full"><div><div class="font-bold">${post.profiles?.full_name}</div><div class="text-xs text-gray-500">${new Date(post.created_at).toLocaleString()}</div></div></div><button data-id="${post.id}" class="delete-post-btn btn-danger text-white px-3 py-1 rounded-lg text-sm">Delete</button></div><p class="mt-2 ml-12">${post.content}</p>${post.image_url ? `<img src="${post.image_url}" class="mt-2 ml-12 max-h-48 rounded-lg">` : ''}<div class="flex gap-4 mt-2 ml-12 text-sm text-gray-500"><span><i class="far fa-heart"></i> ${post.likes_count || 0} likes</span><span><i class="far fa-comment"></i> ${post.comments_count || 0} comments</span></div></div>`).join('') || '<p class="text-gray-500 text-center py-8">No posts yet</p>'}</div></div>`;
      document.querySelectorAll('.delete-post-btn').forEach(btn => { btn.onclick = async () => { if (confirm('Delete this post?')) { await supabase.from('posts').delete().eq('id', btn.dataset.id); showToast('Post deleted!', 'success'); loadPosts(); } }; });
      document.getElementById('refreshPosts')?.addEventListener('click', () => loadPosts());
    }
    
    // =====================================================
    // USERS MANAGEMENT
    // =====================================================
    async function loadUsers() {
      const { data: users } = await supabase.from('profiles').select('*').order('created_at', { ascending: false });
      const content = document.getElementById('adminContent');
      content.innerHTML = `<div class="glass-card p-6"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold"><i class="fas fa-user-cog text-gold mr-2"></i> Manage Users</h2><input type="text" id="searchUser" placeholder="Search..." class="p-2 rounded-xl border dark:bg-gray-800"></div><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>Name</th><th>Email</th><th>Parish</th><th>Position</th><th>Role</th><th>Action</th></tr></thead><tbody id="userTableBody">${users?.map(user => `<tr data-name="${user.full_name?.toLowerCase() || ''}" data-email="${user.email?.toLowerCase() || ''}"><td>${user.full_name}</td><td>${user.email || 'N/A'}</td><td>${user.parish || 'N/A'}</td><td>${user.ayf_position || 'N/A'}</td><td><select data-id="${user.id}" class="role-select bg-gray-100 dark:bg-gray-700 rounded px-2 py-1 text-sm"><option value="member" ${user.role === 'member' ? 'selected' : ''}>Member</option><option value="moderator" ${user.role === 'moderator' ? 'selected' : ''}>Moderator</option><option value="conference_admin" ${user.role === 'conference_admin' ? 'selected' : ''}>Conference Admin</option><option value="archdeaconry_admin" ${user.role === 'archdeaconry_admin' ? 'selected' : ''}>Archdeaconry Admin</option><option value="super_admin" ${user.role === 'super_admin' ? 'selected' : ''}>Super Admin</option></select></td><td><button data-id="${user.id}" class="delete-user-btn bg-red-500 text-white px-3 py-1 rounded-lg text-sm">Delete</button></td></tr>`).join('') || '<tr><td colspan="6" class="text-center p-6">No users</td></tr>'}</tbody></table></div></div>`;
      document.getElementById('searchUser')?.addEventListener('input', (e) => { const term = e.target.value.toLowerCase(); document.querySelectorAll('#userTableBody tr').forEach(row => { const name = row.dataset.name || ''; const email = row.dataset.email || ''; row.style.display = name.includes(term) || email.includes(term) ? '' : 'none'; }); });
      document.querySelectorAll('.role-select').forEach(select => { select.onchange = async () => { await supabase.from('profiles').update({ role: select.value }).eq('id', select.dataset.id); showToast('Role updated!', 'success'); }; });
      document.querySelectorAll('.delete-user-btn').forEach(btn => { btn.onclick = async () => { if (confirm('Delete this user?')) { await supabase.from('profiles').delete().eq('id', btn.dataset.id); showToast('User deleted!', 'success'); loadUsers(); } }; });
    }
    
    // =====================================================
    // QR CHECK-IN
    // =====================================================
    async function loadCheckin() {
      const content = document.getElementById('adminContent');
      content.innerHTML = `<div class="glass-card p-6"><h2 class="text-2xl font-bold mb-4"><i class="fas fa-qrcode text-gold mr-2"></i> QR Check-in Scanner</h2><div class="grid md:grid-cols-2 gap-6"><div><div id="qr-reader" style="width:100%;max-width:500px;"></div><div id="scan-result" class="mt-4 p-4 rounded-xl text-center"></div><button id="stopScanner" class="mt-4 btn-danger text-white px-4 py-2 rounded-xl w-full">Stop Scanner</button></div><div><h3 class="font-bold mb-3">Manual Check-in</h3><input type="text" id="manualConferenceId" placeholder="Enter Conference ID" class="w-full p-3 rounded-xl border dark:bg-gray-800 mb-3"><button id="manualCheckin" class="btn-gold text-white px-4 py-2 rounded-xl w-full">Manual Check-in</button><h3 class="font-bold mt-6 mb-3">Recent Check-ins</h3><div id="recentCheckinsList" class="max-h-64 overflow-y-auto space-y-2"></div></div></div></div>`;
      
      await loadRecentCheckins();
      
      if (typeof Html5Qrcode !== 'undefined') {
        html5QrCode = new Html5Qrcode("qr-reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (decodedText) => { await processCheckin(decodedText); }, (err) => console.log("Scan error:", err));
      }
      
      document.getElementById('stopScanner')?.addEventListener('click', () => { if (html5QrCode) { html5QrCode.stop(); showToast('Scanner stopped', 'info'); } });
      document.getElementById('manualCheckin')?.addEventListener('click', async () => { const conferenceId = document.getElementById('manualConferenceId').value; if (conferenceId) { await processCheckin(conferenceId); document.getElementById('manualConferenceId').value = ''; } });
    }
    
    async function processCheckin(conferenceId) {
      const { data: reg } = await supabase.from('registrations').select('user_id, profiles(full_name, parish)').eq('conference_id', conferenceId).single();
      if (!reg) { document.getElementById('scan-result').innerHTML = '<div class="bg-red-500 text-white p-3 rounded-xl">❌ Invalid QR Code!</div>'; showToast('Invalid QR Code!', 'error'); return; }
      const today = new Date().toISOString().split('T')[0];
      const { data: existing } = await supabase.from('attendance_logs').select('*').eq('user_id', reg.user_id).gte('check_in_time', today).single();
      if (existing) { document.getElementById('scan-result').innerHTML = '<div class="bg-yellow-500 text-white p-3 rounded-xl">⚠️ Already checked in today!</div>'; showToast(`${reg.profiles?.full_name} already checked in!`, 'warning'); return; }
      await supabase.from('attendance_logs').insert([{ user_id: reg.user_id, conference_id: conferenceId, checked_by: currentUser.id }]);
      await supabase.from('registrations').update({ check_in_time: new Date().toISOString() }).eq('user_id', reg.user_id);
      document.getElementById('scan-result').innerHTML = `<div class="bg-green-500 text-white p-3 rounded-xl">✅ Checked in: ${reg.profiles?.full_name}</div>`;
      showToast(`${reg.profiles?.full_name} checked in!`, 'success');
      await loadRecentCheckins();
    }
    
    async function loadRecentCheckins() {
      const { data: checkins } = await supabase.from('attendance_logs').select('*, profiles(full_name, parish)').order('check_in_time', { ascending: false }).limit(10);
      const container = document.getElementById('recentCheckinsList');
      if (container) container.innerHTML = checkins?.map(c => `<div class="flex justify-between items-center p-2 bg-gold/10 rounded-lg"><div><div class="font-medium">${c.profiles?.full_name}</div><div class="text-xs text-gray-500">${c.profiles?.parish}</div></div><div class="text-xs text-gold">${new Date(c.check_in_time).toLocaleTimeString()}</div></div>`).join('') || '<p class="text-gray-500 text-center">No check-ins yet</p>';
    }
    
    // =====================================================
    // DOCUMENTS MANAGEMENT
    // =====================================================
    async function loadDocuments() {
      const { data: docs } = await supabase.from('documents').select('*').order('created_at', { ascending: false });
      const content = document.getElementById('adminContent');
      content.innerHTML = `<div class="glass-card p-6"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold"><i class="fas fa-folder-open text-gold mr-2"></i> Documents</h2><button id="showUploadModal" class="btn-gold text-white px-4 py-2 rounded-xl"><i class="fas fa-upload"></i> Upload</button></div><div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">${docs?.map(doc => `<div class="glass-card p-4"><div class="flex items-start gap-3"><div class="text-3xl"><i class="fas ${doc.file_type === 'pdf' ? 'fa-file-pdf text-red-500' : 'fa-file-alt text-blue-500'}"></i></div><div class="flex-1"><h3 class="font-bold">${doc.title}</h3><p class="text-xs text-gray-500">${doc.description || ''}</p><div class="flex gap-3 mt-2 text-xs"><span><i class="far fa-eye"></i> ${doc.views || 0}</span><span><i class="fas fa-download"></i> ${doc.downloads || 0}</span></div></div><button data-id="${doc.id}" class="delete-doc-btn text-red-500"><i class="fas fa-trash"></i></button></div></div>`).join('') || '<div class="col-span-3 text-center text-gray-500">No documents</div>'}</div></div><div id="uploadModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"><div class="glass-card p-6 w-full max-w-md"><div class="flex justify-between mb-4"><h3 class="text-xl font-bold">Upload Document</h3><button id="closeModal" class="text-gray-500">&times;</button></div><div class="space-y-4"><input type="text" id="docTitle" placeholder="Title" class="w-full p-3 rounded-xl border"><textarea id="docDesc" rows="3" placeholder="Description" class="w-full p-3 rounded-xl border"></textarea><select id="docType" class="w-full p-3 rounded-xl border"><option value="pdf">PDF</option><option value="docx">DOCX</option><option value="image">Image</option></select><button id="uploadDocBtn" class="btn-gold text-white py-3 rounded-xl w-full">Upload</button></div></div></div>`;
      
      document.getElementById('showUploadModal')?.addEventListener('click', () => document.getElementById('uploadModal').classList.remove('hidden'));
      document.getElementById('closeModal')?.addEventListener('click', () => document.getElementById('uploadModal').classList.add('hidden'));
      document.getElementById('uploadDocBtn')?.addEventListener('click', async () => { const title = document.getElementById('docTitle').value; if (!title) return showToast('Enter title', 'error'); await supabase.from('documents').insert([{ title, description: document.getElementById('docDesc').value, file_type: document.getElementById('docType').value, file_url: '#', uploaded_by: currentUser.id }]); document.getElementById('uploadModal').classList.add('hidden'); showToast('Uploaded!', 'success'); loadDocuments(); });
      document.querySelectorAll('.delete-doc-btn').forEach(btn => { btn.onclick = async () => { if (confirm('Delete?')) { await supabase.from('documents').delete().eq('id', btn.dataset.id); showToast('Deleted!', 'success'); loadDocuments(); } }; });
    }
    
    // =====================================================
    // SPEAKERS MANAGEMENT
    // =====================================================
    async function loadSpeakers() {
      const { data: speakers } = await supabase.from('speakers').select('*');
      const content = document.getElementById('adminContent');
      content.innerHTML = `<div class="glass-card p-6"><h2 class="text-2xl font-bold mb-4"><i class="fas fa-microphone-alt text-gold mr-2"></i> Manage Speakers</h2><div class="space-y-4 max-w-lg mx-auto"><div class="glass-card p-4"><label>Youth President</label><input type="text" id="speakerYouthPresident" value="${speakers?.find(s => s.position === 'Youth President')?.name || 'Sis. Blessing Ifemenam'}" class="w-full p-3 rounded-xl border mt-1"></div><div class="glass-card p-4"><label>General Secretary</label><input type="text" id="speakerGenSec" value="${speakers?.find(s => s.position === 'General Secretary')?.name || 'Bro. Simi'}" class="w-full p-3 rounded-xl border mt-1"></div><div class="glass-card p-4"><label>Vice President</label><input type="text" id="speakerVP" value="${speakers?.find(s => s.position === 'Vice President')?.name || 'Bro. Avan'}" class="w-full p-3 rounded-xl border mt-1"></div><button id="saveSpeakers" class="btn-gold text-white py-3 rounded-xl font-bold w-full">Save Speakers</button></div></div>`;
      document.getElementById('saveSpeakers')?.addEventListener('click', async () => { const updates = [{ position: 'Youth President', name: document.getElementById('speakerYouthPresident').value }, { position: 'General Secretary', name: document.getElementById('speakerGenSec').value }, { position: 'Vice President', name: document.getElementById('speakerVP').value }]; for (const update of updates) { if (update.name) { const existing = speakers?.find(s => s.position === update.position); if (existing) await supabase.from('speakers').update({ name: update.name }).eq('id', existing.id); else await supabase.from('speakers').insert([{ position: update.position, name: update.name }]); } } showToast('Speakers saved!', 'success'); });
    }
    
    // =====================================================
    // SEND NOTIFICATION
    // =====================================================
    async function loadNotificationsTab() {
      const { data: users } = await supabase.from('profiles').select('id, full_name, email');
      const content = document.getElementById('adminContent');
      content.innerHTML = `<div class="glass-card p-6"><h2 class="text-2xl font-bold mb-4"><i class="fas fa-bell text-gold mr-2"></i> Send Notification</h2><div class="max-w-lg mx-auto space-y-4"><div><label>Send to</label><select id="notificationRecipient" class="w-full p-3 rounded-xl border mt-1"><option value="all">All Users</option><option value="registered">Registered Users</option><option value="approved">Approved Users</option>${users?.map(u => `<option value="${u.id}">${u.full_name}</option>`).join('')}</select></div><div><label>Title</label><input type="text" id="notificationTitle" class="w-full p-3 rounded-xl border mt-1"></div><div><label>Message</label><textarea id="notificationMessage" rows="4" class="w-full p-3 rounded-xl border mt-1"></textarea></div><button id="sendNotificationBtn" class="btn-gold text-white py-3 rounded-xl font-bold w-full">Send Notification</button></div></div>`;
      document.getElementById('sendNotificationBtn')?.addEventListener('click', async () => { const recipient = document.getElementById('notificationRecipient').value; const title = document.getElementById('notificationTitle').value; const message = document.getElementById('notificationMessage').value; if (!title || !message) return showToast('Fill all fields', 'error'); let userIds = []; if (recipient === 'all') { const { data: allUsers } = await supabase.from('profiles').select('id'); userIds = allUsers.map(u => u.id); } else if (recipient === 'registered') { const { data: regUsers } = await supabase.from('registrations').select('user_id'); userIds = regUsers.map(u => u.user_id); } else if (recipient === 'approved') { const { data: approvedUsers } = await supabase.from('registrations').select('user_id').eq('status', 'approved'); userIds = approvedUsers.map(u => u.user_id); } else { userIds = [recipient]; } for (const userId of userIds) { await supabase.from('notifications').insert([{ user_id: userId, title, message, type: 'info' }]); } showToast(`Sent to ${userIds.length} user(s)!`, 'success'); document.getElementById('notificationTitle').value = ''; document.getElementById('notificationMessage').value = ''; });
    }
    
    // =====================================================
    // ANALYTICS
    // =====================================================
    async function loadAnalytics() {
      const { data: registrations } = await supabase.from('registrations').select('created_at, status');
      const { data: posts } = await supabase.from('posts').select('created_at');
      const regByDate = {}; registrations?.forEach(r => { const date = new Date(r.created_at).toLocaleDateString(); regByDate[date] = (regByDate[date] || 0) + 1; });
      const postsByDate = {}; posts?.forEach(p => { const date = new Date(p.created_at).toLocaleDateString(); postsByDate[date] = (postsByDate[date] || 0) + 1; });
      const dates = [...new Set([...Object.keys(regByDate), ...Object.keys(postsByDate)])].sort();
      const content = document.getElementById('adminContent');
      content.innerHTML = `<div class="glass-card p-6"><h2 class="text-2xl font-bold mb-4"><i class="fas fa-chart-pie text-gold mr-2"></i> Analytics</h2><div class="grid md:grid-cols-2 gap-6"><div><canvas id="trendChart" height="250"></canvas></div><div><canvas id="statusChart" height="250"></canvas></div></div><div class="mt-6"><button id="exportAnalytics" class="btn-royal text-white px-6 py-2 rounded-xl">Export Report</button></div></div>`;
      const trendCtx = document.getElementById('trendChart')?.getContext('2d'); if (trendCtx) new Chart(trendCtx, { type: 'line', data: { labels: dates, datasets: [{ label: 'Registrations', data: dates.map(d => regByDate[d] || 0), borderColor: '#D4AF37' }, { label: 'Posts', data: dates.map(d => postsByDate[d] || 0), borderColor: '#0A2E73' }] }, options: { responsive: true } });
      const statusCtx = document.getElementById('statusChart')?.getContext('2d'); if (statusCtx) { const pending = registrations?.filter(r => r.status === 'pending').length || 0; const approved = registrations?.filter(r => r.status === 'approved').length || 0; new Chart(statusCtx, { type: 'doughnut', data: { labels: ['Pending', 'Approved'], datasets: [{ data: [pending, approved], backgroundColor: ['#fbbf24', '#10b981'] }] }, options: { responsive: true } }); }
      document.getElementById('exportAnalytics')?.addEventListener('click', () => { const report = { generated: new Date().toISOString(), totalRegistrations: registrations?.length || 0, pendingApprovals: registrations?.filter(r => r.status === 'pending').length || 0, totalPosts: posts?.length || 0 }; const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' }); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `analytics_${new Date().toISOString().split('T')[0]}.json`; link.click(); showToast('Report exported!', 'success'); });
    }
    
    // =====================================================
    // SETTINGS
    // =====================================================
    async function loadSettings() {
      const content = document.getElementById('adminContent');
      content.innerHTML = `<div class="glass-card p-6"><h2 class="text-2xl font-bold mb-4"><i class="fas fa-cog text-gold mr-2"></i> Settings</h2><div class="max-w-lg mx-auto space-y-6"><div class="glass-card p-4"><h3 class="font-bold mb-3">Conference Settings</h3><div class="space-y-3"><div><label>Conference Date</label><input type="date" id="confDate" value="2026-06-27" class="w-full p-2 rounded-xl border"></div><div><label>Conference Time</label><input type="time" id="confTime" value="08:00" class="w-full p-2 rounded-xl border"></div><div><label>Venue</label><input type="text" id="confVenue" value="St Philip Gwarimpa" class="w-full p-2 rounded-xl border"></div><button id="saveSettings" class="btn-gold text-white px-4 py-2 rounded-xl w-full">Save Settings</button></div></div><div class="glass-card p-4"><h3 class="font-bold mb-3">Database Backup</h3><button id="backupDb" class="btn-royal text-white px-4 py-2 rounded-xl w-full"><i class="fas fa-database"></i> Export Backup</button></div></div></div>`;
      document.getElementById('saveSettings')?.addEventListener('click', () => showToast('Settings saved!', 'success'));
      document.getElementById('backupDb')?.addEventListener('click', async () => { const tables = ['profiles', 'registrations', 'posts', 'comments', 'likes', 'notifications', 'documents', 'speakers']; const backup = {}; for (const table of tables) { const { data } = await supabase.from(table).select('*'); backup[table] = data; } const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' }); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `backup_${new Date().toISOString().split('T')[0]}.json`; link.click(); showToast('Backup exported!', 'success'); });
    }
    
    // =====================================================
    // TAB SWITCHING
    // =====================================================
    document.querySelectorAll('.sidebar-item').forEach(item => {
      item.onclick = () => {
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        const tab = item.dataset.tab;
        if (tab === 'dashboard') loadDashboard();
        else if (tab === 'registrations') loadRegistrations();
        else if (tab === 'posts') loadPosts();
        else if (tab === 'users') loadUsers();
        else if (tab === 'checkin') loadCheckin();
        else if (tab === 'documents') loadDocuments();
        else if (tab === 'speakers') loadSpeakers();
        else if (tab === 'notifications') loadNotificationsTab();
        else if (tab === 'analytics') loadAnalytics();
        else if (tab === 'settings') loadSettings();
      };
    });
    
    // Dark mode
    let darkMode = localStorage.getItem('darkMode') === 'true';
    function applyDarkMode() { if (darkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); localStorage.setItem('darkMode', darkMode); }
    applyDarkMode();
    document.getElementById('darkModeToggle')?.addEventListener('click', () => { darkMode = !darkMode; applyDarkMode(); });
    
    checkAuth();
  </script>
</body>
</html>
